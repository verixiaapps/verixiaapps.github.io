<!DOCTYPE html>
<html>
<head>

<title>Scam Check Now – Test Page</title>
<meta name="description" content="Check if a message, website, or offer may be a scam before you respond or send money.">

<style>

body{
font-family: Arial;
max-width:700px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:150px;
font-size:16px;
padding:10px;
}

button{
margin-top:10px;
padding:12px 20px;
font-size:16px;
}

#result{
margin-top:20px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<h1>Scam Check Now</h1>

<p>
Paste a message, job offer, website, or link and get a scam risk analysis.
</p>

<textarea id="text"></textarea>

<br>

<button onclick="check()">Check for Scam</button>

<div id="result"></div>

<script>

async function check(){

const text = document.getElementById("text").value;

const response = await fetch(
"https://awake-integrity-production-faa0.up.railway.app/analyze",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text
})
}
);

const data = await response.json();

if(data.limit){

document.getElementById("result").innerText =
"Free checks used. Redirecting to upgrade...";

startCheckout();

return;

}

document.getElementById("result").innerText = data.result;

}

async function startCheckout(){

const response = await fetch(
"https://awake-integrity-production-faa0.up.railway.app/create-checkout",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
priceId:"price_1T83LGJJ0FYjaiRQdPH5y4P2"
})
}
);

const data = await response.json();

window.location = data.url;

}

</script>

</body>
</html>

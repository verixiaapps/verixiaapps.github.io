<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function showUpgrade(){
const el=document.getElementById("upgrade");
el.style.display="block";
setTimeout(()=>el.scrollIntoView({behavior:"smooth"}),100);
}

async function check(){
const text=document.getElementById("text").value.trim()
const email=document.getElementById("email").value.trim().toLowerCase()
const result=document.getElementById("result")

if(!text){
result.innerText="Paste something to analyze."
result.style.display="block"
return
}

result.style.display="block"
result.innerText="Analyzing..."

try{

const response=await fetch(API+"/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text,email})
})

const data=await response.json()

if(data.limit){
showUpgrade()
return
}

result.innerText=data.result

}catch(e){
result.innerText="Error"
}
}

/* 🔥 FIXED CHECKOUT */
async function checkout(priceId){

const email=document.getElementById("email").value.trim().toLowerCase()
const pageUrl=window.location.origin+window.location.pathname

try{

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email: email || null,
successUrl:pageUrl+"?conversion=1",
cancelUrl:pageUrl
})
})

const data=await response.json()

if(data.url){
window.location=data.url
return
}

}catch(e){}

/* fallback safety */
window.location.href="https://buy.stripe.com/YOUR_LINK"

}

</script>

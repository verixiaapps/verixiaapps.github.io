<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is This Text a Scam? (Check Instantly)</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 24px;
}

h1 {
  font-size: 28px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  border: none;
  padding: 12px;
  margin-top: 12px;
  font-size: 16px;
}

.button {
  display: block;
  text-align: center;
  background: #22c55e;
  color: #000;
  padding: 14px;
  border-radius: 10px;
  font-weight: 600;
  margin-top: 12px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 16px;
  border-radius: 10px;
  display: none;
}

.high { background: #7f1d1d; }
.medium { background: #78350f; }
.low { background: #064e3b; }

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Is This Text Message a Scam?</h1>

<p>Paste a message below and get a quick risk check.</p>

<textarea id="input" placeholder="Paste message here..."></textarea>

<div class="button" onclick="checkScam()">Check Message</div>

<div id="result" class="result"></div>

<div class="card">
<p><strong>Want full analysis?</strong></p>
<p>Check websites, job offers, and messages in seconds.</p>
<a class="button" href="YOUR_APP_LINK">Open App</a>
</div>

</div>

<script>
function checkScam() {
  let text = document.getElementById("input").value.toLowerCase();
  let result = document.getElementById("result");

  result.style.display = "block";

  if (text.includes("bitcoin") || text.includes("send money") || text.includes("urgent")) {
    result.className = "result high";
    result.innerHTML = "<strong>High Risk ⚠️</strong><br><br>This message shows strong scam signals (urgency, payment request, or crypto). Do not send money.";
  }
  else if (text.includes("link") || text.includes("click here") || text.includes("verify")) {
    result.className = "result medium";
    result.innerHTML = "<strong>Medium Risk ⚠️</strong><br><br>This message contains suspicious elements. Verify before taking action.";
  }
  else {
    result.className = "result low";
    result.innerHTML = "<strong>Low Risk ✅</strong><br><br>No strong scam signals detected, but stay cautious.";
  }
}
</script>

</body>
</html>

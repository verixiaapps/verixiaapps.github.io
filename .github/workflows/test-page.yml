name: Deploy Single Test Page

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-test-page:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create test page directory
        run: mkdir -p test

      - name: Copy root template
        run: cp template.html test/index.html

      - name: Fill template placeholders
        run: |
          python3 - <<'PY'
          from pathlib import Path

          file_path = Path("test/index.html")
          html = file_path.read_text(encoding="utf-8")

          replacements = {
              "{{TITLE}}": "Is Amazon Verification Security Check a Scam? | Scam Check Now",
              "{{DESCRIPTION}}": "Check if this Amazon verification message is a scam before you click, reply, or send money. Identify warning signs instantly.",
              "{{CANONICAL_URL}}": "https://verixiaapps.com/test/",
              "{{KEYWORD}}": "Amazon Verification Security Check",
              "{{AI_CONTENT}}": """
          <p>If you received an Amazon verification or security alert message, it may look legitimate at first glance. These messages often claim there is an issue with your account, a suspicious login, or a payment problem.</p>

          <p>Scammers use urgency and fear to push you into clicking a link or entering your login details. Many of these messages are designed to look similar to real Amazon emails or texts.</p>

          <h3>Common Warning Signs</h3>

          <ul>
            <li>Urgent language like “verify immediately” or “account will be locked”</li>
            <li>Links that do not lead to official Amazon domains</li>
            <li>Requests for passwords, codes, or payment details</li>
            <li>Unusual sender email addresses</li>
          </ul>

          <h3>What To Do</h3>

          <p>Do not click links or respond directly. Go to Amazon through the official app or website and check your account notifications there.</p>

          <p>If something feels off, verify independently before taking action.</p>
          """.strip(),
              "{{RELATED_LINKS}}": """
          <li><a href="/paypal-account-alert-scam/">PayPal account alert scam</a></li>
          <li><a href="/delivery-text-message-scam/">Delivery text message scam</a></li>
          <li><a href="/crypto-investment-scam/">Crypto investment scam</a></li>
          """.strip(),
          }

          for key, value in replacements.items():
              html = html.replace(key, value)

          file_path.write_text(html, encoding="utf-8")
          PY

      - name: Add root index for Pages
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/test/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="/test/">/test/</a>...</p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
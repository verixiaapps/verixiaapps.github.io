name: Deploy Single Test Page

on:
  workflow_dispatch:

jobs:
  deploy-test-page:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create test page directory
        run: mkdir -p test

      - name: Write test/index.html
        run: |
          cat > test/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">

          <title>Is Amazon Verification Security Check a Scam? | Scam Check Now</title>
          <meta name="description" content="Check if this Amazon verification message is a scam before you click, reply, or send money. Identify warning signs instantly.">
          <meta name="robots" content="index, follow">
          <link rel="canonical" href="https://verixiaapps.com/test/">

          <style>
          :root{
          --bg-top:#eef4ff;
          --bg-bottom:#ffffff;

          --ink:#1f2937;
          --ink-strong:#0f172a;
          --muted:#667085;
          --muted-2:#94a3b8;
          --line
# .github/workflows/update-embedded-upgrade-templates.yml
name: Update Embedded Upgrade Templates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only, do not write changes"
        required: true
        default: true
        type: boolean

      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-embedded-upgrade-templates
  cancel-in-progress: false

jobs:
  update-templates:
    runs-on: ubuntu-latest

    env:
      DRY_RUN: ${{ inputs.dry_run }}
      COMMIT_MESSAGE: ${{ inputs.commit_message }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run template updater
        run: node scripts/update-embedded-upgrade-templates.js

      - name: Show git diff summary
        if: always()
        run: |
          echo "Changed files:"
          git diff --name-only || true
          echo ""
          echo "Diff stat:"
          git diff --stat || true

      - name: Commit changes
        if: env.DRY_RUN != 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FINAL_MESSAGE="${COMMIT_MESSAGE}"
          if [ -z "$FINAL_MESSAGE" ]; then
            FINAL_MESSAGE="Update embedded upgrade script in all SEO templates"
          fi

          git add templates/seo-template.html templates/seo-template-b.html templates/seo-template-c.html scripts/update-embedded-upgrade-templates.js scripts/fragments/embedded-upgrade-script.html 2>/dev/null || true
          git commit -m "$FINAL_MESSAGE"
          git push
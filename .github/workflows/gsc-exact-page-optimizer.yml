name: GSC Exact Page Optimizer

on:
  workflow_dispatch:
    inputs:
      target_urls:
        description: "Comma-separated full URLs or relative paths to optimize"
        required: true
        type: string
      optimize_title:
        description: "Rewrite <title>"
        required: true
        default: true
        type: boolean
      optimize_meta:
        description: "Rewrite meta description"
        required: true
        default: true
        type: boolean
      optimize_intro:
        description: "Rewrite intro / first paragraphs"
        required: true
        default: true
        type: boolean
      optimize_links:
        description: "Refresh related internal links"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Preview only, do not commit"
        required: true
        default: false
        type: boolean
      commit_message:
        description: "Optional custom commit message"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: gsc-exact-page-optimizer
  cancel-in-progress: false

jobs:
  optimize-pages:
    runs-on: ubuntu-latest

    env:
      TARGET_URLS: ${{ inputs.target_urls }}
      OPTIMIZE_TITLE: ${{ inputs.optimize_title }}
      OPTIMIZE_META: ${{ inputs.optimize_meta }}
      OPTIMIZE_INTRO: ${{ inputs.optimize_intro }}
      OPTIMIZE_LINKS: ${{ inputs.optimize_links }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run exact page optimizer
        run: node scripts/gsc-exact-page-optimizer.js

      - name: Commit changes
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add .
          git commit -m "${{ inputs.commit_message || 'Optimize exact GSC pages' }}"
          git push
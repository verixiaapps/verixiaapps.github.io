name: Discovery Layer

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without committing changes"
        required: true
        default: false
        type: boolean
      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: discovery-layer-main
  cancel-in-progress: false

jobs:
  build-discovery-layer:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      DEFAULT_COMMIT_MESSAGE: "Update discovery layer"
      SITE_URL: "https://verixiaapps.com"
      SOURCE_SITEMAP_URL: "https://verixiaapps.com/sitemap.xml"
      DISCOVERY_SITEMAP_PATH: "discovery-sitemap.xml"
      DISCOVERY_DIR: "discovery"
      MAX_LATEST_URLS: "100"
      MAX_TODAY_URLS: "100"
      MAX_THIS_WEEK_URLS: "700"
      MAX_HTML_SITEMAP_URLS: "500"
      MAX_FEED_URLS: "100"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync latest main before run
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Ensure discovery script exists
        run: |
          if [ ! -f "scripts/build-discovery-layer.js" ]; then
            echo "Missing script: scripts/build-discovery-layer.js"
            exit 1
          fi

      - name: Run discovery layer generator
        run: node scripts/build-discovery-layer.js
        env:
          SITE_URL: ${{ env.SITE_URL }}
          SOURCE_SITEMAP_URL: ${{ env.SOURCE_SITEMAP_URL }}
          DISCOVERY_SITEMAP_PATH: ${{ env.DISCOVERY_SITEMAP_PATH }}
          DISCOVERY_DIR: ${{ env.DISCOVERY_DIR }}
          MAX_LATEST_URLS: ${{ env.MAX_LATEST_URLS }}
          MAX_TODAY_URLS: ${{ env.MAX_TODAY_URLS }}
          MAX_THIS_WEEK_URLS: ${{ env.MAX_THIS_WEEK_URLS }}
          MAX_HTML_SITEMAP_URLS: ${{ env.MAX_HTML_SITEMAP_URLS }}
          MAX_FEED_URLS: ${{ env.MAX_FEED_URLS }}
          DRY_RUN: ${{ env.DRY_RUN }}

      - name: Show changed files
        run: git status --short

      - name: Stop on dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: echo "Dry run complete. No commit or push performed."

      - name: Commit discovery changes
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail

          git add -- discovery-sitemap.xml discovery/

          if git diff --cached --quiet; then
            echo "No discovery changes to commit."
            exit 0
          fi

          FINAL_COMMIT_MESSAGE="${{ github.event.inputs.commit_message }}"

          if [ -z "$FINAL_COMMIT_MESSAGE" ]; then
            FINAL_COMMIT_MESSAGE="$DEFAULT_COMMIT_MESSAGE"
          fi

          git commit -m "$FINAL_COMMIT_MESSAGE"

      - name: Push discovery changes
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: git push origin HEAD:main
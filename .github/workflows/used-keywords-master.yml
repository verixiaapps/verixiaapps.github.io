name: Used Keywords Master Builder

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without committing changes"
        required: true
        default: false
        type: boolean
      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

concurrency:
  group: used-keywords-master-builder
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      MASTER_DIR: "data/used_keywords_master"
      MASTER_FILE: "data/used_keywords_master/used_keywords_master.txt"
      SOURCE_A: "data/generated_keywords.txt"
      DEFAULT_COMMIT_MESSAGE: "Update used keywords master"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "used-keywords-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Sync latest main before run
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Ensure script exists
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "scripts/build_used_keywords_master.py" ]; then
            echo "Missing script: scripts/build_used_keywords_master.py"
            exit 1
          fi

      - name: Build used keywords master file
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_used_keywords_master.py
        env:
          MASTER_DIR: ${{ env.MASTER_DIR }}
          MASTER_FILE: ${{ env.MASTER_FILE }}
          SOURCE_A: ${{ env.SOURCE_A }}
          DRY_RUN: ${{ env.DRY_RUN }}

      - name: Show changed files
        shell: bash
        run: |
          set -euo pipefail
          git status --short

      - name: Stop on dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run complete. No commit or push performed."

      - name: Commit used keywords master update
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail

          git add -- "$MASTER_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          FINAL_COMMIT_MESSAGE="${{ github.event.inputs.commit_message }}"

          if [ -z "$FINAL_COMMIT_MESSAGE" ]; then
            FINAL_COMMIT_MESSAGE="$DEFAULT_COMMIT_MESSAGE"
          fi

          git commit -m "$FINAL_COMMIT_MESSAGE"

      - name: Push used keywords master update
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
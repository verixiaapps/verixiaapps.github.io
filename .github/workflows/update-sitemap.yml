name: Sitemap Refresh - Scam Check Now

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate sitemap
        shell: bash
        run: |
          cat > update-sitemap.js <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const BASE_URL = "https://verixiaapps.com";
          const TARGET_DIR = "scam-check-now";
          const OUTPUT_FILE = "sitemap.xml";

          function getAllPages(dir) {
            let results = [];

            const list = fs.readdirSync(dir);
            list.forEach((file) => {
              const filePath = path.join(dir, file);
              const stat = fs.statSync(filePath);

              if (stat && stat.isDirectory()) {
                const indexFile = path.join(filePath, "index.html");

                if (fs.existsSync(indexFile)) {
                  const urlPath = filePath.replace(/\\/g, "/");
                  results.push(urlPath);
                }

                results = results.concat(getAllPages(filePath));
              }
            });

            return results;
          }

          const pages = getAllPages(TARGET_DIR);

          const urls = pages.map((p) => {
            const lastmod = new Date().toISOString();

            return [
              "  <url>",
              `    <loc>${BASE_URL}/${p}/</loc>`,
              `    <lastmod>${lastmod}</lastmod>`,
              "    <changefreq>daily</changefreq>",
              "    <priority>0.8</priority>",
              "  </url>"
            ].join("\n");
          });

          const sitemap = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
            urls.join("\n"),
            "</urlset>"
          ].join("\n");

          fs.writeFileSync(OUTPUT_FILE, sitemap, "utf8");
          console.log(`Sitemap updated with ${pages.length} pages`);
          EOF

          node update-sitemap.js

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update sitemap"
            git push
          fi
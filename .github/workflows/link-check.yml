name: Check HTML Links

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: |
            lychee-

      - name: Check links in HTML files
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --root-dir "$(pwd)"
            --base https://verixiaapps.com
            --cache
            --max-cache-age 1d
            --verbose
            --no-progress
            --timeout 20
            --max-concurrency 8
            --retry-wait-time 2
            --max-retries 2
            --accept 200,204,206,301,302,303,307,308,429
            --exclude-mail
            --exclude 'tel:.*'
            --exclude 'javascript:.*'
            --exclude '^#$'
            './scam-check-now/**/*.html'
            './scam-check-now-b/**/*.html'
            './scam-check-now-c/**/*.html'
            './token-risk/**/*.html'
          format: markdown
          output: lychee/out.md
          fail: true
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
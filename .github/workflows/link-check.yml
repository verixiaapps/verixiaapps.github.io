name: Check External Links In HTML

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check external links in HTML files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 20
            --max-concurrency 8
            --retry-wait-time 2
            --max-retries 2
            --accept 200,204,206,301,302,303,307,308,429,403
            --include '^(http|https)://'
            --exclude '^(#|mailto:|tel:|javascript:|data:)'
            --exclude '^/'
            --exclude '^\.\.?/'
            './scam-check-now/**/*.html'
            './scam-check-now-b/**/*.html'
            './scam-check-now-c/**/*.html'
            './token-risk/**/*.html'
          fail: true
          format: markdown
          output: lychee/out.md
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
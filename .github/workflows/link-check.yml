name: Check External Links In HTML

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract external links only
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          folders = [
              "scam-check-now",
              "scam-check-now-b",
              "scam-check-now-c",
              "token-risk",
          ]

          urls = set()

          for folder in folders:
              root = Path(folder)
              if not root.exists():
                  continue

              for file in root.rglob("*.html"):
                  text = file.read_text(errors="ignore")
                  found = re.findall(r'''(?:href|src|action)=["'](https?://[^"'\s<>]+)''', text, re.I)
                  urls.update(found)

          with open("external-links.txt", "w") as f:
              for url in sorted(urls):
                  f.write(url + "\n")

          print(f"Found {len(urls)} external links")
          PY

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 20
            --max-concurrency 8
            --retry-wait-time 2
            --max-retries 2
            --accept 200,204,206,301,302,303,307,308,403,429
            external-links.txt
          fail: true
          format: markdown
          output: lychee/out.md
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
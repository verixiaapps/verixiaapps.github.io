name: SEO Ranking + Indexing Engine (Manual Control)

on:

  schedule:

    - cron: '10 6 * * *'

  workflow_dispatch:

    inputs:

      limit:

        description: "How many pages to process (use 1 for testing)"

        required: false

        default: "10"

permissions:

  contents: write

jobs:

  seo-engine:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo

        uses: actions/checkout@v4

      - name: Run SEO ranking engine

        env:

          API_URL: https://verixiaapps.com/seo-content

          LIMIT: ${{ github.event.inputs.limit }}

        run: |

          node << 'EOF'

          const fs = require("fs");

          const path = require("path");

          const ROOT = "./scam-check-now";

          const LIMIT = parseInt(process.env.LIMIT || "10", 10);

          /* =========================

             PAGE DISCOVERY

          ========================= */

          function getPages(dir) {

            let results = [];

            for (const file of fs.readdirSync(dir)) {

              const full = path.join(dir, file);

              const stat = fs.statSync(full);

              if (stat.isDirectory()) {

                results = results.concat(getPages(full));

              } else if (file === "index.html") {

                results.push(full);

              }

            }

            return results;

          }

          function slugFromPath(p) {

            return p

              .replace("./scam-check-now/", "")

              .replace("/index.html", "");

          }

          /* =========================

             SEO CORE

          ========================= */

          function detectIntent(slug) {

            const s = slug.toLowerCase();

            if (s.includes("did-i-get-scammed") || s.includes("what-to-do")) return "recovery";

            if (s.includes("vs") || s.includes("fake")) return "comparison";

            if (s.includes("how-to") || s.includes("avoid") || s.includes("prevent")) return "prevention";

            if (s.includes("login") || s.includes("account") || s.includes("alert")) return "security-check";

            return "verification";

          }

          function buildKeywordSet(slug) {

            const base = slug.replace(/-/g, " ");

            const words = base.split(" ");

            return {

              primary: base,

              longtail_1: words.join(" "),

              longtail_2: words.slice(0, 4).join(" "),

              longtail_3: words.slice(1).join(" "),

              longtail_4: words.slice(-4).join(" ")

            };

          }

          function buildSERPAngle(intent, seed) {

            const map = {

              recovery: ["post-scam recovery actions", "fraud damage steps", "account recovery guide"],

              prevention: ["avoid scams checklist", "fraud prevention guide", "safe browsing steps"],

              comparison: ["real vs fake breakdown", "how to spot scams", "legit vs fraud guide"],

              verification: ["is it legit analysis", "trust check guide", "risk evaluation"],

              "security-check": ["security scan analysis", "account threat review", "alert verification"]

            };

            const list = map[intent] || ["general risk analysis"];

            return list[seed % list.length];

          }

          function buildCrawlSignals(slug) {

            const seed = slug.length;

            return {

              freshness: new Date().toISOString().split("T")[0],

              crawl_weight: (seed % 7) + 1,

              uniqueness_boost: (seed % 5) + 1

            };

          }

          function buildContentDepth(intent, crawl) {

            return {

              style: intent,

              depthLevel: crawl.uniqueness_boost

            };

          }

          /* =========================

             SAFE FETCH

          ========================= */

          const fetchFn =

            global.fetch ||

            ((...args) => import("node-fetch").then(({ default: fetch }) => fetch(...args)));

          async function generate(payload) {

            try {

              const res = await fetchFn(process.env.API_URL, {

                method: "POST",

                headers: { "Content-Type": "application/json" },

                body: JSON.stringify(payload)

              });

              const data = await res.json();

              const text = data?.content?.trim();

              if (!text || text.length < 20) return null;

              return text;

            } catch {

              return null;

            }

          }

          /* =========================

             SAFE INJECTION (FIXED)

          ========================= */

          function inject(html, content, seed) {

            if (!content) return html;

            // FORCE DIFFERENCE (this fixes "no commit" problem)

            const stamped = content + `\n<!--seo:${seed}:${Date.now()}-->`;

            const tag = '<div class="content-block">';

            const start = html.indexOf(tag);

            if (start === -1) {

              return html.replace(

                "</body>",

                `<div class="content-block">${stamped}</div></body>`

              );

            }

            const after = start + tag.length;

            let depth = 1;

            let i = after;

            while (i < html.length) {

              if (html.slice(i, i + 4) === "<div") depth++;

              if (html.slice(i, i + 6) === "</div>") depth--;

              i++;

              if (depth === 0) break;

            }

            if (depth !== 0) {

              return html;

            }

            return (

              html.slice(0, after) +

              stamped +

              html.slice(i + 6)

            );

          }

          /* =========================

             BACKUP

          ========================= */

          function backup(file, html) {

            const dir = "./backup-ranking-engine";

            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });

            const safe = file.replace(/[\\/]/g, "_");

            fs.writeFileSync(path.join(dir, safe), html);

          }

          /* =========================

             MAIN

          ========================= */

          async function main() {

            const pages = getPages(ROOT).slice(0, LIMIT);

            console.log("Processing pages:", pages.length);

            for (const page of pages) {

              const slug = slugFromPath(page);

              const intent = detectIntent(slug);

              const keywords = buildKeywordSet(slug);

              const angle = buildSERPAngle(intent, slug.length);

              const crawl = buildCrawlSignals(slug);

              const depth = buildContentDepth(intent, crawl);

              const html = fs.readFileSync(page, "utf8");

              const content = await generate({

                keyword: keywords,

                intent,

                angle,

                crawl,

                depth,

                mode: "ranking_v3"

              });

              const updated = inject(html, content, slug.length);

              // ALWAYS WRITE (guarantees Git diff every run)

              backup(page, html);

              fs.writeFileSync(page, updated);

              console.log("Updated:", slug);

            }

            console.log("DONE");

          }

          main();

          EOF

      - name: Commit changes

        run: |

          git config user.name "seo-bot"

          git config user.email "actions@github.com"

          git add .

          git commit -m "SEO ranking engine v3.6 (guaranteed diff + stable indexing engine)" || echo "No changes"

          git push
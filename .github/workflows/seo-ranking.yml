name: SEO Ranking + Indexing Engine (Identity Layer V6)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: audit = scan only, rewrite = scan + update"
        required: false
        default: "rewrite"
      limit:
        description: "How many pages to process or report (use 1 for testing)"
        required: false
        default: "10"
      target_path:
        description: "Optional: exact path to a specific page (e.g. scam-check-now/example/index.html)"
        required: false
        default: ""
      similarity_threshold:
        description: "Similarity threshold for flagging pages (example: 0.82)"
        required: false
        default: "0.82"

permissions:
  contents: write

jobs:
  seo-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SEO ranking engine
        env:
          BACKEND_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          MODE: ${{ github.event.inputs.mode }}
          LIMIT: ${{ github.event.inputs.limit }}
          TARGET_PATH: ${{ github.event.inputs.target_path }}
          SIMILARITY_THRESHOLD: ${{ github.event.inputs.similarity_threshold }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          if (typeof fetch !== "function") {
            throw new Error("Global fetch is not available in this runner. Node 20+ is required.");
          }

          const ROOT = "./scam-check-now";
          const ROOT_ABS = path.resolve(ROOT);

          const MODE = (process.env.MODE || "rewrite").trim().toLowerCase();
          const LIMIT = Math.max(1, parseInt(process.env.LIMIT || "10", 10) || 10);
          const TARGET_PATH = (process.env.TARGET_PATH || "").trim();
          const IS_TARGETED_RUN = Boolean(TARGET_PATH);

          const parsedThreshold = Number(process.env.SIMILARITY_THRESHOLD || "0.82");
          const SIMILARITY_THRESHOLD =
            Number.isFinite(parsedThreshold) && parsedThreshold > 0 && parsedThreshold < 1
              ? parsedThreshold
              : 0.82;

          const GENERATED_START = "<!-- SEO_ENGINE_CONTENT_START -->";
          const GENERATED_END = "<!-- SEO_ENGINE_CONTENT_END -->";

          const EXCERPT_COMPARE_CHARS = 2200;
          const MAX_SIMILAR_NEIGHBORS = 3;
          const TITLE_COMPARE_WEIGHT = 1.35;
          const BODY_COMPARE_WEIGHT = 1.0;
          const MIN_CONTENT_LENGTH = 180;
          const TARGET_MIN_CONTENT_LENGTH = 120;
          const MAX_CONTENT_LENGTH = 9000;
          const MAX_CONTEXT_EXCERPT = 1800;
          const MAX_OVERLAP_EXCERPT = 520;
          const THIN_CONTENT_THRESHOLD = 500;
          const REQUEST_TIMEOUT_MS = 60000;

          function buildApiUrl() {
            const base = String(process.env.BACKEND_BASE_URL || "").trim();
            if (!base) {
              throw new Error(
                "Missing BACKEND_BASE_URL. Add repo secret RAILWAY_BACKEND_URL with your Railway backend URL, for example https://your-app.up.railway.app"
              );
            }
            return `${base.replace(/\/+$/, "")}/seo-content-v2`;
          }

          const API_URL = buildApiUrl();
          console.log("Using backend:", API_URL);

          function getPages(dir) {
            let results = [];

            for (const file of fs.readdirSync(dir)) {
              const full = path.join(dir, file);
              const stat = fs.statSync(full);

              if (stat.isDirectory()) {
                if (!file.startsWith(".")) {
                  results = results.concat(getPages(full));
                }
              } else if (file === "index.html") {
                results.push(full);
              }
            }

            return results.sort();
          }

          function resolveTargetPath(inputPath) {
            if (!inputPath) return null;

            const clean = inputPath.trim().replace(/\\/g, "/").replace(/^\.\//, "");

            let candidate = clean.startsWith("scam-check-now/")
              ? clean
              : path.posix.join("scam-check-now", clean);

            if (!candidate.endsWith("/index.html") && !candidate.endsWith("index.html")) {
              candidate = candidate.replace(/\/+$/, "") + "/index.html";
            }

            const fullAbs = path.resolve(candidate);

            if (!fullAbs.startsWith(ROOT_ABS + path.sep) && fullAbs !== path.join(ROOT_ABS, "index.html")) {
              throw new Error(`Target path must stay inside ${ROOT}: ${inputPath}`);
            }

            if (!fs.existsSync(fullAbs)) {
              throw new Error(`Target path not found: ${fullAbs}`);
            }

            return fullAbs;
          }

          function slugFromPath(p) {
            return path
              .relative(ROOT_ABS, path.resolve(p))
              .replace(/\\/g, "/")
              .replace(/\/index\.html$/, "");
          }

          function toWords(slug) {
            return slug.replace(/-/g, " ").replace(/\s+/g, " ").trim();
          }

          function sentenceCase(str) {
            if (!str) return "";
            return str.charAt(0).toUpperCase() + str.slice(1);
          }

          function titleCasePhrase(str) {
            return str
              .split(/\s+/)
              .filter(Boolean)
              .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
              .join(" ");
          }

          function stripGeneratedContent(html) {
            const start = html.indexOf(GENERATED_START);
            const end = html.indexOf(GENERATED_END);

            if (start !== -1 && end !== -1 && end > start) {
              return (html.slice(0, start) + html.slice(end + GENERATED_END.length)).trim();
            }

            return html;
          }

          function htmlToPlainText(html) {
            return String(html || "")
              .replace(/<script[\s\S]*?<\/script>/gi, " ")
              .replace(/<style[\s\S]*?<\/style>/gi, " ")
              .replace(/<!--[\s\S]*?-->/g, " ")
              .replace(/<noscript[\s\S]*?<\/noscript>/gi, " ")
              .replace(/<svg[\s\S]*?<\/svg>/gi, " ")
              .replace(/<[^>]+>/g, " ")
              .replace(/&nbsp;/g, " ")
              .replace(/&amp;/g, "&")
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'")
              .replace(/&#x27;/g, "'")
              .replace(/\s+/g, " ")
              .trim();
          }

          function normalizeTextForSimilarity(text) {
            return String(text || "")
              .toLowerCase()
              .replace(/[^a-z0-9\s]/g, " ")
              .replace(/\b(is|this|that|a|an|the|real|fake|legit|or|scam|text|message|email|sms|call|alert|warning|notification|request|code|verification|link|login|account|refund|payment|charge|invoice|crypto|wallet|did|i|get|scammed|what|to|do|how|avoid|prevent|vs|it|you|your|be|if|are|for|of|and|in|on|with|after|from|about|possible|suspicious|page|guide|check)\b/g, " ")
              .replace(/\s+/g, " ")
              .trim();
          }

          function tokenizeSet(text) {
            return new Set(
              normalizeTextForSimilarity(text)
                .split(" ")
                .filter((word) => word && word.length > 2)
            );
          }

          function jaccardSimilarity(a, b) {
            if (!a.size || !b.size) return 0;

            let intersection = 0;
            for (const item of a) {
              if (b.has(item)) intersection++;
            }

            const union = a.size + b.size - intersection;
            return union ? intersection / union : 0;
          }

          function weightedSimilarity(a, b) {
            const titleScore = jaccardSimilarity(a.titleFingerprint, b.titleFingerprint);
            const bodyScore = jaccardSimilarity(a.bodyFingerprint, b.bodyFingerprint);

            const weighted =
              (titleScore * TITLE_COMPARE_WEIGHT + bodyScore * BODY_COMPARE_WEIGHT) /
              (TITLE_COMPARE_WEIGHT + BODY_COMPARE_WEIGHT);

            return Number(weighted.toFixed(3));
          }

          function extractBrand(slug) {
            const parts = slug.toLowerCase().split("-").filter(Boolean);
            const stop = new Set([
              "is","this","that","a","an","the","real","fake","legit","or","scam","text","message","email",
              "sms","call","alert","warning","notification","request","code","verification","link","login",
              "account","refund","payment","charge","invoice","crypto","wallet","did","i","get","scammed",
              "what","to","do","how","avoid","prevent","vs","after","from","about","possible","suspicious",
              "bank","card","texting","phone","mail","letter","check","guide","warning-signs","warnings"
            ]);

            const kept = parts.filter((word) => !stop.has(word));
            if (kept.length === 0) return "this message";
            return kept.slice(0, 3).join(" ");
          }

          function buildPageIdentity(slug) {
            const s = slug.toLowerCase();

            let category = "general_scam_check";
            let threat = "deception_risk";
            let userState = "needs_clear_answer";
            let contentType = "message_verification";
            let evidenceFocus = "warning_signs_and_legitimacy_checks";
            let riskAction = "clicking_replying_or_providing_info";
            let primaryCheck = "independent_verification";

            if (s.includes("login") || s.includes("account") || s.includes("password")) {
              category = "account_security";
              threat = "credential_theft";
              userState = "fear_of_account_takeover";
              contentType = "account_alert_validation";
              evidenceFocus = "login_page_signals_and_account_recovery_checks";
              riskAction = "logging_in_through_the_message_or_reset_link";
              primaryCheck = "manual_navigation_to_the_official_account_portal";
            } else if (s.includes("payment") || s.includes("money") || s.includes("refund") || s.includes("charge") || s.includes("invoice")) {
              category = "payment_fraud";
              threat = "financial_loss";
              userState = "worry_about_money";
              contentType = "payment_or_charge_verification";
              evidenceFocus = "billing_red_flags_and_payment_reversal_checks";
              riskAction = "sending_money_or_accepting_a_charge_as_legit";
              primaryCheck = "checking_the_charge_or_request_from_a_known_official_account";
            } else if (s.includes("sms") || s.includes("text") || s.includes("message")) {
              category = "sms_phishing";
              threat = "social_engineering";
              userState = "urgent_mobile_warning";
              contentType = "text_message_check";
              evidenceFocus = "link_pressure_sender_pattern_and_reply_traps";
              riskAction = "clicking_links_or_replying_from_a_text";
              primaryCheck = "verifying_through_the_official_app_or_site_instead_of_the_text";
            } else if (s.includes("email")) {
              category = "email_phishing";
              threat = "impersonation";
              userState = "email_authenticity_doubt";
              contentType = "email_check";
              evidenceFocus = "sender_domain_links_and_impersonation_signals";
              riskAction = "opening_links_or_attachments_from_the_email";
              primaryCheck = "checking_sender_domain_and_then_verifying_from_the_official_website";
            } else if (s.includes("crypto") || s.includes("wallet") || s.includes("token")) {
              category = "crypto_scam";
              threat = "wallet_drain_or_asset_loss";
              userState = "high_risk_click_or_connect_decision";
              contentType = "crypto_risk_check";
              evidenceFocus = "wallet_connection_approval_and_transfer_red_flags";
              riskAction = "connecting_a_wallet_or_approving_a_transaction";
              primaryCheck = "verifying_contract_source_domain_and_requested_permissions";
            } else if (s.includes("call") || s.includes("phone")) {
              category = "phone_scam";
              threat = "voice_impersonation";
              userState = "pressure_from_live_contact";
              contentType = "phone_call_check";
              evidenceFocus = "caller_pressure_identity_proof_and_call_back_checks";
              riskAction = "staying_on_the_call_and_following_their_instructions";
              primaryCheck = "hanging_up_and_calling_back_using_a_known_official_number";
            }

            return {
              category,
              threat,
              userState,
              contentType,
              evidenceFocus,
              riskAction,
              primaryCheck
            };
          }

          function detectIntent(slug) {
            const s = slug.toLowerCase();

            if (s.includes("did-i-get-scammed") || s.includes("what-to-do") || s.includes("after")) return "recovery";
            if (s.includes("vs") || s.includes("fake") || s.includes("real-or-fake")) return "comparison";
            if (s.includes("how-to") || s.includes("avoid") || s.includes("prevent")) return "prevention";
            if (s.includes("login") || s.includes("account") || s.includes("alert") || s.includes("security")) return "security-check";

            return "verification";
          }

          function buildKeywordSet(slug, identity) {
            const base = toWords(slug);
            const words = base.split(/\s+/).filter(Boolean);

            return {
              primary: `${base} legit or scam`.trim(),
              secondary: `${base} warning signs`.trim(),
              longtail_1: `${words.join(" ")} scam check`.trim(),
              longtail_2: `${words.slice(0, 4).join(" ")} is it real`.trim(),
              longtail_3: `${words.slice(0, 5).join(" ")} red flags`.trim(),
              longtail_4: `${identity.contentType.replace(/_/g, " ")} verification`.trim(),
              longtail_5: `${base} what to do next`.trim()
            };
          }

          function buildSERPAngle(intent, seed, identity) {
            const map = {
              recovery: [
                "what to do next after possible scam exposure",
                "how to limit damage after clicking or responding",
                "recovery steps after a suspicious interaction"
              ],
              prevention: [
                "how to avoid this scam pattern",
                "prevention checklist for suspicious messages",
                "how to spot the red flags before you act"
              ],
              comparison: [
                "how to tell real from fake in this scenario",
                "legit vs scam signs people usually miss",
                "side by side red flags and normal signals"
              ],
              verification: [
                "is this legit or a scam",
                "how to verify before clicking or replying",
                "trust check based on common red flags"
              ],
              "security-check": [
                "whether this security alert is real",
                "how to validate an account warning safely",
                "check the alert without risking your login"
              ]
            };

            const base = map[intent] || ["general scam analysis"];
            return `${base[seed % base.length]} (${identity.category})`;
          }

          function buildCrawlSignals() {
            return {
              freshness: new Date().toISOString().split("T")[0],
              updateType: "quality_refresh",
              goal: "stronger_intent_match_better_uniqueness_and_lower_template_similarity",
              updateStrategy: "rewrite_the_weakest_or_most_similar_pages_first"
            };
          }

          function buildContentDepth(intent, identity) {
            const formatByIntent = {
              recovery: "damage_control_steps",
              prevention: "warning_signs_plus_safety_steps",
              comparison: "real_vs_fake_signal_breakdown",
              verification: "direct_answer_plus_red_flags",
              "security-check": "alert_validation_plus_safe_next_steps"
            };

            return {
              style: `${intent}_${identity.category}_${identity.threat}`,
              tone: identity.userState,
              format: formatByIntent[intent] || "direct_answer_plus_red_flags",
              density: "tight_and_skimmable",
              priority: "specificity_over_length",
              uniquenessTarget: "high",
              usefulnessTarget: "practical_non_generic_actionable"
            };
          }

          function extractPageContext(html, slug) {
            const source = stripGeneratedContent(html);

            const titleMatch = source.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            const metaMatch =
              source.match(/<meta[^>]+name=["']description["'][^>]+content=["']([^"]*)["'][^>]*>/i) ||
              source.match(/<meta[^>]+content=["']([^"]*)["'][^>]+name=["']description["'][^>]*>/i);
            const h1Match = source.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);

            const plain = htmlToPlainText(source);
            const excerpt = plain.slice(0, MAX_CONTEXT_EXCERPT);

            return {
              slug,
              pageTitle: titleMatch ? htmlToPlainText(titleMatch[1]).slice(0, 180) : "",
              metaDescription: metaMatch ? metaMatch[1].trim().slice(0, 220) : "",
              h1: h1Match ? htmlToPlainText(h1Match[1]).slice(0, 180) : "",
              existingExcerpt: excerpt
            };
          }

          function buildPageFingerprint(slug, context) {
            const titleText = [slug, context.pageTitle, context.metaDescription, context.h1].join(" ");
            const bodyText = [slug, context.existingExcerpt.slice(0, EXCERPT_COMPARE_CHARS)].join(" ");

            return {
              titleFingerprint: tokenizeSet(titleText),
              bodyFingerprint: tokenizeSet(bodyText)
            };
          }

          function buildSimilarityMap(pageRecords) {
            const similarMap = new Map();

            for (let i = 0; i < pageRecords.length; i++) {
              const a = pageRecords[i];
              let best = 0;
              let matches = [];

              for (let j = 0; j < pageRecords.length; j++) {
                if (i === j) continue;

                const b = pageRecords[j];
                const score = weightedSimilarity(a.fingerprint, b.fingerprint);

                if (score > best) best = score;
                if (score >= SIMILARITY_THRESHOLD) {
                  matches.push({
                    slug: b.slug,
                    score: Number(score.toFixed(3))
                  });
                }
              }

              matches = matches
                .sort((x, y) => y.score - x.score)
                .slice(0, MAX_SIMILAR_NEIGHBORS);

              similarMap.set(a.path, {
                highestSimilarity: Number(best.toFixed(3)),
                tooSimilar: matches.length > 0,
                similarPages: matches
              });
            }

            return similarMap;
          }

          function buildQualityScore(record) {
            const thinPenalty = record.context.existingExcerpt.length < THIN_CONTENT_THRESHOLD ? 0.12 : 0;
            const similarityWeight = record.similarity.highestSimilarity;
            const thinWeight = Math.max(
              0,
              (THIN_CONTENT_THRESHOLD - record.context.existingExcerpt.length) / THIN_CONTENT_THRESHOLD
            );

            return Number((similarityWeight + thinWeight + thinPenalty).toFixed(3));
          }

          function buildEditorialDirectives(slug, identity, intent, context, similarityProfile) {
            const humanSlug = sentenceCase(toWords(slug));
            const brand = extractBrand(slug);

            const angleByIntent = {
              recovery: "Focus on what someone should do next if they already clicked, replied, paid, or shared information.",
              prevention: "Focus on how to avoid the scam pattern before any risky action is taken.",
              comparison: "Make the difference between legitimate and suspicious signals very explicit.",
              verification: "Give a fast direct answer first, then explain the strongest red flags and safest verification steps.",
              "security-check": "Focus on whether the alert is real and how to check it without logging in through the message."
            };

            const uniquenessRules = similarityProfile && similarityProfile.tooSimilar
              ? [
                  "This page appears too similar to other pages in the folder. Make this output clearly more unique.",
                  "Do not reuse generic scam-check wording or interchangeable phrasing.",
                  "Use page-specific wording tied to the exact scenario implied by the slug.",
                  "Differentiate the examples, red flags, and safe checks from broad template language.",
                  `Avoid sounding like these similar pages: ${similarityProfile.similarPages.map((item) => item.slug).join(", ")}.`
                ]
              : [
                  "Keep the block distinct and page-specific.",
                  "Avoid generic template language."
                ];

            return {
              targetReader: "A stressed user trying to decide whether a message, site, charge, call, or alert is legitimate.",
              editorialGoal: "Add useful, page-specific content that improves intent match, uniqueness, clarity, trust, and practical usefulness.",
              qualityRules: [
                "Do not write generic AI filler.",
                "Do not use vague phrases like in today's digital world, ever-evolving threats, or it is important to stay vigilant.",
                "Do not sound like a school essay or SEO article farm.",
                "Be specific to the page topic and likely scam scenario implied by the slug.",
                "Use short paragraphs and tight sections.",
                "Make the opening sentence immediately answer the query.",
                "Include concrete red flags and concrete safe next steps.",
                "Avoid repeating points already obvious from the slug.",
                "Do not mention being an AI or content generator.",
                "Do not add fake statistics, fake stories, fake case studies, or unverifiable claims.",
                "Do not pad the content with broad education that could fit any scam page.",
                "Do not overuse the exact phrase legit or scam.",
                "Do not use dramatic or exaggerated wording.",
                "Do not write a generic definition paragraph about scams."
              ],
              structureRules: [
                "Return HTML only.",
                "Use one short intro paragraph only.",
                "Then use exactly 3 small sections with h3 headings.",
                "One section should cover strongest warning signs.",
                "One section should cover how to verify safely.",
                "One section should cover what to do next.",
                "Use one short ul list with 3 to 5 bullets.",
                "Keep the total block tight, skimmable, and useful.",
                "Aim for roughly 260 to 430 words.",
                "Write additive content, not a restatement of the title or h1."
              ],
              voiceRules: [
                "Trust-first.",
                "Clear and practical.",
                "Calm, direct, and non-dramatic.",
                "Specificity over length.",
                "No fluff.",
                "No legalese.",
                "No fear-mongering."
              ],
              uniquenessRules,
              pageSpecificNotes: [
                `Page topic: ${humanSlug}`,
                `Likely brand or entity in query: ${titleCasePhrase(brand)}`,
                `Primary scenario type: ${identity.contentType}`,
                `Evidence focus: ${identity.evidenceFocus}`,
                `Main risky action to help the reader avoid: ${identity.riskAction}`,
                `Safest primary check: ${identity.primaryCheck}`,
                angleByIntent[intent] || angleByIntent.verification
              ],
              answerShape: {
                openingRequirement: "First sentence should directly answer the likely query in plain English.",
                bodyRequirement: "Support the answer with specific scenario-level red flags and safe checks.",
                closingRequirement: "End with calm, practical next steps."
              },
              validationRequirements: [
                "The HTML should include at least 3 h3 headings.",
                "The HTML should include at least one ul list.",
                "The content should be additive and not mirror the title or h1.",
                "The content should feel unique to this page."
              ],
              avoidOverlap: {
                existingTitle: context.pageTitle,
                existingMetaDescription: context.metaDescription,
                existingH1: context.h1,
                existingExcerpt: context.existingExcerpt.slice(0, MAX_OVERLAP_EXCERPT),
                instruction: "Use the existing page context to avoid repeating the same phrasing and to make the new block additive."
              },
              similarityProfile
            };
          }

          function buildTargetedEditorialDirectives(slug, identity, intent, context, similarityProfile) {
            const base = buildEditorialDirectives(slug, identity, intent, context, similarityProfile);

            return {
              ...base,
              editorialGoal: "Rewrite this specific page now. This is a direct targeted rewrite request, so produce strong, useful, page-specific HTML that can replace the current generated block immediately.",
              structureRules: [
                "Return HTML only.",
                "Write a useful replacement block for this page now.",
                "Use short sections and keep it skimmable.",
                "Prefer 3 h3 sections and one short ul list.",
                "Aim for roughly 220 to 450 words."
              ],
              validationRequirements: [
                "The content should be page-specific.",
                "The content should be additive and useful.",
                "The content should avoid generic filler."
              ]
            };
          }

          function hasRequiredStructure(html) {
            const h3Count = (html.match(/<h3\b/gi) || []).length;
            const hasList = /<ul\b[\s\S]*?<\/ul>/i.test(html);
            const hasParagraph = /<p\b[\s\S]*?<\/p>/i.test(html);

            return {
              ok: h3Count >= 3 && hasList && hasParagraph,
              h3Count,
              hasList,
              hasParagraph
            };
          }

          function isGenericContent(text) {
            const lowered = text.toLowerCase();
            const banned = [
              "in today's digital world",
              "ever evolving threats",
              "ever-evolving threats",
              "it is important to stay vigilant",
              "always do your research",
              "scammers are becoming more sophisticated",
              "one of the most common scams",
              "this can be a scam",
              "this could be a scam"
            ];

            return banned.some((item) => lowered.includes(item));
          }

          function firstSentence(text) {
            const match = text.match(/[^.!?]+[.!?]/);
            return match ? match[0].trim() : text.slice(0, 160).trim();
          }

          function looksAdditive(text, context) {
            const first = firstSentence(text).toLowerCase();
            const title = (context.pageTitle || "").toLowerCase().trim();
            const h1 = (context.h1 || "").toLowerCase().trim();

            if (!first) return false;
            if (title && first === title) return false;
            if (h1 && first === h1) return false;

            return true;
          }

          function validateGeneratedContent(content, context, { forceTargetRewrite = false } = {}) {
            if (!content) return false;
            if (content.length > MAX_CONTENT_LENGTH) return false;

            const plain = htmlToPlainText(content);
            if (plain.length < (forceTargetRewrite ? TARGET_MIN_CONTENT_LENGTH : MIN_CONTENT_LENGTH)) return false;
            if (isGenericContent(plain)) return false;
            if (!looksAdditive(plain, context)) return false;

            if (forceTargetRewrite) {
              return true;
            }

            const structure = hasRequiredStructure(content);
            if (!structure.ok) return false;

            return true;
          }

          async function postJsonWithTimeout(url, body) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
                signal: controller.signal
              });

              return response;
            } finally {
              clearTimeout(timeout);
            }
          }

          async function generate(payload, context, options = {}) {
            try {
              console.log(`Calling API for: ${context.slug}`);

              const responsePayload = {
                keyword: payload.keyword,
                keywordSet: payload.keywordSet,
                intent: payload.intent,
                angle: payload.angle,
                crawl: payload.crawl,
                depth: payload.depth,
                identity: payload.identity,
                pageContext: payload.pageContext,
                directives: payload.directives,
                similarity: payload.similarity,
                mode: payload.mode,
                seed: payload.seed
              };

              const res = await postJsonWithTimeout(API_URL, responsePayload);

              if (!res.ok) {
                const body = await res.text().catch(() => "");
                console.log(`API request failed: ${res.status} ${res.statusText}`);
                console.log(`Response body: ${body}`);
                return null;
              }

              const data = await res.json().catch(() => null);

              if (!data || typeof data.content !== "string") {
                console.log(`Invalid API response for ${context.slug}`);
                return null;
              }

              const text = data.content.trim();
              console.log(`Received content length for ${context.slug}: ${text.length}`);

              if (!validateGeneratedContent(text, context, options)) {
                console.log(`Validation failed for ${context.slug}`);
                return null;
              }

              return text;
            } catch (err) {
              console.log(`Generate failed for ${context.slug}: ${err?.message || "unknown_error"}`);
              return null;
            }
          }

          async function generateTargetedContent(basePayload, context) {
            const attempts = [
              {
                ...basePayload,
                mode: "ranking_v10_targeted_force_rewrite",
                seed: `${context.slug}-${Date.now()}-1`
              },
              {
                ...basePayload,
                mode: "ranking_v10_targeted_force_rewrite_retry",
                directives: {
                  ...basePayload.directives,
                  editorialGoal: "Rewrite this page now with stronger specificity and clearer HTML structure. Use a practical intro, 3 h3 sections, and one short ul list.",
                  structureRules: [
                    "Return HTML only.",
                    "Use one short intro paragraph.",
                    "Use exactly 3 h3 headings.",
                    "Include one short ul list.",
                    "Keep it page-specific and useful.",
                    "Aim for roughly 220 to 450 words."
                  ]
                },
                seed: `${context.slug}-${Date.now()}-2`
              }
            ];

            for (const payload of attempts) {
              const content = await generate(payload, context, { forceTargetRewrite: true });
              if (content) return content;
            }

            throw new Error(`Targeted rewrite failed for ${context.slug}: API returned no usable content`);
          }

          function findMatchingDivEnd(html, openTagStart) {
            let pos = openTagStart;
            let depth = 0;

            while (pos < html.length) {
              const nextOpen = html.indexOf("<div", pos);
              const nextClose = html.indexOf("</div>", pos);

              if (nextClose === -1) return -1;

              if (nextOpen !== -1 && nextOpen < nextClose) {
                depth++;
                pos = nextOpen + 4;
              } else {
                depth--;
                pos = nextClose + 6;
                if (depth === 0) return pos;
              }
            }

            return -1;
          }

          function findContentBlock(html) {
            const re = /<div\b[^>]*class=(["'])[^"']*\bcontent-block\b[^"']*\1[^>]*>/i;
            const match = re.exec(html);

            if (!match) return null;

            const start = match.index;
            const openEnd = start + match[0].length;
            const end = findMatchingDivEnd(html, start);

            if (end === -1) return null;

            return { start, openEnd, end };
          }

          function buildManagedBlock(content, { forceRewriteMarker = false } = {}) {
            const marker = forceRewriteMarker ? `\n<!-- TARGET_REWRITE:${Date.now()} -->` : "";
            return `${GENERATED_START}\n${content}${marker}\n${GENERATED_END}`;
          }

          function inject(html, content, { forceRewriteMarker = false } = {}) {
            if (!content) return html;

            const managed = buildManagedBlock(content, { forceRewriteMarker });

            const existingStart = html.indexOf(GENERATED_START);
            const existingEnd = html.indexOf(GENERATED_END);

            if (existingStart !== -1 && existingEnd !== -1 && existingEnd > existingStart) {
              return html.slice(0, existingStart) + managed + html.slice(existingEnd + GENERATED_END.length);
            }

            const block = findContentBlock(html);

            if (block) {
              return html.slice(0, block.openEnd) + "\n" + managed + "\n" + html.slice(block.end - 6);
            }

            if (html.includes("</body>")) {
              return html.replace("</body>", `<div class="content-block">\n${managed}\n</div>\n</body>`);
            }

            return html + `\n<div class="content-block">\n${managed}\n</div>\n`;
          }

          function buildAuditReport(queue) {
            return queue.map((item) => ({
              slug: item.slug,
              similarity: item.similarity.highestSimilarity,
              tooSimilar: item.similarity.tooSimilar,
              similarPages: item.similarity.similarPages,
              excerptLength: item.context.existingExcerpt.length,
              thinContent: item.context.existingExcerpt.length < THIN_CONTENT_THRESHOLD,
              qualityScore: item.qualityScore
            }));
          }

          async function main() {
            if (!fs.existsSync(ROOT)) {
              throw new Error(`Root folder not found: ${ROOT}`);
            }

            let pages;

            if (IS_TARGETED_RUN) {
              const single = resolveTargetPath(TARGET_PATH);
              pages = [single];
              console.log("Processing single page:", single);
            } else {
              pages = getPages(ROOT);
              console.log("Scanned pages:", pages.length);
            }

            const pageRecords = pages.map((page) => {
              const slug = slugFromPath(page);
              const html = fs.readFileSync(page, "utf8");
              const context = extractPageContext(html, slug);
              const fingerprint = buildPageFingerprint(slug, context);

              return {
                path: page,
                slug,
                html,
                context,
                fingerprint
              };
            });

            const similarityMap = buildSimilarityMap(pageRecords);

            let queue = pageRecords.map((record) => {
              const similarity = similarityMap.get(record.path) || {
                highestSimilarity: 0,
                tooSimilar: false,
                similarPages: []
              };

              const enriched = {
                ...record,
                similarity
              };

              enriched.qualityScore = buildQualityScore(enriched);
              return enriched;
            });

            if (!IS_TARGETED_RUN) {
              queue = queue
                .sort((a, b) => {
                  if (b.qualityScore !== a.qualityScore) {
                    return b.qualityScore - a.qualityScore;
                  }
                  return a.slug.localeCompare(b.slug);
                })
                .slice(0, LIMIT);
            }

            console.log("Selected pages:", queue.length);
            for (const item of queue) {
              console.log(
                `Queued: ${item.slug} | quality=${item.qualityScore} | similarity=${item.similarity.highestSimilarity} | excerptLen=${item.context.existingExcerpt.length}`
              );
            }

            if (MODE === "audit") {
              const report = buildAuditReport(queue);
              console.log("AUDIT REPORT:");
              console.log(JSON.stringify(report, null, 2));
              console.log("DONE (audit only)");
              return;
            }

            let changed = false;

            for (const record of queue) {
              const slug = record.slug;
              const html = record.html;
              const identity = buildPageIdentity(slug);
              const intent = detectIntent(slug);
              const keywords = buildKeywordSet(slug, identity);
              const crawl = buildCrawlSignals();
              const depth = buildContentDepth(intent, identity);
              const angle = buildSERPAngle(intent, slug.length, identity);

              const directives = IS_TARGETED_RUN
                ? buildTargetedEditorialDirectives(slug, identity, intent, record.context, record.similarity)
                : buildEditorialDirectives(slug, identity, intent, record.context, record.similarity);

              const payload = {
                keyword: keywords.primary,
                keywordSet: keywords,
                intent,
                angle,
                crawl,
                depth,
                identity,
                pageContext: record.context,
                directives,
                similarity: record.similarity,
                mode: IS_TARGETED_RUN
                  ? "ranking_v10_targeted_force_rewrite"
                  : "ranking_v9_editorial_audit_rewrite",
                seed: `${slug}-${Date.now()}`
              };

              let apiContent;

              if (IS_TARGETED_RUN) {
                apiContent = await generateTargetedContent(payload, record.context);
              } else {
                apiContent = await generate(payload, record.context, { forceTargetRewrite: false });
              }

              if (!apiContent) {
                console.log(`Skipped: ${slug}`);
                continue;
              }

              const updated = inject(html, apiContent, { forceRewriteMarker: IS_TARGETED_RUN });

              if (IS_TARGETED_RUN) {
                fs.writeFileSync(record.path, updated, "utf8");
                changed = true;
                console.log(`Force-updated: ${slug}`);
                continue;
              }

              if (updated !== html) {
                fs.writeFileSync(record.path, updated, "utf8");
                changed = true;
                console.log(`Updated: ${slug}`);
              } else {
                console.log(`No change: ${slug}`);
              }
            }

            console.log(changed ? "DONE (changes applied)" : "DONE (no changes)");
          }

          main().catch((err) => {
            console.error("Fatal error:", err && err.stack ? err.stack : err);
            process.exit(1);
          });
          EOF

      - name: Commit changes
        if: ${{ github.event.inputs.mode != 'audit' }}
        run: |
          git config user.name "seo-bot"
          git config user.email "actions@github.com"

          if git diff --quiet -- scam-check-now; then
            echo "No changes"
            exit 0
          fi

          git add scam-check-now
          git commit -m "SEO engine v12.1 (seo-content-v2 + audit fix + cleaner commit behavior)"
          git push 
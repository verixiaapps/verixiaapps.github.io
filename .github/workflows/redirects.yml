name: Fix nexus-dex Redirects

on:
 workflow_dispatch:

jobs:
 fix-redirects:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4

     - name: Overwrite nexus-dex redirect files
       run: |
         HTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><script>const p=["0-5-percent-slippage-too-high-solana","1-percent-slippage-safe-solana","aave-swap","aave-trading","ai16z-swap","ai16z-trading","altcoin-exchange","altcoin-swap","anonymous-bridge-crypto","anonymous-crypto-exchange","anonymous-defi","anonymous-solana-token-swap","anonymous-token-swap","aptos-bridge-from-solana","aptos-network-swap","arbitrum-bridge-from-solana","arbitrum-dex","arbitrum-network-swap","arbitrum-to-solana","atlas-solana-dex-swap","avalanche-bridge-from-solana","avalanche-dex","avalanche-network-swap","avalanche-to-solana","avoid-mev-solana-swap","base-bridge-from-solana","base-dex","base-network-swap","base-to-solana","best-altcoin-dex","best-birdeye-alternative-low-fees","best-bridge-for-solana","best-cross-chain-bridge","best-cross-chain-dex","best-cross-chain-swap","best-crypto-bridge","best-crypto-dex","best-crypto-swap-platform","best-decentralized-exchange","best-defi-exchange","best-dexscreener-alternative-low-fees","best-jupiter-alternative-low-fees","best-low-slippage-solana-dex","best-meme-coin-dex","best-meme-coin-exchange","best-meme-coin-swap","best-multi-chain-dex","best-no-kyc-dex","best-no-kyc-exchange","best-orca-alternative-low-fees","best-photon-alternative-low-fees","best-solana-bridge","best-solana-dex","best-solana-dex-for-backpack-wallet","best-solana-dex-for-large-swaps","best-solana-dex-for-low-cap-tokens","best-solana-dex-for-memecoin-trading","best-solana-dex-for-new-tokens","best-solana-dex-for-small-trades","best-solana-dex-for-whale-trades","best-solana-dex-on-android","best-solana-dex-on-iphone","best-solana-meme-coins","best-solana-swap","best-solana-swaps","best-solana-trading","best-swap-aggregator","best-swap-platform","best-swap-rates","best-token-exchange","best-token-swap","best-trade-execution","best-wallet-based-exchange","best-wallet-swap","birdeye-alternative-solana-dex","bonk-exchange","bonk-swap","bonk-token-swap","bridge-any-chain-to-solana","bridge-arbitrum-to-solana","bridge-avalanche-to-solana","bridge-base-to-solana","bridge-bnb-to-solana","bridge-crypto","bridge-ethereum-to-solana","bridge-optimism-to-solana"];window.location.replace("https://verixiaapps.com/nexusdex/"+p[Math.floor(Math.random()*p.length)]+"/");</script></head><body></body></html>'
         for DIR in nexus-dex/*/; do
           echo "$HTML" > "$DIR/index.html"
         done

     - name: Commit and push
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"
         git add nexus-dex/
         git diff --cached --quiet || git commit -m "Fix nexus-dex redirects to random nexusdex page"
         git push origin HEAD

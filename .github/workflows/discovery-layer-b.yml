name: Discovery Layer B

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: false

jobs:
  build-discovery-layer-b:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build discovery layer B
        run: node scripts/build-discovery-layer-b.js
        env:
          SITE_URL: https://verixiaapps.com
          SOURCE_SITEMAP_URL: https://verixiaapps.com/sitemap-b.xml
          DISCOVERY_SITEMAP_PATH: discovery-sitemap-b.xml
          DISCOVERY_DIR: discovery-b
          MAX_LATEST_URLS: "100"
          MAX_TODAY_URLS: "100"
          MAX_THIS_WEEK_URLS: "700"
          MAX_HTML_SITEMAP_URLS: "500"
          MAX_FEED_URLS: "100"

      - name: Build sitemap B
        run: python scripts/build-sitemap-b.py

      - name: Commit and push discovery files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add discovery-sitemap-b.xml discovery-b sitemap-b.xml

          if git diff --cached --quiet; then
            echo "No discovery B changes to commit."
            exit 0
          fi

          git commit -m "Update discovery layer B"

          git pull --rebase origin main
          git push origin HEAD:main
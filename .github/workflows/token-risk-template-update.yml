# .github/workflows/update-token-risk-template.yml
name: Update Token Risk Template

on:
  workflow_dispatch:
    inputs:
      target_template_file:
        description: "Template file to update"
        required: true
        default: "token-risk-template/token-risk-template-a.html"
      dry_run:
        description: "Preview only"
        required: true
        type: boolean
        default: false
      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-token-risk-template
  cancel-in-progress: false

jobs:
  update-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run token risk template updater
        env:
          TARGET_TEMPLATE_FILE: ${{ github.event.inputs.target_template_file }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/update-token-risk-template.js

      - name: Commit changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.target_template_file }}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          COMMIT_MSG="${{ github.event.inputs.commit_message }}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="Update token risk template"
          fi

          git commit -m "$COMMIT_MSG"
          git push
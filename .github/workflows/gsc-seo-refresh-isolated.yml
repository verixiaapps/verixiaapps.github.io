name: GSC SEO Refresh Isolated

"on":
  workflow_dispatch:
    inputs:
      refresh_scope:
        description: "What kind of GSC optimization refresh to run"
        required: true
        default: "internal-links"
        type: choice
        options:
          - internal-links
          - metadata
      max_urls_to_refresh:
        description: "How many top exact GSC pages to update this run"
        required: true
        default: "10"
        type: string
      dry_run:
        description: "Run without committing changes"
        required: true
        default: false
        type: boolean
      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: gsc-seo-refresh-isolated
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GSC_REFRESH_ROOT: "gsc-refresh"
      GSC_INPUT_DIR: "gsc-refresh/input"
      GSC_OUTPUT_DIR: "gsc-refresh/output"
      GSC_STATE_DIR: "gsc-refresh/state"
      DEFAULT_COMMIT_MESSAGE: "GSC SEO page refresh batch"
      TARGET_TEMPLATE: "a"
      REFRESH_SCOPE: ${{ inputs.refresh_scope }}
      MAX_URLS_TO_REFRESH: ${{ inputs.max_urls_to_refresh }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "gsc-refresh-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Sync latest main before run
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$MAX_URLS_TO_REFRESH" =~ ^[0-9]+$ ]] || [ "$MAX_URLS_TO_REFRESH" -le 0 ]; then
            echo "Invalid MAX_URLS_TO_REFRESH: $MAX_URLS_TO_REFRESH"
            exit 1
          fi

          case "$REFRESH_SCOPE" in
            internal-links|metadata) ;;
            *)
              echo "Invalid REFRESH_SCOPE: $REFRESH_SCOPE"
              exit 1
              ;;
          esac

      - name: Ensure isolated workflow directories exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GSC_INPUT_DIR" "$GSC_OUTPUT_DIR" "$GSC_STATE_DIR"
          touch "$GSC_STATE_DIR/.gitkeep"

      - name: Ensure refresh script exists
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "scripts/gsc_refresh_isolated.py" ]; then
            echo "Missing script: scripts/gsc_refresh_isolated.py"
            exit 1
          fi

      - name: Run isolated GSC refresh script
        shell: bash
        run: |
          set -euo pipefail
          python scripts/gsc_refresh_isolated.py
        env:
          TARGET_TEMPLATE: ${{ env.TARGET_TEMPLATE }}
          REFRESH_SCOPE: ${{ env.REFRESH_SCOPE }}
          MAX_URLS_TO_REFRESH: ${{ env.MAX_URLS_TO_REFRESH }}
          GSC_INPUT_DIR: ${{ env.GSC_INPUT_DIR }}
          GSC_OUTPUT_DIR: ${{ env.GSC_OUTPUT_DIR }}
          GSC_STATE_DIR: ${{ env.GSC_STATE_DIR }}
          DRY_RUN: ${{ env.DRY_RUN }}

      - name: Show changed files
        shell: bash
        run: |
          set -euo pipefail
          git status --short

      - name: Stop on dry run
        if: inputs.dry_run == true
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run complete. No commit or push performed."

      - name: Commit isolated GSC refresh changes
        if: inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail

          git add -- ':(glob)scam-check-now/**/index.html' ':(glob)scam-check-now-b/**/index.html' ':(glob)scam-check-now-c/**/index.html'

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          FINAL_COMMIT_MESSAGE="${{ inputs.commit_message }}"

          if [ -z "$FINAL_COMMIT_MESSAGE" ]; then
            FINAL_COMMIT_MESSAGE="${DEFAULT_COMMIT_MESSAGE} | scope=${REFRESH_SCOPE} | count=${MAX_URLS_TO_REFRESH}"
          fi

          git commit -m "$FINAL_COMMIT_MESSAGE"

      - name: Push isolated GSC refresh changes
        if: inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
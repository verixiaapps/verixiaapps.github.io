name: Fix legacy related category line (scam-check-now only)

on:
  workflow_dispatch:
    inputs:
      max_files:
        description: "Maximum files to update. Use 1 for testing, 0 for all matching files."
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  fix-category-line:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fix legacy related category line in scam-check-now
        shell: bash
        env:
          MAX_FILES: ${{ github.event.inputs.max_files }}
        run: |
          set -euo pipefail

          python - << 'PY'
          import os
          import re
          import sys

          BASE_DIR = "scam-check-now"
          raw_max = os.environ.get("MAX_FILES", "1").strip()

          try:
              max_files = int(raw_max)
          except ValueError:
              print(f"Invalid MAX_FILES value: {raw_max}")
              sys.exit(1)

          if max_files < 0:
              print(f"MAX_FILES must be 0 or greater. Got: {max_files}")
              sys.exit(1)

          if not os.path.isdir(BASE_DIR):
              print(f"Missing directory: {BASE_DIR}")
              sys.exit(1)

          def fix_related_category_fragment(fragment: str) -> str:
              updated = fragment

              # Fix duplicated label
              updated = re.sub(
                  r"Related scam category:?\s*Related scam category\s*",
                  "Related scam category: ",
                  updated,
              )

              # Fix single-string visible text:
              # Related scam category Verification Code Scam Hub
              updated = re.sub(
                  r"Related scam category\s+([A-Z][A-Za-z0-9&/\-,'() ]{2,120}?(?: Scam Hub| Hub))",
                  r"Related scam category: \1",
                  updated,
              )

              # Fix glued plain-text form:
              # Related scam categoryVerification Code Scam Hub
              updated = re.sub(
                  r"Related scam category(?::)?([A-Z][A-Za-z0-9&/\-,'() ]{2,120}?(?: Scam Hub| Hub))",
                  r"Related scam category: \1",
                  updated,
              )

              # Fix glued anchor form:
              # Related scam category<a ...>
              updated = re.sub(
                  r"Related scam category\s*(<a\b)",
                  r"Related scam category: \1",
                  updated,
              )

              # Collapse accidental double colon
              updated = re.sub(
                  r"Related scam category:\s*:",
                  "Related scam category:",
                  updated,
              )

              return updated

          def fix_content(content: str) -> str:
              marker_match = re.search(r"RELATED SCAM CATEGORY", content)
              if not marker_match:
                  return content

              start = marker_match.start()
              window_end = min(len(content), start + 3000)

              before = content[:start]
              target = content[start:window_end]
              after = content[window_end:]

              fixed_target = fix_related_category_fragment(target)
              return before + fixed_target + after

          updated_files = 0
          changed_paths = []

          for root, dirs, files in os.walk(BASE_DIR):
              dirs.sort()
              files.sort()

              for file in files:
                  if file != "index.html":
                      continue

                  path = os.path.join(root, file)

                  with open(path, "r", encoding="utf-8") as f:
                      original = f.read()

                  updated = fix_content(original)

                  if updated != original:
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(updated)

                      updated_files += 1
                      changed_paths.append(path)
                      print(f"UPDATED: {path}")

                      if max_files != 0 and updated_files >= max_files:
                          print("\nReached max_files limit. Stopping early.")
                          print(f"Total updated files: {updated_files}")
                          print("Changed files:")
                          for p in changed_paths:
                              print(f" - {p}")
                          sys.exit(0)

          print(f"\nTotal updated files: {updated_files}")
          if changed_paths:
              print("Changed files:")
              for p in changed_paths:
                  print(f" - {p}")
          PY

      - name: Show changed files
        shell: bash
        run: |
          set -euo pipefail
          git status --short scam-check-now

      - name: Commit changes
        shell: bash
        env:
          MAX_FILES: ${{ github.event.inputs.max_files }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add scam-check-now

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          if [ "${MAX_FILES}" = "1" ]; then
            COMMIT_MSG="Fix legacy related category line in scam-check-now (test 1 file)"
          elif [ "${MAX_FILES}" = "0" ]; then
            COMMIT_MSG="Fix legacy related category line in scam-check-now"
          else
            COMMIT_MSG="Fix legacy related category line in scam-check-now (limited run: ${MAX_FILES} files)"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin HEAD:main
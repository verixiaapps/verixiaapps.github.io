name: Embedded Upgrade Updater

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose what to update"
        required: true
        default: "single_page"
        type: choice
        options:
          - single_page
          - folder
          - all

      target_folder:
        description: "Folder to target when run_mode=folder"
        required: true
        default: "scam-check-now"
        type: choice
        options:
          - scam-check-now
          - scam-check-now-b
          - scam-check-now-c

      page_path:
        description: "Exact page path when run_mode=single_page (example: scam-check-now-b/is-payment-overdue-text-legit-or-scam/index.html)"
        required: false
        default: ""

      dry_run:
        description: "Preview only, do not write changes"
        required: true
        default: true
        type: boolean

      commit_message:
        description: "Optional custom commit message"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: embedded-upgrade-updater
  cancel-in-progress: false

jobs:
  update-embedded-upgrade:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: ${{ inputs.run_mode }}
      TARGET_FOLDER: ${{ inputs.target_folder }}
      PAGE_PATH: ${{ inputs.page_path }}
      DRY_RUN: ${{ inputs.dry_run }}
      COMMIT_MESSAGE: ${{ inputs.commit_message }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run embedded upgrade updater
        run: node scripts/update-embedded-upgrade.js

      - name: Show git diff summary
        if: always()
        run: |
          echo "Changed files:"
          git diff --name-only || true
          echo ""
          echo "Diff stat:"
          git diff --stat || true

      - name: Commit changes
        if: env.DRY_RUN != 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FINAL_MESSAGE="${COMMIT_MESSAGE}"
          if [ -z "$FINAL_MESSAGE" ]; then
            if [ "$RUN_MODE" = "single_page" ]; then
              FINAL_MESSAGE="Update embedded upgrade on single SEO page"
            elif [ "$RUN_MODE" = "folder" ]; then
              FINAL_MESSAGE="Update embedded upgrade on ${TARGET_FOLDER} SEO pages"
            else
              FINAL_MESSAGE="Update embedded upgrade on all SEO pages"
            fi
          fi

          git add scam-check-now scam-check-now-b scam-check-now-c scripts/update-embedded-upgrade.js scripts/fragments/embedded-upgrade-script.html 2>/dev/null || true
          git commit -m "$FINAL_MESSAGE"
          git push
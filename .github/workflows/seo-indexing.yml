name: SEO Indexing

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: write

concurrency:
  group: seo-indexing
  cancel-in-progress: false

jobs:
  prepare-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read sitemap URLs
        run: python scripts/read_sitemap_urls.py

      - name: Commit refreshed URL list
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add seo-indexing/urls_to_ping.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh SEO indexing URL list"
            git push
          fi
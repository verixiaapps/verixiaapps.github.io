name: Auto SEO Internal Linking + Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run auto linking script
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const ROOT = './scam-check-now';
          const BACKUP = './backup';
          const RELATED_COUNT = 5;
          const MORE_COUNT = 10;

          if (!fs.existsSync(ROOT)) {
            console.error(`Missing root folder: ${ROOT}`);
            process.exit(1);
          }

          if (!fs.existsSync(BACKUP)) {
            fs.mkdirSync(BACKUP, { recursive: true });
          }

          function getAllPages(dir) {
            let results = [];
            const list = fs.readdirSync(dir);

            list.forEach(file => {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                results = results.concat(getAllPages(fullPath));
              } else if (file === 'index.html') {
                results.push(fullPath);
              }
            });

            return results;
          }

          function shuffle(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
          }

          function pickLinks(allPages, current, count) {
            return shuffle(allPages.filter(p => p !== current)).slice(0, count);
          }

          function hrefFromPath(filePath) {
            const normalized = filePath.replace(/\\/g, '/').replace(/^\.\//, '');
            return '/' + normalized.replace(/\/index\.html$/i, '/');
          }

          function slugFromPath(filePath) {
            const normalized = filePath.replace(/\\/g, '/');
            const withoutIndex = normalized.replace(/\/index\.html$/i, '');
            const parts = withoutIndex.split('/').filter(Boolean);
            return parts[parts.length - 1] || '';
          }

          function wordFromToken(token) {
            const specialWords = {
              usps: 'USPS',
              ups: 'UPS',
              fedex: 'FedEx',
              td: 'TD',
              bank: 'Bank',
              paypal: 'PayPal',
              venmo: 'Venmo',
              zelle: 'Zelle',
              cash: 'Cash',
              app: 'App',
              amazon: 'Amazon',
              coinbase: 'Coinbase',
              chase: 'Chase',
              ebay: 'eBay',
              apple: 'Apple',
              crypto: 'Crypto',
              telegram: 'Telegram',
              whatsapp: 'WhatsApp',
              google: 'Google',
              login: 'Login',
              text: 'Text',
              email: 'Email',
              message: 'Message',
              alert: 'Alert',
              code: 'Code',
              refund: 'Refund',
              wire: 'Wire',
              transfer: 'Transfer',
              link: 'Link',
              account: 'Account',
              verification: 'Verification',
              unusual: 'Unusual',
              activity: 'Activity',
              customs: 'Customs',
              fee: 'Fee',
              support: 'Support',
              debit: 'Debit',
              fraud: 'Fraud',
              issue: 'Issue',
              package: 'Package',
              missed: 'Missed',
              delivery: 'Delivery',
              safe: 'Safe',
              real: 'Real',
              fake: 'Fake',
              legit: 'Legit',
              scam: 'Scam'
            };

            return specialWords[token] || token.charAt(0).toUpperCase() + token.slice(1);
          }

          function wordsToPhrase(words) {
            return words.map(wordFromToken).join(' ');
          }

          function cleanupQuestion(text) {
            return text
              .replace(/\s+Or\s+Scam$/i, ' Legit or a Scam')
              .replace(/\s+Or\s+Legit$/i, ' Legit or a Scam')
              .replace(/\s+Real\s+Or\s+Fake$/i, ' Real or Fake')
              .replace(/\s+Safe\s+Or\s+Scam$/i, ' Safe or a Scam')
              .replace(/\s+/g, ' ')
              .trim();
          }

          function titleFromSlug(slug) {
            if (!slug) return 'Check Similar Message';

            if (slug.startsWith('did-i-get-scammed-by-')) {
              const coreWords = slug
                .replace(/^did-i-get-scammed-by-/, '')
                .split('-')
                .filter(Boolean);

              return `Did I Get Scammed by ${wordsToPhrase(coreWords)}?`;
            }

            if (slug.startsWith('is-')) {
              const coreWords = slug
                .replace(/^is-/, '')
                .split('-')
                .filter(Boolean);

              const core = cleanupQuestion(wordsToPhrase(coreWords));
              return `Is ${core}?`;
            }

            return wordsToPhrase(slug.split('-').filter(Boolean));
          }

          function buildLinkHTML(links) {
            return links.map(link => {
              const slug = slugFromPath(link);
              const text = titleFromSlug(slug);
              const href = hrefFromPath(link);
              return `<li><a href="${href}">${text}</a></li>`;
            }).join('\n');
          }

          function updateSection(html, id, linksHTML) {
            const regex = new RegExp(`<ul id="${id}"[^>]*>[\\s\\S]*?<\\/ul>`, 'i');

            if (!regex.test(html)) {
              return html;
            }

            return html.replace(
              regex,
              `<ul id="${id}" class="related-links">\n${linksHTML}\n</ul>`
            );
          }

          const pages = getAllPages(ROOT);

          pages.forEach(page => {
            const original = fs.readFileSync(page, 'utf8');

            const backupName = page.replace(/[\\/]/g, '_');
            const backupPath = path.join(BACKUP, backupName);
            fs.writeFileSync(backupPath, original);

            const related = buildLinkHTML(pickLinks(pages, page, RELATED_COUNT));
            const more = buildLinkHTML(pickLinks(pages, page, MORE_COUNT));

            let updated = original;
            updated = updateSection(updated, 'relatedLinks', related);
            updated = updateSection(updated, 'moreLinks', more);

            if (updated !== original) {
              fs.writeFileSync(page, updated);
              console.log(`Updated: ${page}`);
            } else {
              console.log(`Skipped: ${page}`);
            }
          });

          console.log(`Processed ${pages.length} pages`);
          EOF

      - name: Commit changes
        run: |
          git config user.name "seo-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto internal linking + backup update" || echo "No changes"
          git push
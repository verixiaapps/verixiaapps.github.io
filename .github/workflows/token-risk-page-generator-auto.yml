name: Token Risk SEO Page Generator Auto

"on":
  workflow_dispatch: 
    inputs:
      manual_daily_limit:
        description: "Pages to generate on this manual run"
        required: false
        default: "1000"
        type: string
      full_rebuild:
        description: "Optional manual rebuild of generated /token-risk/ pages only"
        required: false
        default: false
        type: boolean
      rebuild_daily_limit:
        description: "Total pages to rebuild during this manual rebuild run (leave blank to rebuild all remaining pages in one run)"
        required: false
        default: ""
        type: string
      rebuild_batch_size:
        description: "How many pages to rebuild per committed batch"
        required: false
        default: "50"
        type: string

permissions:
  contents: write
  workflows: write

concurrency:
  group: token-risk-writer
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      KEYWORDS_FILE: "data/token_keywords.txt"
      GENERATED_KEYWORDS_FILE: "data/token_generated_keywords.txt"
      GENERATED_SLUGS_FILE: "data/token_generated_slugs.txt"
      OUTPUT_DIR: "token-risk"
      PROTECTED_SLUG: ""
      REBUILD_KEYWORDS_SOURCE_FILE: "data/rebuild_keywords_source_tokenrisk.txt"
      REBUILD_SLUGS_SOURCE_FILE: "data/rebuild_slugs_source_tokenrisk.txt"
      REBUILD_PROGRESS_FILE: "data/rebuild_progress_tokenrisk.txt"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "token-risk-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Ensure tracking files exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$KEYWORDS_FILE")"
          mkdir -p "$(dirname "$GENERATED_KEYWORDS_FILE")"
          mkdir -p "$(dirname "$GENERATED_SLUGS_FILE")"
          mkdir -p "$(dirname "$REBUILD_KEYWORDS_SOURCE_FILE")"
          mkdir -p "$(dirname "$REBUILD_SLUGS_SOURCE_FILE")"
          mkdir -p "$(dirname "$REBUILD_PROGRESS_FILE")"
          mkdir -p "$OUTPUT_DIR"
          touch "$KEYWORDS_FILE"
          touch "$GENERATED_KEYWORDS_FILE"
          touch "$GENERATED_SLUGS_FILE"

      - name: Set effective limits
        id: limits
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MANUAL_DAILY_LIMIT: ${{ github.event.inputs.manual_daily_limit }}
          INPUT_FULL_REBUILD: ${{ github.event.inputs.full_rebuild }}
          INPUT_REBUILD_DAILY_LIMIT: ${{ github.event.inputs.rebuild_daily_limit }}
          INPUT_REBUILD_BATCH_SIZE: ${{ github.event.inputs.rebuild_batch_size }}
        run: |
          set -euo pipefail
          FULL_REBUILD="false"
          EFFECTIVE_DAILY_LIMIT="1000"
          REBUILD_BATCH_SIZE="50"
          REBUILD_ALL_REMAINING="false"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MANUAL_DAILY_LIMIT="${INPUT_MANUAL_DAILY_LIMIT:-}"
            if [ -n "$MANUAL_DAILY_LIMIT" ]; then
              EFFECTIVE_DAILY_LIMIT="$MANUAL_DAILY_LIMIT"
            fi
            if [ "${INPUT_FULL_REBUILD:-false}" = "true" ]; then
              FULL_REBUILD="true"
              if [ -n "${INPUT_REBUILD_BATCH_SIZE:-}" ]; then
                REBUILD_BATCH_SIZE="$INPUT_REBUILD_BATCH_SIZE"
              fi
              REBUILD_DAILY_LIMIT="${INPUT_REBUILD_DAILY_LIMIT:-}"
              if [ -n "$REBUILD_DAILY_LIMIT" ]; then
                EFFECTIVE_DAILY_LIMIT="$REBUILD_DAILY_LIMIT"
              else
                EFFECTIVE_DAILY_LIMIT="ALL"
                REBUILD_ALL_REMAINING="true"
              fi
            fi
          fi
          if [ "$EFFECTIVE_DAILY_LIMIT" != "ALL" ]; then
            if ! [[ "$EFFECTIVE_DAILY_LIMIT" =~ ^[0-9]+$ ]] || [ "$EFFECTIVE_DAILY_LIMIT" -le 0 ]; then
              echo "Invalid EFFECTIVE_DAILY_LIMIT: $EFFECTIVE_DAILY_LIMIT"
              exit 1
            fi
          fi
          if ! [[ "$REBUILD_BATCH_SIZE" =~ ^[0-9]+$ ]] || [ "$REBUILD_BATCH_SIZE" -le 0 ]; then
            echo "Invalid REBUILD_BATCH_SIZE: $REBUILD_BATCH_SIZE"
            exit 1
          fi
          echo "full_rebuild=$FULL_REBUILD" >> "$GITHUB_OUTPUT"
          echo "effective_daily_limit=$EFFECTIVE_DAILY_LIMIT" >> "$GITHUB_OUTPUT"
          echo "rebuild_batch_size=$REBUILD_BATCH_SIZE" >> "$GITHUB_OUTPUT"
          echo "rebuild_all_remaining=$REBUILD_ALL_REMAINING" >> "$GITHUB_OUTPUT"

      - name: Prepare rebuild source and progress state
        if: steps.limits.outputs.full_rebuild == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp "$KEYWORDS_FILE" "$RUNNER_TEMP/original_token_keywords_queue.txt"
          if [ ! -s "$GENERATED_KEYWORDS_FILE" ]; then
            echo "token_generated_keywords.txt is missing or empty. Refusing rebuild."
            exit 1
          fi
          if [ ! -s "$GENERATED_SLUGS_FILE" ]; then
            echo "token_generated_slugs.txt is missing or empty. Refusing rebuild."
            exit 1
          fi
          generated_keywords_count=$(wc -l < "$GENERATED_KEYWORDS_FILE" | tr -d ' ')
          generated_slugs_count=$(wc -l < "$GENERATED_SLUGS_FILE" | tr -d ' ')
          if [ "$generated_keywords_count" -ne "$generated_slugs_count" ]; then
            echo "Generated files not line-aligned."
            exit 1
          fi
          keywords_source_exists="false"
          slugs_source_exists="false"
          progress_exists="false"
          [ -f "$REBUILD_KEYWORDS_SOURCE_FILE" ] && keywords_source_exists="true"
          [ -f "$REBUILD_SLUGS_SOURCE_FILE" ] && slugs_source_exists="true"
          [ -f "$REBUILD_PROGRESS_FILE" ] && progress_exists="true"
          if [ "$keywords_source_exists" = "false" ] && [ "$slugs_source_exists" = "false" ] && [ "$progress_exists" = "false" ]; then
            cp "$GENERATED_KEYWORDS_FILE" "$REBUILD_KEYWORDS_SOURCE_FILE"
            cp "$GENERATED_SLUGS_FILE" "$REBUILD_SLUGS_SOURCE_FILE"
            echo "0" > "$REBUILD_PROGRESS_FILE"
          elif [ "$keywords_source_exists" = "true" ] && [ "$slugs_source_exists" = "true" ] && [ "$progress_exists" = "true" ]; then
            echo "Resuming rebuild."
          else
            echo "Rebuild state files inconsistent."
            exit 1
          fi

      - name: Standard incremental build in batches of 30
        if: steps.limits.outputs.full_rebuild != 'true'
        shell: bash
        env:
          TOTAL_LIMIT: ${{ steps.limits.outputs.effective_daily_limit }}
          BATCH_SIZE: "30"
        run: |
          set -euo pipefail
          get_lastmod() {
            local file_path="$1"
            local commit_date
            commit_date=$(git log -1 --format=%cs -- "$file_path" 2>/dev/null || true)
            if [ -n "$commit_date" ]; then echo "$commit_date"; else date -u +%F; fi
          }
          build_sitemap() {
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
              find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
                [ -f "$dir/index.html" ] || continue
                slug=$(basename "$dir")
                page_lastmod=$(get_lastmod "$dir/index.html")
                echo "<url><loc>https://verixiaapps.com/token-risk/$slug/</loc><lastmod>${page_lastmod}</lastmod></url>"
              done
              echo '</urlset>'
            } > token-risk-sitemap.xml
          }
          commit_and_push() {
            local msg="$1"
            git add -A
            if git diff --cached --quiet; then return 0; fi
            git commit -m "$msg"
            git fetch origin main
            if git diff --quiet origin/main..HEAD; then return 0; fi
            git push --force-with-lease origin HEAD:main
          }
          total_processed=0
          batch_number=0
          while [ "$total_processed" -lt "$TOTAL_LIMIT" ]; do
            remaining=$((TOTAL_LIMIT - total_processed))
            current_batch_size="$BATCH_SIZE"
            if [ "$remaining" -lt "$current_batch_size" ]; then current_batch_size="$remaining"; fi
            if [ ! -s "$KEYWORDS_FILE" ]; then break; fi
            batch_number=$((batch_number + 1))
            before_count=$(wc -l < "$GENERATED_SLUGS_FILE" | tr -d ' ')
            DAILY_LIMIT="$current_batch_size" python scripts/build_token_seo_incremental.py
            python scripts/build_token_hubs.py
            build_sitemap
            after_count=$(wc -l < "$GENERATED_SLUGS_FILE" | tr -d ' ')
            produced=$((after_count - before_count))
            if [ "$produced" -le 0 ]; then
              commit_and_push "Token Risk SEO batch #$batch_number (no new pages)"
              break
            fi
            commit_and_push "Token Risk SEO batch #$batch_number (+$produced pages)"
            total_processed=$((total_processed + produced))
          done

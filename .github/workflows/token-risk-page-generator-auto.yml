name: Token Risk SEO Page Generator Auto

"on":
  workflow_dispatch:
    inputs:
      manual_daily_limit:
        description: "Pages to generate on this manual run"
        required: false
        default: "1000"
        type: string
      full_rebuild:
        description: "Optional manual rebuild of generated /token-risk/ pages only"
        required: false
        default: false
        type: boolean
      rebuild_daily_limit:
        description: "Total pages to rebuild during this manual rebuild run (leave blank to rebuild all remaining pages in one run)"
        required: false
        default: ""
        type: string
      rebuild_batch_size:
        description: "How many pages to rebuild per committed batch"
        required: false
        default: "50"
        type: string
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

concurrency:
  group: token-risk-writer
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 1000

    env:
      KEYWORDS_FILE: "data/token_keywords.txt"
      GENERATED_KEYWORDS_FILE: "data/token_generated_keywords.txt"
      GENERATED_SLUGS_FILE: "data/token_generated_slugs.txt"
      OUTPUT_DIR: "token-risk"
      PROTECTED_SLUG: ""
      REBUILD_KEYWORDS_SOURCE_FILE: "data/rebuild_keywords_source_tokenrisk.txt"
      REBUILD_SLUGS_SOURCE_FILE: "data/rebuild_slugs_source_tokenrisk.txt"
      REBUILD_PROGRESS_FILE: "data/rebuild_progress_tokenrisk.txt"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "token-risk-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Ensure tracking files exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$KEYWORDS_FILE")"
          mkdir -p "$(dirname "$GENERATED_KEYWORDS_FILE")"
          mkdir -p "$(dirname "$GENERATED_SLUGS_FILE")"
          mkdir -p "$(dirname "$REBUILD_KEYWORDS_SOURCE_FILE")"
          mkdir -p "$(dirname "$REBUILD_SLUGS_SOURCE_FILE")"
          mkdir -p "$(dirname "$REBUILD_PROGRESS_FILE")"
          mkdir -p "$OUTPUT_DIR"

          touch "$KEYWORDS_FILE"
          touch "$GENERATED_KEYWORDS_FILE"
          touch "$GENERATED_SLUGS_FILE"

      - name: Standard incremental build
        shell: bash
        env:
          DAILY_LIMIT: ${{ github.event.inputs.manual_daily_limit || '1000' }}
        run: python scripts/build_token_seo_incremental.py

      - name: Build hub pages
        if: success()
        shell: bash
        run: python scripts/build_token_hubs.py

      - name: Build sitemap
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          get_lastmod() {
            local file_path="$1"
            local commit_date
            commit_date=$(git log -1 --format=%cs -- "$file_path" 2>/dev/null || true)
            if [ -n "$commit_date" ]; then
              echo "$commit_date"
            else
              date -u +%F
            fi
          }

          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'

            find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
              [ -f "$dir/index.html" ] || continue
              slug=$(basename "$dir")
              page_lastmod=$(get_lastmod "$dir/index.html")
              echo "<url><loc>https://verixiaapps.com/token-risk/$slug/</loc><lastmod>${page_lastmod}</lastmod></url>"
            done

            echo '</urlset>'
          } > token-risk-sitemap.xml

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Token Risk SEO auto generation"

      - name: Push changes
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main || true
          git push origin HEAD:main
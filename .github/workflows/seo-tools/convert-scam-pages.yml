name: Convert scam-check-now pages to folder URLs

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert HTML pages to folder structure
        run: |
          find scam-check-now -type f -name "*.html" \
          ! -path "scam-check-now/is-this-a-scam/*" \
          ! -name "index.html" \
          ! -name "all-pages.html" | while read file; do

            base=$(basename "$file" .html)
            dir=$(dirname "$file")
            target="$dir/$base/index.html"

            mkdir -p "$dir/$base"

            if [ ! -f "$target" ]; then
              git mv "$file" "$target"
            fi

          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Convert scam-check-now HTML pages to folder structure"
            git push
          fi
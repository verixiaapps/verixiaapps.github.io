name: Export Page HTML From URLs

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Paste one or more Verixia page URLs, one per line"
        required: true
        type: string

permissions:
  contents: write

jobs:
  export-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Export HTML for provided URLs
        shell: bash
        env:
          INPUT_URLS: ${{ github.event.inputs.urls }}
        run: |
          mkdir -p exports
          node scripts/export-page-html-from-urls.js

      - name: Commit export file
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add exports/page-html-export.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Export page HTML from URLs"
          git push origin "${{ github.ref_name }}"
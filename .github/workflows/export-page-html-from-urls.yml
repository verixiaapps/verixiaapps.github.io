name: Export Page HTML From URLs

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Paste one or more Verixia page URLs, one per line"
        required: true
        type: string

permissions:
  contents: write

jobs:
  export-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Export HTML for provided URLs
        shell: bash
        env:
          INPUT_URLS: ${{ github.event.inputs.urls }}
        run: |
          mkdir -p exports

          python <<'PY'
          import os
          import re
          import sys
          from urllib.parse import urlparse, unquote

          raw_input = os.environ.get("INPUT_URLS", "").strip()

          if not raw_input:
              print("No URLs were provided.")
              sys.exit(1)

          allowed_roots = {
              "scam-check-now",
              "scam-check-now-b",
              "scam-check-now-c",
          }

          repo_root = os.getcwd()
          output_blocks = []
          errors = []

          urls = [line.strip() for line in raw_input.splitlines() if line.strip()]

          def extract_file_path(url: str) -> str:
              parsed = urlparse(url)

              if parsed.scheme not in ("http", "https"):
                  raise ValueError("Invalid URL")

              if parsed.netloc.lower() != "verixiaapps.com":
                  raise ValueError("Must be verixiaapps.com")

              path = unquote(parsed.path or "").strip()
              path = re.sub(r"/+", "/", path)

              parts = [p for p in path.strip("/").split("/") if p]

              if len(parts) < 2:
                  raise ValueError("Invalid path")

              if any(part in (".", "..") for part in parts):
                  raise ValueError("Path cannot contain . or ..")

              if parts[0] not in allowed_roots:
                  raise ValueError("Not in allowed folders")

              if parts[-1] == "index.html":
                  if len(parts) < 3:
                      raise ValueError("Invalid index.html path")
                  file_parts = parts
              else:
                  file_parts = parts + ["index.html"]

              file_path = "/".join(file_parts)
              abs_path = os.path.abspath(os.path.join(repo_root, file_path))
              allowed_base = os.path.abspath(os.path.join(repo_root, parts[0]))

              if not abs_path.startswith(allowed_base + os.sep):
                  raise ValueError("Resolved path escapes allowed folder")

              return file_path

          for url in urls:
              try:
                  file_path = extract_file_path(url)
                  abs_path = os.path.abspath(os.path.join(repo_root, file_path))

                  if not os.path.isfile(abs_path):
                      raise FileNotFoundError(f"File not found: {file_path}")

                  with open(abs_path, "r", encoding="utf-8") as f:
                      html = f.read().strip()

                  block = "\n".join([
                      "URL:",
                      url,
                      "",
                      "FILE PATH:",
                      file_path,
                      "",
                      "HTML:",
                      html,
                  ])

                  output_blocks.append(block)

              except Exception as e:
                  errors.append(f"{url} -> {str(e)}")

          final_parts = []

          if output_blocks:
              final_parts.append(("\n" + "=" * 50 + "\n\n").join(output_blocks).strip())

          if errors:
              final_parts.append("ERRORS:\n" + "\n".join(errors))

          final_output = "\n\n" + ("=" * 50) + "\n\n"
          final_output = final_output.join(final_parts).strip() + "\n" if final_parts else ""

          with open("exports/page-html-export.txt", "w", encoding="utf-8") as f:
              f.write(final_output)

          print(final_output)

          if not output_blocks:
              sys.exit(1)
          PY

      - name: Commit export file
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add exports/page-html-export.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Export page HTML from URLs"
          git push origin "${{ github.ref_name }}"


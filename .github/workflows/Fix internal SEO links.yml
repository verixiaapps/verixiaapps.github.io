name: Fix internal SEO links

on:
  workflow_dispatch:

jobs:
  fix-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update internal links
        run: |
          find scam-check-now -type f -name "index.html" | while read file; do
            sed -i 's/\.html"/\//g' "$file"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix internal SEO links after folder conversion"
            git push
          fi
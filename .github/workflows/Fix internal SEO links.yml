name: Fix internal SEO links

on:
  workflow_dispatch:

jobs:
  fix-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix .html internal links safely
        run: |
          find scam-check-now -type f -name "index.html" | while read file; do
            sed -E -i 's|(/scam-check-now/[a-zA-Z0-9\-]+)\.html|\1/|g' "$file"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix internal links after folder URL conversion"
            git push
          fi
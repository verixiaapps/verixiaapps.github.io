name: Targeted File Update

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: targeted-file-update
  cancel-in-progress: false

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run targeted updater
        run: node scripts/targeted-file-update.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Run targeted file update"
          git push
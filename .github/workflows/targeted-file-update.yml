name: Targeted File Update

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: "Exact file path to update, relative to repo root"
        required: true
        type: string
      commit_message:
        description: "Commit message"
        required: false
        default: "Run targeted file update"
        type: string

permissions:
  contents: write

concurrency:
  group: targeted-file-update
  cancel-in-progress: false

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show target file
        run: echo "Target file is ${{ github.event.inputs.target_file }}"

      - name: Run targeted updater
        env:
          TARGET_FILE: ${{ github.event.inputs.target_file }}
        run: node scripts/targeted-file-update.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.target_file }}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "${{ github.event.inputs.commit_message }}"
          git push
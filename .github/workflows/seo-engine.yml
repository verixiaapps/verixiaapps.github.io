name: SEO Engine

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip


      - name: Expand Keywords
        run: |
          python scripts/expand_keywords.py


      - name: Generate SEO Pages
        run: |
          python scripts/build_seo.py


      - name: Commit Changes
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@github.com"

          git add .

          git commit -m "auto seo pages update" || echo "No changes"

          git push
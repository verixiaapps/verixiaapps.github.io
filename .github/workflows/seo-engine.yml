name: SEO Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Expand keywords
        run: python scripts/expand_keywords.py

      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_content.py

      - name: Remove previously generated SEO pages
        run: |
          python - << 'EOF'
import os,re
keywords=open("data/keywords.txt").read().splitlines()
def slugify(text):
    text=text.lower()
    text=re.sub(r'[^a-z0-9]+','-',text)
    return text.strip("-")
for kw in keywords:
    slug=slugify(kw)
    path=f"scam-check-now/{slug}.html"
    if os.path.exists(path):
        os.remove(path)
        print("deleted",path)
EOF

      - name: Build SEO pages
        run: python scripts/build_seo.py

      - name: Commit changes
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto seo pages update" || echo "No changes"
          git push
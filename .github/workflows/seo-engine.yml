name: SEO Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

concurrency:
  group: seo-engine
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Expand keywords
        run: python scripts/expand_keywords.py

      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_content.py

      - name: Build SEO pages
        run: python scripts/build_seo.py

      - name: Commit changes
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto seo pages update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
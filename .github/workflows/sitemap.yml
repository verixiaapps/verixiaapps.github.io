name: Split Sitemap

on:
  workflow_dispatch:

jobs:
  split-sitemap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install lxml

      - run: |
          python3 << 'EOF'
          import os, sys, hashlib, subprocess
          from lxml import etree
          from datetime import datetime, timezone

          PAGES_DIR = "scam-check-now"
          URLS_PER_FILE = 1000
          BASE_URL = "https://verixiaapps.com"
          NS = "http://www.sitemaps.org/schemas/sitemap/0.9"
          HASH_FILE = ".sitemap_hash"
          TODAY = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          if not os.path.isdir(PAGES_DIR):
              print(f"ERROR: folder '{PAGES_DIR}' not found")
              sys.exit(1)

          def git_date(path):
              result = subprocess.run(
                  ["git", "log", "-1", "--format=%cs", "--", path],
                  capture_output=True,
                  text=True
              )
              return result.stdout.strip() or TODAY

          entries = []

          for entry in sorted(os.scandir(PAGES_DIR), key=lambda e: e.name):
              if not entry.is_dir():
                  continue

              index_path = os.path.join(entry.path, "index.html")

              if os.path.isfile(index_path):
                  url = f"{BASE_URL}/{PAGES_DIR}/{entry.name}/"
                  lastmod = git_date(index_path)
                  entries.append((url, lastmod))

          if not entries:
              print("ERROR: no valid index.html pages found")
              sys.exit(1)

          print(f"Found {len(entries)} valid pages")

          hash_input = "\n".join(f"{u}|{d}" for u, d in entries)
          content_hash = hashlib.md5(hash_input.encode()).hexdigest()

          existing_outputs_ok = (
              os.path.exists("sitemap-index.xml")
              and os.path.getsize("sitemap-index.xml") > 100
              and os.path.exists("sitemap-1.xml")
              and os.path.getsize("sitemap-1.xml") > 100
          )

          if existing_outputs_ok and os.path.exists(HASH_FILE):
              if open(HASH_FILE).read().strip() == content_hash:
                  print("No sitemap changes and output files are valid — skipping.")
                  sys.exit(0)

          for file in os.listdir("."):
              if file.startswith("sitemap-") and file.endswith(".xml"):
                  os.remove(file)

          chunks = [entries[i:i+URLS_PER_FILE] for i in range(0, len(entries), URLS_PER_FILE)]
          child_names = []

          for idx, chunk in enumerate(chunks, start=1):
              fname = f"sitemap-{idx}.xml"
              child_names.append(fname)

              urlset = etree.Element("urlset", xmlns=NS)

              for url, lastmod in chunk:
                  url_el = etree.SubElement(urlset, "url")
                  etree.SubElement(url_el, "loc").text = url
                  etree.SubElement(url_el, "lastmod").text = lastmod

              etree.ElementTree(urlset).write(
                  fname,
                  xml_declaration=True,
                  encoding="UTF-8",
                  pretty_print=True
              )

              print(f"Wrote {fname} with {len(chunk)} URLs")

          index = etree.Element("sitemapindex", xmlns=NS)

          for fname in child_names:
              sm = etree.SubElement(index, "sitemap")
              etree.SubElement(sm, "loc").text = f"{BASE_URL}/{fname}"
              etree.SubElement(sm, "lastmod").text = TODAY

          etree.ElementTree(index).write(
              "sitemap-index.xml",
              xml_declaration=True,
              encoding="UTF-8",
              pretty_print=True
          )

          open(HASH_FILE, "w").write(content_hash)

          print(f"Wrote sitemap-index.xml with {len(child_names)} child sitemaps")
          EOF

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap*.xml .sitemap_hash
          git commit -m "fix: rebuild split sitemaps" || echo "No changes"
          git push
name: Split Sitemap
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  split-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install lxml

      - run: |
          python3 << 'EOF'
          import os, sys, hashlib
          from lxml import etree
          from datetime import datetime

          PAGES_DIR     = "scam-check-now"   # folder at repo root
          OUTPUT_DIR    = "public"
          URLS_PER_FILE = 1000
          BASE_URL      = "https://verixiaapps.com"
          NS            = "http://www.sitemaps.org/schemas/sitemap/0.9"
          HASH_FILE     = ".sitemap_hash"
          TODAY         = datetime.utcnow().strftime("%Y-%m-%d")

          os.makedirs(OUTPUT_DIR, exist_ok=True)

          # 1. Walk scam-check-now/ and collect URLs
          urls = []
          if not os.path.isdir(PAGES_DIR):
              print(f"ERROR: folder '{PAGES_DIR}' not found")
              sys.exit(1)

          for entry in sorted(os.scandir(PAGES_DIR), key=lambda e: e.name):
              if entry.is_dir():
                  urls.append(f"{BASE_URL}/{PAGES_DIR}/{entry.name}/")
              elif entry.is_file() and entry.name.endswith((".html", ".mdx", ".md")):
                  slug = entry.name.rsplit(".", 1)[0]
                  urls.append(f"{BASE_URL}/{PAGES_DIR}/{slug}/")

          if not urls:
              print("ERROR: no pages found — aborting.")
              sys.exit(1)

          print(f"Found {len(urls)} URLs")

          # 2. Hash URL list — skip if unchanged
          content_hash = hashlib.md5("\n".join(urls).encode()).hexdigest()
          if os.path.exists(HASH_FILE):
              if open(HASH_FILE).read().strip() == content_hash:
                  print("No changes — skipping.")
                  sys.exit(0)

          # 3. Split into chunks and write clean sitemaps
          chunks      = [urls[i:i+URLS_PER_FILE] for i in range(0, len(urls), URLS_PER_FILE)]
          child_names = []

          for idx, chunk in enumerate(chunks, start=1):
              fname  = f"sitemap-{idx}.xml"
              child_names.append(fname)
              urlset = etree.Element("urlset", xmlns=NS)
              for u in chunk:
                  url_el  = etree.SubElement(urlset, "url")
                  etree.SubElement(url_el, "loc").text         = u
                  etree.SubElement(url_el, "lastmod").text     = TODAY
                  etree.SubElement(url_el, "changefreq").text  = "daily"
                  etree.SubElement(url_el, "priority").text    = "0.8"
              etree.ElementTree(urlset).write(
                  os.path.join(OUTPUT_DIR, fname),
                  xml_declaration=True, encoding="UTF-8", pretty_print=True)
              print(f"  {fname} — {len(chunk)} URLs")

          # 4. Build clean sitemap index
          index = etree.Element("sitemapindex", xmlns=NS)
          for fname in child_names:
              sm  = etree.SubElement(index, "sitemap")
              etree.SubElement(sm, "loc").text     = f"{BASE_URL}/{fname}"
              etree.SubElement(sm, "lastmod").text = TODAY
          etree.ElementTree(index).write(
              os.path.join(OUTPUT_DIR, "sitemap-index.xml"),
              xml_declaration=True, encoding="UTF-8", pretty_print=True)
          print(f"Index written — {len(child_names)} child sitemaps")

          # 5. Save hash
          open(HASH_FILE, "w").write(content_hash)
          EOF

      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap*.xml .sitemap_hash
          git diff --cached --quiet || git commit -m "chore: split sitemaps $(date -u +%Y-%m-%d)"
          git push

name: Split Sitemap
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  split-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log dates

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install lxml

      - run: |
          python3 << 'EOF'
          import os, sys, hashlib, subprocess
          from lxml import etree
          from datetime import datetime, timezone

          PAGES_DIR     = "scam-check-now"
          OUTPUT_DIR    = "public"
          URLS_PER_FILE = 1000
          BASE_URL      = "https://verixiaapps.com"
          NS            = "http://www.sitemaps.org/schemas/sitemap/0.9"
          HASH_FILE     = ".sitemap_hash"
          TODAY         = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          os.makedirs(OUTPUT_DIR, exist_ok=True)

          # 1. Safety check
          if not os.path.isdir(PAGES_DIR):
              print(f"ERROR: folder '{PAGES_DIR}' not found — aborting.")
              sys.exit(1)

          # 2. Get last git commit date for a path
          def git_date(path):
              try:
                  result = subprocess.run(
                      ["git", "log", "-1", "--format=%cs", "--", path],
                      capture_output=True, text=True, timeout=10
                  )
                  date = result.stdout.strip()
                  return date if date else TODAY
              except Exception:
                  return TODAY

          # 3. Scan — only include dirs that contain index.html
          entries = []
          for entry in sorted(os.scandir(PAGES_DIR), key=lambda e: e.name):
              if entry.is_dir():
                  index_path = os.path.join(entry.path, "index.html")
                  if os.path.isfile(index_path):
                      url      = f"{BASE_URL}/{PAGES_DIR}/{entry.name}/"
                      lastmod  = git_date(index_path)
                      entries.append((url, lastmod))

          if not entries:
              print("ERROR: no valid pages found — aborting.")
              sys.exit(1)

          print(f"Found {len(entries)} valid pages")

          # 4. Hash — skip if unchanged
          hash_input   = "\n".join(f"{u}|{d}" for u, d in entries)
          content_hash = hashlib.md5(hash_input.encode()).hexdigest()
          if os.path.exists(HASH_FILE):
              if open(HASH_FILE).read().strip() == content_hash:
                  print("No changes — skipping.")
                  sys.exit(0)

          # 5. Split into chunks and write clean sitemaps
          chunks      = [entries[i:i+URLS_PER_FILE] for i in range(0, len(entries), URLS_PER_FILE)]
          child_names = []

          for idx, chunk in enumerate(chunks, start=1):
              if not chunk:
                  continue  # never write empty sitemaps
              fname  = f"sitemap-{idx}.xml"
              child_names.append(fname)
              urlset = etree.Element("urlset", xmlns=NS)
              for url, lastmod in chunk:
                  url_el = etree.SubElement(urlset, "url")
                  etree.SubElement(url_el, "loc").text      = url
                  etree.SubElement(url_el, "lastmod").text  = lastmod
                  etree.SubElement(url_el, "changefreq").text = "weekly"
                  etree.SubElement(url_el, "priority").text = "0.8"
              etree.ElementTree(urlset).write(
                  os.path.join(OUTPUT_DIR, fname),
                  xml_declaration=True, encoding="UTF-8", pretty_print=True)
              print(f"  {fname} — {len(chunk)} URLs")

          # 6. Build clean sitemap index
          index = etree.Element("sitemapindex", xmlns=NS)
          for fname in child_names:
              sm = etree.SubElement(index, "sitemap")
              etree.SubElement(sm, "loc").text     = f"{BASE_URL}/{fname}"
              etree.SubElement(sm, "lastmod").text = TODAY
          etree.ElementTree(index).write(
              os.path.join(OUTPUT_DIR, "sitemap-index.xml"),
              xml_declaration=True, encoding="UTF-8", pretty_print=True)
          print(f"Index written — {len(child_names)} child sitemaps")

          # 7. Save hash
          open(HASH_FILE, "w").write(content_hash)
          EOF

      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap*.xml .sitemap_hash
          git diff --cached --quiet || git commit -m "chore: split sitemaps $(date -u +%Y-%m-%d)"
          git push

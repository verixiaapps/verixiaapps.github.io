name: SEO Generator C

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      page_limit:
        description: "How many pages to generate for this manual run"
        required: false
        default: "25"
      rebuild_all:
        description: "Rebuild all C pages"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OUTPUT_DIR: "scam-check-now-c"
      GENERATED_KEYWORDS_FILE: "data/generated_keywords_c.txt"
      GENERATED_SLUGS_FILE: "data/generated_slugs_c.txt"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure tracking files exist
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_DIR"
          mkdir -p "$(dirname "$GENERATED_KEYWORDS_FILE")"
          mkdir -p "$(dirname "$GENERATED_SLUGS_FILE")"
          touch "$GENERATED_KEYWORDS_FILE"
          touch "$GENERATED_SLUGS_FILE"

      - name: Rebuild all C pages cleanup
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_all == true }}
        run: |
          set -euo pipefail

          echo "Manual rebuild_all=true detected"
          rm -rf "$OUTPUT_DIR"/*
          : > "$GENERATED_KEYWORDS_FILE"
          : > "$GENERATED_SLUGS_FILE"

      - name: Build hubs C
        run: python scripts/build_hubs_c.py

      - name: Generate SEO pages (C)
        env:
          PAGE_LIMIT: ${{ github.event.inputs.page_limit || '50' }}
          REBUILD_ALL: ${{ github.event.inputs.rebuild_all || 'false' }}
        run: python scripts/generate-seo-pages-c.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Generate SEO pages C (limit=${{ github.event.inputs.page_limit || 'auto' }}, rebuild=${{ github.event.inputs.rebuild_all || 'false' }}) + hubs" || echo "No changes"
          git pull --rebase origin main
          git push origin main
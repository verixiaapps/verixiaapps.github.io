name: SEO Generator C

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      page_limit:
        description: "How many pages to generate for this manual run"
        required: false
        default: "25"
      rebuild_all:
        description: "Rebuild all C pages"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Build hubs C
        run: python scripts/build_hubs_c.py

      - name: Generate SEO pages (C)
        env:
          PAGE_LIMIT: ${{ github.event.inputs.page_limit || '50' }}
          REBUILD_ALL: ${{ github.event.inputs.rebuild_all || 'false' }}
        run: python scripts/generate-seo-pages-c.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Generate SEO pages C (limit=${{ github.event.inputs.page_limit || 'auto' }}, rebuild=${{ github.event.inputs.rebuild_all || 'false' }}) + hubs" || echo "No changes"
          git pull --rebase origin main
          git push origin main
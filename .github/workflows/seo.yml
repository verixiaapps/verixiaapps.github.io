name: SEO Page Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai

      - name: Generate keyword list
        run: |
          python scripts/expand_keywords.py

      - name: Generate AI content
        run: |
          python scripts/generate_content.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build SEO pages
        run: |
          python scripts/build_seo.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit generated pages
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto SEO page generation"
          git push
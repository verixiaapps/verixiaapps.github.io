name: SEO Page Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai requests

      - name: Generate AI content
        run: |
          python scripts/generate_content.py

      - name: Build SEO pages
        run: |
          python scripts/build_seo.py

      - name: Build ROOT sitemap (single sitemap only)
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          echo '<url><loc>https://verixiaapps.com/</loc></url>' >> sitemap.xml
          echo '<url><loc>https://verixiaapps.com/scam-check-now/is-this-a-scam/</loc></url>' >> sitemap.xml

          for page in $(ls scam-check-now/pages/*.html); do
            slug=$(basename "$page")
            echo "<url><loc>https://verixiaapps.com/scam-check-now/$slug</loc></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit generated pages
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto SEO page generation"
          git push
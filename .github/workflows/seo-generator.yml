name: SEO Page Generator Auto

"on":
 workflow_dispatch:
   inputs:
     manual_daily_limit:
       description: "Pages to generate on this manual run"
       required: false
       default: "1000"
       type: string
     full_rebuild:
       description: "Optional manual rebuild of generated /scam-check-now/ pages only"
       required: false
       default: false
       type: boolean
     rebuild_daily_limit:
       description: "Total pages to rebuild during this manual rebuild run (leave blank to rebuild all remaining pages in one run)"
       required: false
       default: ""
       type: string
     rebuild_batch_size:
       description: "How many pages to rebuild per committed batch"
       required: false
       default: "50"
       type: string

permissions:
 contents: write

concurrency:
 group: repo-main-writer
 cancel-in-progress: false

jobs:
 generate:
   runs-on: ubuntu-latest
   timeout-minutes: 180

   env:
     KEYWORDS_FILE: "data/keywords.txt"
     GENERATED_KEYWORDS_FILE: "data/generated_keywords.txt"
     GENERATED_SLUGS_FILE: "data/generated_slugs.txt"
     REJECTED_KEYWORDS_FILE: "data/rejected_keywords.txt"
     OUTPUT_DIR: "scam-check-now"
     PROTECTED_SLUG: "is-this-a-scam"
     REBUILD_KEYWORDS_SOURCE_FILE: "data/rebuild_keywords_source_scnb.txt"
     REBUILD_SLUGS_SOURCE_FILE: "data/rebuild_slugs_source_scnb.txt"
     REBUILD_PROGRESS_FILE: "data/rebuild_progress_scnb.txt"

   steps:
     - name: Checkout repo
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         ref: main

     - name: Setup Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11"

     - name: Install dependencies
       shell: bash
       run: |
         set -euo pipefail
         python -m pip install --upgrade pip
         if [ -f requirements.txt ]; then
           pip install -r requirements.txt
         else
           pip install openai requests
         fi

     - name: Configure git
       shell: bash
       run: |
         set -euo pipefail
         git config user.name "seo-bot"
         git config user.email "bot@users.noreply.github.com"

     - name: Sync latest main before build
       shell: bash
       run: |
         set -euo pipefail
         git fetch origin main
         git checkout main
         git reset --hard origin/main
         git clean -fd

     - name: Ensure tracking files exist
       shell: bash
       run: |
         set -euo pipefail
         mkdir -p "$(dirname "$KEYWORDS_FILE")"
         mkdir -p "$(dirname "$GENERATED_KEYWORDS_FILE")"
         mkdir -p "$(dirname "$GENERATED_SLUGS_FILE")"
         mkdir -p "$(dirname "$REJECTED_KEYWORDS_FILE")"
         mkdir -p "$(dirname "$REBUILD_KEYWORDS_SOURCE_FILE")"
         mkdir -p "$(dirname "$REBUILD_SLUGS_SOURCE_FILE")"
         mkdir -p "$(dirname "$REBUILD_PROGRESS_FILE")"
         mkdir -p "$OUTPUT_DIR"
         touch "$KEYWORDS_FILE"
         touch "$GENERATED_KEYWORDS_FILE"
         touch "$GENERATED_SLUGS_FILE"
         touch "$REJECTED_KEYWORDS_FILE"

     - name: Reset stale rebuild state files
       if: github.event.inputs.full_rebuild == 'true'
       shell: bash
       run: |
         set -euo pipefail
         rm -f "$REBUILD_KEYWORDS_SOURCE_FILE" \
               "$REBUILD_SLUGS_SOURCE_FILE" \
               "$REBUILD_PROGRESS_FILE"
         echo "Cleared rebuild state files so this run starts fresh."

     - name: Reorder keywords to match existing slugs (preserves URLs)
       shell: bash
       run: |
         set -euo pipefail
         python3 - <<'PY'
         import re
         from collections import defaultdict
         from pathlib import Path

         kw_path = Path("data/generated_keywords.txt")
         sl_path = Path("data/generated_slugs.txt")

         if not kw_path.exists() or not sl_path.exists():
             print("Tracking files missing, skipping reorder.")
             raise SystemExit(0)

         def slugify(s):
             s = s.lower()
             s = re.sub(r"[^a-z0-9]+", "-", s)
             return s.strip("-")

         keywords = [l for l in kw_path.read_text().splitlines() if l.strip()]
         slugs = [l for l in sl_path.read_text().splitlines() if l.strip()]

         if not keywords or not slugs:
             print("One or both files empty, skipping reorder.")
             raise SystemExit(0)

         bucket = defaultdict(list)
         for kw in keywords:
             bucket[slugify(kw)].append(kw)

         reordered, unmatched = [], []
         for s in slugs:
             if bucket[s]:
                 reordered.append(bucket[s].pop(0))
             else:
                 unmatched.append(s)

         leftover = [kw for v in bucket.values() for kw in v]

         if unmatched or leftover:
             print(f"Unmatched slugs: {len(unmatched)}  Leftover keywords: {len(leftover)}")
             for s in unmatched[:20]: print("  unmatched slug:", s)
             for kw in leftover[:20]: print("  leftover kw:", kw, "->", slugify(kw))
             raise SystemExit(1)

         kw_path.write_text("\n".join(reordered) + "\n")
         print(f"Reordered {len(reordered)} keywords to match slugs file.")
         PY

     - name: Commit reordered keywords if changed
       shell: bash
       run: |
         set -euo pipefail
         git add "$GENERATED_KEYWORDS_FILE" "$REBUILD_KEYWORDS_SOURCE_FILE" "$REBUILD_SLUGS_SOURCE_FILE" "$REBUILD_PROGRESS_FILE" 2>/dev/null || true
         if git diff --cached --quiet; then
           echo "No reorder/cleanup changes to commit."
           exit 0
         fi
         git commit -m "Reorder generated_keywords.txt and reset rebuild state"
         git fetch origin main
         git push --force-with-lease origin HEAD:main

     - name: Set effective limits
       id: limits
       shell: bash
       env:
         EVENT_NAME: ${{ github.event_name }}
         INPUT_MANUAL_DAILY_LIMIT: ${{ github.event.inputs.manual_daily_limit }}
         INPUT_FULL_REBUILD: ${{ github.event.inputs.full_rebuild }}
         INPUT_REBUILD_DAILY_LIMIT: ${{ github.event.inputs.rebuild_daily_limit }}
         INPUT_REBUILD_BATCH_SIZE: ${{ github.event.inputs.rebuild_batch_size }}
       run: |
         set -euo pipefail
         FULL_REBUILD="false"
         EFFECTIVE_DAILY_LIMIT="1000"
         REBUILD_BATCH_SIZE="50"
         REBUILD_ALL_REMAINING="false"
         if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
           MANUAL_DAILY_LIMIT="${INPUT_MANUAL_DAILY_LIMIT:-}"
           if [ -n "$MANUAL_DAILY_LIMIT" ]; then
             EFFECTIVE_DAILY_LIMIT="$MANUAL_DAILY_LIMIT"
           fi
           if [ "${INPUT_FULL_REBUILD:-false}" = "true" ]; then
             FULL_REBUILD="true"
             if [ -n "${INPUT_REBUILD_BATCH_SIZE:-}" ]; then
               REBUILD_BATCH_SIZE="$INPUT_REBUILD_BATCH_SIZE"
             fi
             REBUILD_DAILY_LIMIT="${INPUT_REBUILD_DAILY_LIMIT:-}"
             if [ -n "$REBUILD_DAILY_LIMIT" ]; then
               EFFECTIVE_DAILY_LIMIT="$REBUILD_DAILY_LIMIT"
             else
               EFFECTIVE_DAILY_LIMIT="ALL"
               REBUILD_ALL_REMAINING="true"
             fi
           fi
         fi
         if [ "$EFFECTIVE_DAILY_LIMIT" != "ALL" ]; then
           if ! [[ "$EFFECTIVE_DAILY_LIMIT" =~ ^[0-9]+$ ]] || [ "$EFFECTIVE_DAILY_LIMIT" -le 0 ]; then
             echo "Invalid EFFECTIVE_DAILY_LIMIT: $EFFECTIVE_DAILY_LIMIT"
             exit 1
           fi
         fi
         if ! [[ "$REBUILD_BATCH_SIZE" =~ ^[0-9]+$ ]] || [ "$REBUILD_BATCH_SIZE" -le 0 ]; then
           echo "Invalid REBUILD_BATCH_SIZE: $REBUILD_BATCH_SIZE"
           exit 1
         fi
         echo "full_rebuild=$FULL_REBUILD" >> "$GITHUB_OUTPUT"
         echo "effective_daily_limit=$EFFECTIVE_DAILY_LIMIT" >> "$GITHUB_OUTPUT"
         echo "rebuild_batch_size=$REBUILD_BATCH_SIZE" >> "$GITHUB_OUTPUT"
         echo "rebuild_all_remaining=$REBUILD_ALL_REMAINING" >> "$GITHUB_OUTPUT"

     - name: Prepare rebuild source and progress state
       if: steps.limits.outputs.full_rebuild == 'true'
       shell: bash
       run: |
         set -euo pipefail
         cp "$KEYWORDS_FILE" "$RUNNER_TEMP/original_keywords_queue.txt"
         if [ ! -s "$GENERATED_KEYWORDS_FILE" ]; then
           echo "generated_keywords.txt is missing or empty. Refusing rebuild."
           exit 1
         fi
         if [ ! -s "$GENERATED_SLUGS_FILE" ]; then
           echo "generated_slugs.txt is missing or empty. Refusing rebuild."
           exit 1
         fi
         generated_keywords_count=$(wc -l < "$GENERATED_KEYWORDS_FILE" | tr -d ' ')
         generated_slugs_count=$(wc -l < "$GENERATED_SLUGS_FILE" | tr -d ' ')
         if [ "$generated_keywords_count" -ne "$generated_slugs_count" ]; then
           echo "generated_keywords.txt and generated_slugs.txt are not line-aligned."
           exit 1
         fi
         keywords_source_exists="false"
         slugs_source_exists="false"
         progress_exists="false"
         [ -f "$REBUILD_KEYWORDS_SOURCE_FILE" ] && keywords_source_exists="true"
         [ -f "$REBUILD_SLUGS_SOURCE_FILE" ] && slugs_source_exists="true"
         [ -f "$REBUILD_PROGRESS_FILE" ] && progress_exists="true"
         if [ "$keywords_source_exists" = "false" ] && [ "$slugs_source_exists" = "false" ] && [ "$progress_exists" = "false" ]; then
           cp "$GENERATED_KEYWORDS_FILE" "$REBUILD_KEYWORDS_SOURCE_FILE"
           cp "$GENERATED_SLUGS_FILE" "$REBUILD_SLUGS_SOURCE_FILE"
           echo "0" > "$REBUILD_PROGRESS_FILE"
           echo "Initialized rebuild source + progress files."
         elif [ "$keywords_source_exists" = "true" ] && [ "$slugs_source_exists" = "true" ] && [ "$progress_exists" = "true" ]; then
           echo "Existing rebuild source + progress files found. Resuming rebuild."
         else
           echo "Rebuild state files are inconsistent. Delete all three rebuild state files or keep all three."
           exit 1
         fi
         rebuild_keywords_count=$(wc -l < "$REBUILD_KEYWORDS_SOURCE_FILE" | tr -d ' ')
         rebuild_slugs_count=$(wc -l < "$REBUILD_SLUGS_SOURCE_FILE" | tr -d ' ')
         if [ "$rebuild_keywords_count" -ne "$rebuild_slugs_count" ]; then
           echo "Rebuild source files are not line-aligned."
           exit 1
         fi
         progress=$(tr -d '[:space:]' < "$REBUILD_PROGRESS_FILE")
         if [ -z "$progress" ]; then
           progress="0"
         fi
         if ! [[ "$progress" =~ ^[0-9]+$ ]]; then
           echo "Invalid rebuild progress value: $progress"
           exit 1
         fi
         if [ "$progress" -gt "$rebuild_keywords_count" ]; then
           echo "Rebuild progress exceeds available source lines."
           exit 1
         fi

     - name: Standard incremental build
       if: steps.limits.outputs.full_rebuild != 'true'
       shell: bash
       env:
         DAILY_LIMIT: ${{ steps.limits.outputs.effective_daily_limit }}
       run: python scripts/build_seo_incremental.py

     - name: Build hub pages after standard run
       if: success() && steps.limits.outputs.full_rebuild != 'true'
       shell: bash
       run: python scripts/build_hubs.py

     - name: Build ROOT sitemap after standard run
       if: success() && steps.limits.outputs.full_rebuild != 'true'
       shell: bash
       run: |
         set -euo pipefail
         get_lastmod() {
           local file_path="$1"
           local commit_date
           commit_date=$(git log -1 --format=%cs -

name: SEO Page Generator Auto

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: seo-page-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      START_DATE: "2026-03-22"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Set phase and daily limit
        shell: bash
        run: |
          TODAY=$(date -u +%F)
          DAY_DIFF=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 + 1 ))

          if [ "$DAY_DIFF" -le 14 ]; then
            PHASE="phase_1"
            DAILY_LIMIT="60"
          elif [ "$DAY_DIFF" -le 42 ]; then
            PHASE="phase_2"
            DAILY_LIMIT="100"
          else
            PHASE="phase_3"
            DAILY_LIMIT="100"
          fi

          echo "PHASE=$PHASE" >> "$GITHUB_ENV"
          echo "DAILY_LIMIT=$DAILY_LIMIT" >> "$GITHUB_ENV"
          echo "TODAY=$TODAY" >> "$GITHUB_ENV"
          echo "DAY_DIFF=$DAY_DIFF" >> "$GITHUB_ENV"

          echo "Running $PHASE on day $DAY_DIFF with DAILY_LIMIT=$DAILY_LIMIT"

      - name: Build SEO pages incrementally
        shell: bash
        run: |
          python scripts/build_seo_incremental.py
        env:
          DAILY_LIMIT: ${{ env.DAILY_LIMIT }}

      - name: Build hub pages
        shell: bash
        run: |
          python scripts/build_hubs.py

      - name: Build ROOT sitemap (authoritative)
        shell: bash
        run: |
          set -euo pipefail

          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'

            echo "<url><loc>https://verixiaapps.com/</loc><lastmod>$TODAY</lastmod></url>"
            echo "<url><loc>https://verixiaapps.com/scam-check-now/is-this-a-scam/</loc><lastmod>$TODAY</lastmod></url>"

            find scam-check-now -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
              [ -f "$dir/index.html" ] || continue

              slug=$(basename "$dir")

              if [ "$slug" = "is-this-a-scam" ]; then
                continue
              fi

              echo "<url><loc>https://verixiaapps.com/scam-check-now/$slug/</loc><lastmod>$TODAY</lastmod></url>"
            done

            echo '</urlset>'
          } > sitemap.xml

      - name: Commit generated pages and sitemap
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "seo-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto SEO generation + sitemap update"
            git push
            echo "Changes committed and pushed"
          fi
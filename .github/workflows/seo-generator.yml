name: SEO Page Generator

"on":
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What to do on this run"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - rebuild_all
      pages_to_run:
        description: "How many pages to generate on this run"
        required: true
        default: "500"
        type: string
      batch_size:
        description: "Commit every N pages"
        required: true
        default: "25"
        type: string

permissions:
  contents: write
  workflows: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      KEYWORDS_FILE: "data/keywords.txt"
      GENERATED_KEYWORDS_FILE: "data/generated_keywords.txt"
      GENERATED_SLUGS_FILE: "data/generated_slugs.txt"
      OUTPUT_DIR: "scam-check-now"
      PROTECTED_SLUG: "is-this-a-scam"
      RUN_MODE: ${{ github.event.inputs.run_mode }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "seo-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Show run plan
        shell: bash
        run: |
          echo "Run mode:   $RUN_MODE"
          echo "Pages:      ${{ github.event.inputs.pages_to_run }}"
          echo "Batch size: ${{ github.event.inputs.batch_size }}"

      - name: Rebuild all (wipe + reseed from sitemap)
        if: github.event.inputs.run_mode == 'rebuild_all'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f sitemap.xml ]; then
            echo "sitemap.xml not found at repo root. Cannot reseed."
            exit 1
          fi
          mkdir -p data
          echo "Wiping $OUTPUT_DIR (preserving $PROTECTED_SLUG)..."
          if [ -d "$OUTPUT_DIR" ]; then
            find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
              slug=$(basename "$dir")
              if [ "$slug" = "$PROTECTED_SLUG" ]; then
                continue
              fi
              rm -rf "$dir"
            done
          fi
          mkdir -p "$OUTPUT_DIR"
          grep -oE 'scam-check-now/[^/]+/' sitemap.xml \
            | sed -E 's|scam-check-now/||; s|/$||' \
            > data/_raw_slugs.txt || true
          : > "$KEYWORDS_FILE"
          : > data/_skipped_slugs.txt
          while IFS= read -r raw_slug; do
            [ -z "$raw_slug" ] && continue
            clean=$(echo "$raw_slug" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')
            if [ "$clean" = "$PROTECTED_SLUG" ]; then continue; fi
            if [ -z "$clean" ]; then echo "$raw_slug" >> data/_skipped_slugs.txt; continue; fi
            len=${#clean}
            if [ "$len" -lt 3 ] || [ "$len" -gt 120 ]; then
              echo "$raw_slug" >> data/_skipped_slugs.txt
              continue
            fi
            if ! echo "$clean" | grep -qE '[a-z]'; then
              echo "$raw_slug" >> data/_skipped_slugs.txt
              continue
            fi
            keyword=$(echo "$clean" | tr '-' ' ')
            echo "$keyword" >> "$KEYWORDS_FILE"
          done < data/_raw_slugs.txt
          sort -u "$KEYWORDS_FILE" -o "$KEYWORDS_FILE"
          QCOUNT=$(wc -l < "$KEYWORDS_FILE" | tr -d ' ')
          rm -f data/_raw_slugs.txt
          if [ "$QCOUNT" = "0" ]; then
            echo "Queue is empty after normalize. Aborting."
            exit 1
          fi
          : > "$GENERATED_KEYWORDS_FILE"
          : > "$GENERATED_SLUGS_FILE"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit before generation."
          else
            git commit -m "rebuild_all: wipe pages, reseed normalized queue from sitemap"
            git fetch origin main
            git push --force-with-lease origin HEAD:main
          fi

      - name: Normalize keyword queue (normal run)
        if: github.event.inputs.run_mode == 'normal'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s "$KEYWORDS_FILE" ]; then
            echo "Queue is empty. Nothing to normalize."
            exit 0
          fi
          cp "$KEYWORDS_FILE" data/_pre_normalize.txt
          awk 'NF' data/_pre_normalize.txt \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//' \
            | awk 'length($0) >= 3 && length($0) <= 200' \
            | sort -u > "$KEYWORDS_FILE"
          rm -f data/_pre_normalize.txt

      - name: Run build
        shell: bash
        env:
          DAILY_LIMIT: ${{ github.event.inputs.pages_to_run }}
          COMMIT_EVERY: ${{ github.event.inputs.batch_size }}
          RESUME: "true"
          RUN_MODE: ${{ github.event.inputs.run_mode }}
        run: |
          set +e
          python scripts/build_seo_incremental.py
          exit 0

      - name: Build hub pages
        if: always()
        shell: bash
        run: |
          set +e
          python scripts/build_hubs.py
          exit 0

      - name: Rebuild root sitemap
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          get_lastmod() {
            local file_path="$1"
            local commit_date
            commit_date=$(git log -1 --format=%cs -- "$file_path" 2>/dev/null || true)
            if [ -n "$commit_date" ]; then echo "$commit_date"; else date -u +%F; fi
          }
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            ROOT_LASTMOD=$(get_lastmod "index.html")
            echo "<url><loc>https://verixiaapps.com/</loc><lastmod>${ROOT_LASTMOD}</lastmod></url>"
            find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
              [ -f "$dir/index.html" ] || continue
              slug=$(basename "$dir")
              page_lastmod=$(get_lastmod "$dir/index.html")
              echo "<url><loc>https://verixiaapps.com/scam-check-now/$slug/</loc><lastmod>${page_lastmod}</lastmod></url>"
            done
            echo '</urlset>'
          } > sitemap.xml

      - name: Final commit and push
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing left to commit."
            exit 0
          fi
          git commit -m "SEO run: ${RUN_MODE} (status: ${{ job.status }})"
          git fetch origin main
          git push --force-with-lease origin HEAD:main

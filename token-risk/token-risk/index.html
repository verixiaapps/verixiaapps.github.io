<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Token Risk – Crypto Rug Checker</title>

<meta name="description" content="Paste a crypto token address to instantly analyze rug pull risk.">

<style>

body{
font-family:system-ui,-apple-system,Arial;
background:#000;
margin:0;
color:#fff;
}

.container{
max-width:640px;
margin:auto;
padding:120px 20px 40px;
}

input{
width:100%;
background:#111;
border:1px solid #222;
color:#fff;
padding:16px;
margin-top:12px;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
background:#355bd8;
border:none;
padding:16px;
margin-top:16px;
border-radius:10px;
font-size:16px;
font-weight:600;
color:#fff;
cursor:pointer;
}

button:disabled{
opacity:.6;
}

#result{
margin-top:40px;
white-space:pre-wrap;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h1>Is This Token Safe?</h1>

<input id="token" placeholder="Paste token contract address">
<input id="email" placeholder="Email (optional)">

<button id="checkBtn">Check Token Risk</button>

<div id="result"></div>

</div>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

document.getElementById("checkBtn").addEventListener("click",check)

async function check(){

const btn=document.getElementById("checkBtn")
const token=document.getElementById("token").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token contract address."
return
}

btn.disabled=true

result.innerText="Analyzing token..."

try{

const response=await fetch(API+"/analyze-token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,email})
})

const data=await response.json()

if(data.limit){

result.innerText="Free checks used. Upgrade required."
btn.disabled=false
return

}

result.innerText=data.result

}catch(e){

result.innerText="Error analyzing token."

}

btn.disabled=false

}

</script>

</body>
</html>

<body>

<button class="app-top" onclick="openApp()">📱 Get App</button>

<header class="hero">

<p>Check token risk instantly — avoid scams and rug pulls</p>
</header>

<main>

<div class="container">

<input id="tokenAddress" placeholder="Paste token contract address">

<input id="email" placeholder="Email (used to verify subscriptions)">

<div class="note">
3 free token checks available • no signup required
</div>

<button id="checkBtn" class="check" onclick="checkToken()">Check Token Risk</button>

<div id="result"></div>

<div class="upgrade" id="upgrade">

<h3>Unlock Unlimited Token Checks</h3>

<button class="plan" onclick="checkout('price_1T8KOTJjMzyHDzeQDDg1A2TF')">
Weekly Access
</button>

<button class="plan" onclick="checkout('price_1T8KOUJjMzyHDzeQxaqPFOSB')">
Monthly Access
</button>

<button class="plan" onclick="checkout('price_1T8KOQJjMzyHDzeQfcU1C1MQ')">
Yearly Access
</button>

</div>

<footer class="footer">
Token Risk © 2026 • Crypto token analysis • Not financial advice
</footer>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function openApp(){
window.location="https://verixiaapps.com"
}

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

function riskBadge(text){
if(text.includes("High")) return "<div class='riskBadge riskHigh'>High Risk</div>"
if(text.includes("Medium")) return "<div class='riskBadge riskMedium'>Medium Risk</div>"
return "<div class='riskBadge riskLow'>Low Risk</div>"
}

function formatResult(data){

let html="<div class='resultCard'>"

html+=riskBadge(data.result)

if(data.metrics){

const m=data.metrics

html+=`
<div class="metric"><span>Liquidity</span>${m.liquidity || "-"}</div>
<div class="metric"><span>Volume</span>${m.volume || "-"}</div>
<div class="metric"><span>Pair Age</span>${m.pairAge || "-"}</div>
<div class="metric"><span>FDV</span>${m.fdv || "-"}</div>
`

}

html+=`<div style="margin-top:14px">${data.result}</div>`

html+="</div>"

return html

}

async function checkToken(){

const btn=document.getElementById("checkBtn")
const token=document.getElementById("tokenAddress").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token address to analyze."
return
}

btn.disabled=true
btn.innerText="Analyzing..."

result.innerHTML="Analyzing token..."

try{

const response=await fetch(API+"/token-risk",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tokenAddress:token,
email:email
})
})

const data=await response.json()

if(data.limit){
result.innerText="No free checks remaining — unlock unlimited access."
showUpgrade()
btn.disabled=false
btn.innerText="Check Token Risk"
return
}

result.innerHTML=formatResult(data)

}catch(err){

result.innerText="Error analyzing token. Please try again."

}

btn.disabled=false
btn.innerText="Check Token Risk"

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl
})
})

const data=await response.json()

window.location=data.url

}

</script>

</body>

<body>

<div class="hero">
<h1>Is This Token Safe?</h1>
<p>AI crypto rug checker — try 3 free scans.</p>
</div>

<div class="container">

<input id="token" placeholder="Paste token contract address">
<input id="email" placeholder="Email (used to verify subscriptions)">

<div class="note">
3 free token checks available • no signup required
</div>

<button onclick="check()">Check Token Risk</button>

<div class="note">
Instant AI analysis appears after submission
</div>

<div id="result"></div>

<div id="upgrade" class="upgrade">

<h3>Unlock Unlimited Token Checks</h3>

<button class="plan" onclick="checkout('price_1T8KOTJjMzyHDzeQDDg1A2TF')">
Weekly Access
</button>

<button class="plan" onclick="checkout('price_1T8KOUJjMzyHDzeQxaqPFOSB')">
Monthly Access
</button>

<button class="plan" onclick="checkout('price_1T8KOQJjMzyHDzeQfcU1C1MQ')">
Yearly Access
</button>

</div>

</div>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
}

async function check(){

const token=document.getElementById("token").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token contract address to analyze."
return
}

result.innerText="Analyzing..."

try{

const response=await fetch(API+"/analyze-token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,email})
})

const data=await response.json()

if(data.limit){

result.innerText="Free checks used. Upgrade for unlimited token analysis."
showUpgrade()
return

}

result.innerText=data.result

}catch(e){

result.innerText="Error analyzing token. Please try again."

}

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl + "?subscribed=true"
})
})

const data=await response.json()

window.location=data.url

}

</script>

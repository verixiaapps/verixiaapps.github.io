<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

document.getElementById("checkBtn").addEventListener("click",check)

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

function clean(text){
return text
.replace(/\*\*/g,'')
.replace(/###/g,'')
.replace(/\n\n/g,'\n')
}

async function check(){

const token=document.getElementById("token").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token contract address."
return
}

result.innerText="Analyzing..."

try{

const response=await fetch(API+"/analyze-token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,email})
})

const data=await response.json()

if(data.limit){
result.innerText="Free checks used. Upgrade for unlimited token analysis."
showUpgrade()
return
}

result.innerHTML=format(clean(data.result))

}catch(e){

result.innerText="Error analyzing token."

}

}

function format(text){

const lines=text.split("\n")
let html=""

lines.forEach(l=>{

if(l.includes("Risk Level")){
html+=`<div class="risk">Risk: High</div>`
}

else if(l.includes("Liquidity")){
}

else if(l.startsWith("-")){
html+=`<li>${l.replace("- ","")}</li>`
}

else if(l.toUpperCase().includes("SUMMARY")){
html+=`<div class="section"><h3>[SUMMARY]</h3>`
}

else if(l.toUpperCase().includes("KEY SIGNALS")){
html+=`<div class="section"><h3>[KEY SIGNALS]</h3><ul>`
}

else if(l.toUpperCase().includes("RED FLAGS")){
html+=`</ul></div><div class="section"><h3 style="color:#ff4040">[RED FLAGS]</h3><ul>`
}

else if(l.toUpperCase().includes("SAFE SIGNALS")){
html+=`</ul></div><div class="section"><h3 style="color:#00ff5a">[SAFE SIGNALS]</h3><ul>`
}

else if(l.toUpperCase().includes("FINAL TAKE")){
html+=`</ul></div><div class="section"><h3>[FINAL TAKE]</h3>`
}

else{
html+=`<p>${l}</p>`
}

})

html+="</ul></div>"
return html

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl+"?subscribed=true"
})
})

const data=await response.json()

window.location=data.url

}

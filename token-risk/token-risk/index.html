<style>

<body>

<div class="app-top">📱 iPhone App Coming Soon</div>
<button class="upgrade-top" onclick="showUpgrade()">Upgrade</button>

<div class="hero">
<h1>Is This Token Safe?</h1>
<p>AI crypto rug checker — try 3 free scans.</p>
</div>

<div class="container">

<input id="token" placeholder="Paste token contract address">
<input id="email" placeholder="Email (used to verify subscriptions)">

<div class="note">3 free token checks available • no signup required</div>

<button class="check" id="checkBtn">Check Token Risk</button>

<div class="note">Instant AI analysis appears after submission</div>

<div id="result"></div>

<div id="upgrade" class="upgrade">

<h3>Unlock Unlimited Token Checks</h3>

<button class="plan" onclick="checkout('price_1T8KOTJjMzyHDzeQDDg1A2TF')">Weekly Access</button>
<button class="plan" onclick="checkout('price_1T8KOUJjMzyHDzeQxaqPFOSB')">Monthly Access</button>
<button class="plan" onclick="checkout('price_1T8KOQJjMzyHDzeQfcU1C1MQ')">Yearly Access</button>

<div style="margin-top:14px;font-size:13px;color:#666;">
🔒 Secure payments powered by Stripe
</div>

</div>

</div>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"
const btn=document.getElementById("checkBtn")
const result=document.getElementById("result")

let running=false

function triggerCheck(){
if(running) return
running=true
btn.disabled=true
check()
}

btn.addEventListener("pointerup",triggerCheck)
btn.addEventListener("click",triggerCheck)

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

async function check(){

const token=document.getElementById("token").value.trim()
const email=document.getElementById("email").value

if(!token){
result.innerText="Paste a token contract address."
btn.disabled=false
running=false
return
}

result.innerText="Analyzing..."

try{

const response=await fetch(API+"/analyze-token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,email})
})

const data=await response.json()

if(data.limit){
result.innerText="Free checks used. Upgrade for unlimited token analysis."
showUpgrade()
btn.disabled=false
running=false
return
}

if(data.summary){

let html=""

/* risk */

if(data.riskLevel){
html+=`<div class="risk">Risk: ${data.riskLevel}</div>`
}

/* metrics */

if(data.metrics){

html+=`
<div class="metric"><span>Liquidity USD</span><span>${data.metrics.liquidityUSD}</span></div>
<div class="metric"><span>Volume 24h</span><span>${data.metrics.volume24h}</span></div>
<div class="metric"><span>Price change 24h</span><span class="${data.metrics.priceChange24h.includes('+')?'green':'red'}">${data.metrics.priceChange24h}</span></div>
<div class="metric"><span>Pair age</span><span>${data.metrics.pairAge}</span></div>
<div class="metric"><span>FDV</span><span>${data.metrics.fdv}</span></div>
`
}

/* summary */

html+=`<div class="section"><h3>[SUMMARY]</h3><p>${data.summary}</p></div>`

/* key signals */

if(data.keySignals?.length){
html+=`<div class="section"><h3>[KEY SIGNALS]</h3>`
data.keySignals.forEach((x,i)=>{
if(i===1 && x.startsWith("(")){
html+=`<div class="sub">${x}</div>`
}else{
html+=`<div>• ${x}</div>`
}
})
html+=`</div>`
}

/* red flags */

if(data.concerningIndicators?.length){
html+=`<div class="section"><h3 class="red">[RED FLAGS]</h3><ul>`
data.concerningIndicators.forEach(x=>html+=`<li>${x}</li>`)
html+=`</ul></div>`
}

/* safe signals */

if(data.legitimateElements?.length){
html+=`<div class="section"><h3 class="green">[SAFE SIGNALS]</h3><ul>`
data.legitimateElements.forEach(x=>html+=`<li>${x}</li>`)
html+=`</ul></div>`
}

/* final take */

if(data.finalTake){
let cls=""

if(data.finalTake.toLowerCase()=="avoid") cls="orange"
if(data.finalTake.toLowerCase()=="safe") cls="green"

html+=`<div class="section"><h3>[FINAL TAKE]</h3><div class="${cls}" style="font-weight:600;font-size:22px">${data.finalTake}</div></div>`
}

/* what to watch */

if(data.recommendations?.length){
html+=`<div class="section"><h3>[WHAT TO WATCH]</h3><ul>`
data.recommendations.forEach(x=>html+=`<li>${x}</li>`)
html+=`</ul></div>`
}

result.innerHTML=html

}else{

result.innerHTML=data.result || "No analysis available."

}

}catch(e){

result.innerText="Error analyzing token."

}

btn.disabled=false
running=false

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl+"?subscribed=true"
})
})

const data=await response.json()
window.location=data.url

}

</script>

</body>

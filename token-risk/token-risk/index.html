<body>

<button class="app-top" onclick="comingSoon()">📱 iPhone App Coming Soon</button>
<button class="upgrade-top" onclick="showUpgrade()">Upgrade</button>

<div class="hero">
<h1>Token Risk</h1>
<p>AI crypto rug pull checker — try 3 free scans</p>
</div>

<div class="container">

<input id="tokenAddress" placeholder="Paste token contract address">

<input id="email" placeholder="Email (used to verify subscriptions)">

<div class="note">
3 free token checks available • no signup required

<button class="check" onclick="checkToken()">Analyze Token</button>

<div id="result"></div>

<div class="upgrade" id="upgrade">

<h3>Unlock Unlimited Token Checks</h3>

<button class="plan" onclick="checkout('price_1T8KOTJjMzyHDzeQDDg1A2TF')">

🔒 Secure payments powered by Stripe

</div>

<div class="footer">
Token Risk © 2026 • Crypto token analysis • Not financial advice
</div>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function comingSoon(){
alert("📱 iPhone app coming soon.")
}

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

function confidenceColor(level){
if(!level) return "#aaa"
level=level.toUpperCase()
if(level==="HIGH") return "#00e676"
if(level==="MEDIUM") return "#ffb300"
if(level==="LOW") return "#ff5252"
return "#aaa"
}

function riskBadge(text){
if(text.includes("Risk Level: High")){
return "<div class='riskBadge riskHigh'>Risk: High</div>"
}
if(text.includes("Risk Level: Medium")){
return "<div class='riskBadge riskMedium'>Risk: Medium</div>"
}
return "<div class='riskBadge riskLow'>Risk: Low</div>"
}

function formatResult(data){

const m=data.metrics || {}
let text=data.result || ""

let html="<div class='resultCard'>"

html+=riskBadge(text)

html+=`
<div class="metric"><span>Liquidity USD</span>${m.liquidity || "-"}</div>
<div class="metric"><span>Volume 24h</span>${m.volume || "-"}</div>
<div class="metric"><span>Price Change</span><span class="green">${m.priceChange || "-"}</span></div>
<div class="metric"><span>Pair Age</span>${m.pairAge || "-"}</div>
<div class="metric"><span>FDV</span>${m.fdv || "-"}</div>
<div class="metric">
<span>Liquidity Confidence</span>
<span style="color:${confidenceColor(m.liquidityConfidence)};font-weight:700">
${m.liquidityConfidence || "-"}
</span>
</div>
`

text=text.replace("Risk Level: High","")
text=text.replace("Risk Level: Medium","")
text=text.replace("Risk Level: Low","")

text=text.replace("[SUMMARY]","<div class='sectionTitle'>SUMMARY</div>")
text=text.replace("[KEY SIGNALS]","<div class='sectionTitle'>KEY SIGNALS</div>")
text=text.replace("[RED FLAGS]","<div class='sectionTitle red'>RED FLAGS</div>")
text=text.replace("[SAFE SIGNALS]","<div class='sectionTitle green'>SAFE SIGNALS</div>")
text=text.replace("[FINAL TAKE]","<div class='sectionTitle'>FINAL TAKE</div>")
text=text.replace("[WHAT TO WATCH]","<div class='sectionTitle'>WHAT TO WATCH</div>")

text=text.replace(/\n/g,"<br>")

html+=text
html+="</div>"

return html

}

async function checkToken(){

const tokenAddress=document.getElementById("tokenAddress").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!tokenAddress){
result.innerText="Paste a token address to analyze."
return
}

result.innerText="Analyzing token..."

try{

const response=await fetch(API+"/token-risk",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({tokenAddress,email})
})

const data=await response.json()

if(data.limit){

result.innerText="Free checks used. Upgrade for unlimited token analysis."
showUpgrade()
return

}

result.innerHTML=formatResult(data)

}catch(e){

result.innerText="Error analyzing token. Please try again."

}

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl
})
})

const data=await response.json()

window.location=data.url

}

</script>

</body>

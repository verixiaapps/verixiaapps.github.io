<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function openApp(){
window.location="https://verixiaapps.com"
}

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

async function checkToken(){

const token=document.getElementById("tokenAddress").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token address to analyze."
return
}

result.innerText="Fetching token data..."

try{

/* STEP 1 — GET TOKEN DATA FROM DEXSCREENER */

const dex=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token}`)
const dexData=await dex.json()

if(!dexData.pairs || dexData.pairs.length===0){
result.innerText="Token not found on Dexscreener."
return
}

const pair=dexData.pairs[0]

const metrics={
liquidity: pair.liquidity?.usd,
volume: pair.volume?.h24,
fdv: pair.fdv,
priceChange: pair.priceChange?.h24
}

/* STEP 2 — SEND TO RAILWAY + CHATGPT */

result.innerText="Running AI analysis..."

const response=await fetch(API+"/token-risk",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
tokenAddress:token,
metrics,
email
})
})

const data=await response.json()

if(data.limit){

result.innerText="Free checks used. Upgrade for unlimited token analysis."
document.getElementById("resultAction").style.display="block"
showUpgrade()
return

}

result.innerText=data.result
document.getElementById("resultAction").style.display="block"

}catch(e){

result.innerText="Error analyzing token. Please try again."

}

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl+"?subscribed=true"
})
})

const data=await response.json()

window.location=data.url

}

</script>

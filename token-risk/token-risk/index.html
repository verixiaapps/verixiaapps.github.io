<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function openApp(){
window.location="https://verixiaapps.com"
}

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
}

function formatNumber(n){
return "$"+Math.round(n).toLocaleString()
}

async function check(){

const token=document.getElementById("token").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!token){
result.innerText="Paste a token address to analyze."
return
}

result.innerText="Fetching token data..."

try{

const dex=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token}`)
const dexData=await dex.json()

if(!dexData.pairs || dexData.pairs.length===0){
result.innerText="Token not found."
return
}

const p=dexData.pairs[0]

const metrics={
liquidity:p.liquidity?.usd||0,
volume:p.volume?.h24||0,
fdv:p.fdv||0,
change:p.priceChange?.h24||0,
age:p.pairCreatedAt
}

const ageHours=Math.floor((Date.now()-metrics.age)/3600000)
const age=`${Math.floor(ageHours/24)}d ${ageHours%24}h`

const summaryText=`
Liquidity: ${metrics.liquidity}
Volume: ${metrics.volume}
FDV: ${metrics.fdv}
Price Change: ${metrics.change}
Pair Age: ${age}
`

result.innerText="Running AI analysis..."

const response=await fetch(API+"/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:summaryText,email})
})

const data=await response.json()

if(data.limit){
result.innerText="Free checks used — upgrade required."
showUpgrade()
return
}

let riskLabel="High"
if(data.result.includes("Low")) riskLabel="Low"
if(data.result.includes("Medium")) riskLabel="Medium"

result.innerHTML=`

<div class="risk">Risk: ${riskLabel}</div>

<div class="metric"><span>Liquidity USD</span><span>${formatNumber(metrics.liquidity)}</span></div>
<div class="metric"><span>Volume 24h</span><span>${formatNumber(metrics.volume)}</span></div>
<div class="metric"><span>Price change 24h</span><span class="${metrics.change>0?'green':'red'}">${metrics.change}%</span></div>
<div class="metric"><span>Pair age</span><span>${age}</span></div>
<div class="metric"><span>FDV</span><span>${formatNumber(metrics.fdv)}</span></div>

<div style="margin-top:30px">${data.result}</div>
`

}catch(e){

result.innerText="Error analyzing token."

}

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl+"?subscribed=true"
})
})

const data=await response.json()

window.location=data.url

}

</script>

<script>

const API="https://awake-integrity-production-faa0.up.railway.app"

function showUpgrade(){
document.getElementById("upgrade").style.display="block"
document.getElementById("upgrade").scrollIntoView({behavior:"smooth"})
}

function formatResult(data){

const m=data.metrics
let text=data.result

let html="<div class='resultCard'>"

if(text.includes("Risk Level: High")){
html+="<div class='riskHigh'>Risk: High</div>"
}
else if(text.includes("Risk Level: Medium")){
html+="<div class='riskHigh'>Risk: Medium</div>"
}
else{
html+="<div class='riskHigh'>Risk: Low</div>"
}

html+=`
<div class="metric"><span>Liquidity USD</span>${m.liquidity}</div>
<div class="metric"><span>Volume 24h</span>${m.volume}</div>
<div class="metric"><span>Price change 24h</span><span class="green">${m.priceChange}</span></div>
<div class="metric"><span>Pair age</span>${m.pairAge}</div>
<div class="metric"><span>FDV</span>${m.fdv}</div>
`

text=text.replace("Risk Level: High","")
text=text.replace("Risk Level: Medium","")
text=text.replace("Risk Level: Low","")

text=text.replace("[SUMMARY]","<div class='sectionTitle'>SUMMARY</div>")
text=text.replace("[KEY SIGNALS]","<div class='sectionTitle'>KEY SIGNALS</div>")
text=text.replace("[RED FLAGS]","<div class='sectionTitle red'>RED FLAGS</div>")
text=text.replace("[SAFE SIGNALS]","<div class='sectionTitle green'>SAFE SIGNALS</div>")
text=text.replace("[FINAL TAKE]","<div class='sectionTitle'>FINAL TAKE</div>")
text=text.replace("[WHAT TO WATCH]","<div class='sectionTitle'>WHAT TO WATCH</div>")

text=text.replace(/\n/g,"<br>")

html+=text
html+="</div>"

return html

}

async function checkToken(){

const tokenAddress=document.getElementById("tokenAddress").value.trim()
const email=document.getElementById("email").value
const result=document.getElementById("result")

if(!tokenAddress){
result.innerText="Paste a token address to analyze."
return
}

result.innerText="Analyzing token..."

try{

const response=await fetch(API+"/token-risk",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({tokenAddress,email})
})

const data=await response.json()

if(data.limit){
result.innerText="Free checks used. Upgrade for unlimited token analysis."
showUpgrade()
return
}

result.innerHTML=formatResult(data)

}catch(e){

result.innerText="Error analyzing token. Please try again."

}

}

async function checkout(priceId){

const email=document.getElementById("email").value
const pageUrl=window.location.origin+window.location.pathname

const response=await fetch(API+"/create-checkout",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
priceId,
email,
successUrl:pageUrl
})
})

const data=await response.json()

window.location=data.url

}

</script>

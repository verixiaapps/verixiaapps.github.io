<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Total Hits</title>

<style>
body{
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: #f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
  color:#111827;
}
.container{
  text-align:center;
}
h1{
  font-size:24px;
  margin-bottom:10px;
}
#counter{
  font-size:64px;
  font-weight:800;
  color:#3b82f6;
}
</style>

</head>
<body>

<div class="container">
  <h1>Total Page Hits</h1>
  <div id="counter">Loading...</div>
</div>

<script>
function loadCount(){
  fetch("https://api.countapi.xyz/get/scamchecknow/mainpage")
    .then(res => res.json())
    .then(data => {
      document.getElementById("counter").innerText = data.value;
    })
    .catch(() => {
      document.getElementById("counter").innerText = "Error";
    });
}

loadCount();
setInterval(loadCount, 5000);
</script>

</body>
</html>

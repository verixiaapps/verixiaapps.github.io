<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolIntel — Solana Intelligence Platform</title>
<meta name="description" content="Track Solana whale moves, scan early-stage tokens, get AI analysis on any mint. Trial active automatically — no signup, no card.">
<meta property="og:title" content="SolIntel — Catch the next 100x at $0.000006">
<meta property="og:description" content="Solana whale tracker + Early Radar + AI token analysis. Free 3-day trial, no card required.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="SolIntel">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SolIntel — Solana Alpha Intelligence">
<meta name="twitter:description" content="Whale tracker · Early Radar · AI token analysis. 3-day free trial, no signup.">
<meta name="description" content="Monitor Solana wallets in real time. Get alerts when whales move, smart money enters positions, and important ecosystem events happen.">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
:root {
  --bg:#040706; --s1:#070c09; --s2:#0a1009; --b1:#111c12; --b2:#172418; --b3:#1e3020;
  --green:#00ff87; --gdim:#00d470; --red:#ff3d55; --yel:#f0bf30; --blu:#3d9fff; --ora:#ff7030;
  --t0:#e0ede5; --t1:#6e9478; --t2:#344f3a; --t3:#182a1c;
  --gfaint:rgba(0,255,135,0.055); --gfaint2:rgba(0,255,135,0.09);
  --rfaint:rgba(255,61,85,0.09); --yfaint:rgba(240,191,48,0.09);
  --bfaint:rgba(61,159,255,0.08); --ofaint:rgba(255,112,48,0.08);
  --mono:'Space Mono',monospace; --head:'Syne',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t0);font-family:var(--mono);font-size:11px;line-height:1.5;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* TOPBAR */
.topbar{height:46px;display:flex;align-items:center;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;z-index:100}
.logo-block{width:192px;height:100%;display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid var(--b1);flex-shrink:0;cursor:pointer}
.logo-mark{width:22px;height:22px;border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-dot{width:8px;height:8px;background:var(--green);box-shadow:0 0 10px var(--green),0 0 20px rgba(0,255,135,0.3);animation:breathe 3s ease infinite}
.logo-text{font-family:var(--head);font-size:17px;font-weight:800;color:var(--t0);letter-spacing:-0.3px}
.topbar-nav{display:flex;height:100%;flex:1;overflow:hidden}
.tn{display:flex;align-items:center;gap:6px;padding:0 13px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;border-right:1px solid var(--b1);transition:all 0.12s;white-space:nowrap;background:none;border-top:none;border-left:none;font-family:var(--mono)}
.tn:hover{color:var(--t1);background:var(--gfaint)}
.tn.on{color:var(--green);border-bottom-color:var(--green);background:var(--gfaint)}
.tnb{font-size:8px;font-weight:700;padding:1px 4px;border-radius:1px}
.tnb-r{background:var(--red);color:#fff}
.tb-right{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:1px solid var(--b1);flex-shrink:0}
.tb-btn{padding:5px 11px;font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t1);transition:all 0.12s}
.tb-btn.cta{background:var(--green);color:#000;border-color:var(--green);font-weight:700}

/* WORKSPACE */
.workspace{display:grid;grid-template-columns:192px 1fr 252px;flex:1;overflow:hidden}

/* LEFT PANEL */
.left{border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.pro-block{padding:14px 14px 13px;background:linear-gradient(180deg,var(--gfaint2) 0%,var(--gfaint) 100%);border-bottom:1px solid var(--b2)}
.pro-label{font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gdim);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s ease infinite;flex-shrink:0}
.pro-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pro-key{font-size:10px;color:var(--t1)}
.pro-val{font-size:11px;font-weight:700;color:var(--t0)}
.pro-val.g{color:var(--green)}
.pro-val.r{color:var(--red)}
.limit-track{height:2px;background:var(--b2);margin:9px 0 4px}
.limit-fill{height:100%;background:var(--green);box-shadow:0 0 6px rgba(0,255,135,0.5)}
.limit-label{font-size:8px;color:var(--t2);margin-bottom:10px}
.limit-label.warn{color:var(--red)}
.btn-up{width:100%;background:transparent;border:1px solid rgba(0,255,135,0.22);color:var(--green);padding:7px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.15s}
.btn-up:hover{background:var(--green);color:#000}
.ng{border-bottom:1px solid var(--b1);padding:8px 0}
.ng-lbl{font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--t3);padding:0 14px;margin-bottom:3px}
.nl{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;font-size:10px;color:var(--t1);cursor:pointer;transition:all 0.1s;text-decoration:none}
.nl:hover{background:var(--gfaint);color:var(--t0)}
.nl.on{background:var(--gfaint);color:var(--green)}
.nl-l{display:flex;align-items:center;gap:8px}
.nlb{font-size:8px;padding:1px 5px;border-radius:1px;font-weight:700}
.nlb-r{background:var(--rfaint);border:1px solid var(--red);color:var(--red)}
.nlb-g{background:var(--gfaint);border:1px solid var(--gdim);color:var(--gdim)}
.nlb-n{background:var(--s2);border:1px solid var(--b2);color:var(--t2)}

/* PAGES */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.on{display:flex}

/* CENTER */
.center{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--b1);flex:1}
.search{display:flex;align-items:center;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;height:36px}
.s-pre{padding:0 12px;font-size:9px;letter-spacing:0.12em;color:var(--green);border-right:1px solid var(--b1);height:100%;display:flex;align-items:center;flex-shrink:0}
.s-in{flex:1;background:transparent;border:none;color:var(--t0);padding:0 13px;font-family:var(--mono);font-size:11px;outline:none}
.s-in::placeholder{color:var(--t3)}
.s-btns{display:flex;height:100%;border-left:1px solid var(--b1)}
.s-btn{padding:0 13px;font-family:var(--mono);font-size:9px;letter-spacing:0.09em;text-transform:uppercase;background:transparent;border:none;border-right:1px solid var(--b1);color:var(--t2);cursor:pointer;transition:all 0.1s}
.s-btn:last-child{border-right:none}
.s-btn:hover{color:var(--t0);background:var(--gfaint)}
.s-btn.p{color:var(--green);font-weight:700}
.feed-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:34px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.fh-l{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:0.11em;text-transform:uppercase;color:var(--t1)}
.fh-count{color:var(--green);font-weight:700}
.fh-r{display:flex;gap:2px}
.ff{padding:3px 9px;font-family:var(--mono);font-size:8px;letter-spacing:0.09em;text-transform:uppercase;background:transparent;border:1px solid var(--b2);color:var(--t2);cursor:pointer;transition:all 0.1s}
.ff.on{border-color:var(--green);color:var(--green);background:var(--gfaint)}
.feed{flex:1;overflow-y:auto;overflow-x:hidden}

/* EVENT CARD */
.ev{display:grid;grid-template-columns:4px 1fr;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s;animation:slidein 0.2s ease both}
.ev:hover{background:var(--s2)}
.ev.fresh{background:var(--gfaint)}
.ev-stripe{flex-shrink:0}
.es-g{background:var(--green)}
.es-r{background:var(--red)}
.es-y{background:var(--yel)}
.es-b{background:var(--blu)}
.ev-inner{display:grid;grid-template-columns:52px 1fr auto}
.ev-signal{display:flex;flex-direction:column;align-items:center;padding:16px 0 16px 14px}
.sig{width:36px;height:36px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sig-g{background:var(--gfaint2)}
.sig-r{background:var(--rfaint)}
.sig-y{background:var(--yfaint)}
.sig-b{background:var(--bfaint)}
.ev-body{padding:14px 14px 14px 10px}
.ev-type{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.et-chip{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;padding:2px 7px;font-weight:700;border-radius:1px}
.etc-g{background:var(--gfaint2);color:var(--green);border:1px solid rgba(0,255,135,0.2)}
.etc-r{background:var(--rfaint);color:var(--red);border:1px solid rgba(255,61,85,0.2)}
.etc-y{background:var(--yfaint);color:var(--yel);border:1px solid rgba(240,191,48,0.2)}
.etc-b{background:var(--bfaint);color:var(--blu);border:1px solid rgba(61,159,255,0.2)}
.et-new{font-size:8px;font-weight:700;letter-spacing:0.08em;background:var(--green);color:#000;padding:2px 6px;animation:flash 1.5s ease 3}
.ev-headline{font-family:var(--head);font-size:14px;font-weight:700;color:var(--t0);line-height:1.3;margin-bottom:6px}
.ev-number{display:flex;align-items:baseline;gap:5px;margin:8px 0 6px}
.evn-val{font-family:var(--head);font-size:20px;font-weight:800;line-height:1}
.evn-g{color:var(--green);text-shadow:0 0 20px rgba(0,255,135,0.3)}
.evn-r{color:var(--red)}
.evn-y{color:var(--yel)}
.evn-label{font-size:10px;color:var(--t1)}
.ev-detail{font-size:10px;color:var(--t1);line-height:1.6}
.ev-right{padding:14px 14px 14px 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:90px}
.ev-time{font-size:9px;color:var(--t2)}
.ev-cta{font-size:8px;letter-spacing:0.09em;text-transform:uppercase;border:1px solid var(--b2);padding:4px 9px;color:var(--t2);background:transparent;cursor:pointer;font-family:var(--mono);transition:all 0.1s}
.ev:hover .ev-cta{border-color:var(--green);color:var(--green)}
.ev.blurred{opacity:0.28;filter:blur(0.8px);pointer-events:none}
.locked-gate{border-bottom:1px solid var(--b2);background:var(--s1)}
.lg-bar{height:3px;background:linear-gradient(90deg,var(--yel),var(--red))}
.lg-body{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;gap:16px}
.lg-text{font-size:11px;color:var(--t1);line-height:1.5}
.lg-text strong{color:var(--t0);font-family:var(--head);font-size:13px}
.lg-btn{padding:8px 16px;background:var(--green);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* UPGRADE CTA STRIP */
.up-cta{flex-shrink:0;border-top:1px solid var(--b2);background:linear-gradient(180deg,var(--gfaint) 0%,transparent 100%);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.uc-headline{font-family:var(--head);font-size:13px;font-weight:700;color:var(--t0);margin-bottom:6px}
.uc-feats{display:flex;flex-wrap:wrap;gap:4px}
.uc-feat{font-size:9px;color:var(--gdim);border:1px solid var(--b2);padding:2px 7px}
.uc-feat::before{content:'✓ '}
.uc-price{font-family:var(--head);font-size:26px;font-weight:800;color:var(--green);line-height:1}
.uc-note{font-size:9px;color:var(--t2);margin-bottom:8px}
.uc-btn{background:var(--green);color:#000;border:none;padding:8px 16px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.dex-strip{height:26px;border-top:1px solid var(--b1);background:var(--s1);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.ds-t{font-size:9px;color:var(--t2);flex:1}
.ds-t strong{color:var(--t1)}
.ds-l{font-size:9px;letter-spacing:0.09em;text-transform:uppercase;color:var(--t2);text-decoration:none;border:1px solid var(--b2);padding:2px 8px;transition:all 0.1s}
.ds-l:hover{border-color:var(--yel);color:var(--yel)}

/* RIGHT PANEL */
.right{display:flex;flex-direction:column;overflow:hidden}
.rp{border-bottom:1px solid var(--b1);flex-shrink:0}
.rp.scroll{flex:1;overflow-y:auto;min-height:0}
.rp-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:0;z-index:10}
.rp-title{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:6px}
.rp-act{font-size:8px;letter-spacing:0.09em;text-transform:uppercase;color:var(--t2);text-decoration:none;cursor:pointer;transition:color 0.1s}
.rp-act:hover{color:var(--green)}
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1)}
.tg-item{background:var(--s1);padding:11px 13px;display:flex;flex-direction:column;gap:3px}
.tg-val{font-family:var(--head);font-size:22px;font-weight:800;line-height:1}
.tg-val.g{color:var(--green)}
.tg-val.r{color:var(--red)}
.tg-val.y{color:var(--yel)}
.tg-val.w{color:var(--t0)}
.tg-label{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--t2)}
.tg-sub{font-size:9px;color:var(--t1)}
.wi{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s}
.wi:hover{background:var(--gfaint)}
.wi-pulse{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.wp-on{background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.wi-av{width:26px;height:26px;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t1);flex-shrink:0}
.wi-info{flex:1;min-width:0}
.wi-name{font-size:10px;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wi-sub{font-size:9px;color:var(--t2)}
.wi-add{display:flex;align-items:center;gap:7px;padding:8px 13px;font-size:9px;color:var(--t3);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase}
.wi-add:hover{color:var(--green)}
.at{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s}
.at:hover{background:var(--gfaint)}
.at-lbl{font-size:10px;color:var(--t1)}
.at-lbl.dim{opacity:0.35}
.tog{width:28px;height:14px;border-radius:7px;background:var(--b2);position:relative;transition:background 0.18s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog::after{content:'';position:absolute;top:2px;width:10px;height:10px;background:#fff;border-radius:50%;transition:left 0.18s}
.tog.on::after{left:16px}
.tog:not(.on)::after{left:2px}
.at-lock{font-size:8px;color:var(--t3);border:1px solid var(--b1);padding:1px 5px;cursor:pointer}

/* STATUS BAR */
.statusbar{height:24px;background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.sb-l,.sb-r{display:flex;align-items:center;gap:16px}
.sbi{font-size:8px;letter-spacing:0.09em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:5px}
.sd{width:4px;height:4px;border-radius:50%}
.sdg{background:var(--green);box-shadow:0 0 4px var(--green)}
.sdy{background:var(--yel)}

/* ALERTS PAGE */
.alert-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.alert-item{display:grid;grid-template-columns:4px 1fr;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s}
.alert-item:hover{background:var(--s2)}
.alert-item.unread{background:var(--gfaint)}
.ai-body{padding:13px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.ai-type{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.ai-title{font-family:var(--head);font-size:13px;font-weight:700;color:var(--t0);margin-bottom:4px}
.ai-detail{font-size:10px;color:var(--t1);line-height:1.5}
.ai-amount{font-family:var(--head);font-size:16px;font-weight:800;line-height:1;margin-bottom:4px}
.ai-time{font-size:9px;color:var(--t2)}
.delay-banner{padding:10px 16px;background:var(--yfaint);border-bottom:1px solid rgba(240,191,48,0.2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}

/* WALLET PAGE */
.wallet-search{display:flex;align-items:center;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;height:50px;padding:0 16px;gap:10px}
.w-pre{font-size:9px;letter-spacing:0.12em;color:var(--green);flex-shrink:0}
.w-in{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t0);padding:8px 12px;font-family:var(--mono);font-size:12px;outline:none}
.w-btn{padding:8px 16px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-family:var(--mono);font-size:9px;letter-spacing:0.09em;text-transform:uppercase;cursor:pointer}
.w-btn.cta{background:var(--green);color:#000;border:none;font-weight:700}
.wallet-content{flex:1;overflow-y:auto;padding:0 0 24px}
.w-inner{max-width:800px;margin:0 auto;padding:20px 16px}
.risk-block{background:var(--s1);border:1px solid var(--b2);padding:20px 24px;display:flex;align-items:center;gap:24px;position:relative;overflow:hidden;margin-bottom:16px}
.risk-stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.risk-score{font-family:var(--head);font-size:56px;font-weight:800;line-height:1;min-width:80px}
.risk-label{font-family:var(--head);font-size:16px;font-weight:700;color:var(--t0);margin-bottom:4px}
.risk-sub{font-size:11px;color:var(--t1);margin-bottom:12px}
.risk-stats{display:flex;gap:12px}
.rs-item{}
.rs-label{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.rs-val{font-size:16px;font-weight:700;color:var(--t0)}
.tx-row{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border:1px solid var(--b1);margin-bottom:1px}
.tx-sig{font-size:11px;color:var(--t0);font-family:var(--mono)}
.tx-time{font-size:10px;color:var(--t1)}
.tx-status{font-size:10px}
.monitor-cta{background:var(--gfaint2);border:1px solid rgba(0,255,135,0.2);padding:18px 20px;margin-top:16px}
.mc-title{font-family:var(--head);font-size:14px;font-weight:700;color:var(--t0);margin-bottom:8px}
.mc-sub{font-size:11px;color:var(--t1);line-height:1.6;margin-bottom:14px}
.mc-feats{list-style:none;margin-bottom:16px;display:flex;flex-direction:column;gap:6px}
.mc-feat{font-size:11px;color:var(--t1);display:flex;align-items:center;gap:8px}
.mc-btn{width:100%;background:var(--green);color:#000;border:none;padding:10px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer}
.empty-state{text-align:center;padding:60px 20px}
.es-icon{font-size:40px;margin-bottom:16px}
.es-title{font-family:var(--head);font-size:20px;font-weight:700;color:var(--t0);margin-bottom:8px}
.es-sub{font-size:12px;color:var(--t1);margin-bottom:24px;line-height:1.6}
.es-examples{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.es-ex{padding:6px 12px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-family:var(--mono);font-size:9px;cursor:pointer}

/* WATCHLISTS PAGE */
.wl-layout{display:flex;flex:1;overflow:hidden}
.wl-sidebar{width:260px;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.wl-sidebar-hdr{padding:8px 13px;border-bottom:1px solid var(--b1);background:var(--s1);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wl-list{flex:1;overflow-y:auto}
.wl-item{padding:10px 13px;border-bottom:1px solid var(--b1);cursor:pointer;border-left:3px solid transparent;transition:all 0.1s}
.wl-item:hover{background:var(--gfaint)}
.wl-item.on{background:var(--gfaint);border-left-color:var(--green)}
.wl-name{font-size:11px;color:var(--t0);margin-bottom:2px}
.wl-count{font-size:9px;color:var(--t2)}
.wl-create{padding:10px 13px;border-top:1px solid var(--b1);flex-shrink:0}
.wl-create-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.wl-create-row{display:flex;gap:6px}
.wl-input{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t0);padding:5px 8px;font-family:var(--mono);font-size:10px;outline:none}
.wl-add-btn{padding:5px 9px;background:var(--green);color:#000;border:none;font-family:var(--mono);font-size:9px;font-weight:700;cursor:pointer}
.wl-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.wl-main-hdr{padding:0 16px;height:44px;border-bottom:1px solid var(--b1);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wl-main-title{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--t1);display:flex;align-items:center;gap:8px}
.wl-addr-input{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.wl-addr-in{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t0);padding:8px 12px;font-family:var(--mono);font-size:11px;outline:none}
.wl-watch-btn{padding:8px 14px;background:var(--green);color:#000;border:none;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer}
.wl-wallets{flex:1;overflow-y:auto}
.wl-wallet-row{display:grid;grid-template-columns:8px 36px 1fr auto;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--b1);transition:background 0.1s}
.wl-wallet-row:hover{background:var(--s2)}
.wl-w-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.wl-w-av{width:32px;height:32px;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t1)}
.wl-w-addr{font-size:11px;color:var(--t0);font-family:var(--mono);margin-bottom:2px}
.wl-w-sub{font-size:9px;color:var(--t2)}
.wl-w-btns{display:flex;gap:6px}
.wl-view-btn{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--b2);padding:3px 8px;color:var(--t2);background:none;cursor:pointer;font-family:var(--mono)}
.wl-remove-btn{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--rfaint);padding:3px 8px;color:var(--red);background:var(--rfaint);cursor:pointer;font-family:var(--mono)}

/* PRICING PAGE */
.pricing-wrap{flex:1;overflow-y:auto}
.pricing-inner{max-width:860px;margin:0 auto;padding:40px 20px 60px}
.pricing-hdr{text-align:center;margin-bottom:40px}
.pricing-eyebrow{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gdim);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.pricing-title{font-family:var(--head);font-size:36px;font-weight:800;color:var(--t0);letter-spacing:-0.04em;line-height:1.1;margin-bottom:12px}
.pricing-sub{font-size:13px;color:var(--t1);line-height:1.6;max-width:480px;margin:0 auto}
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px}
.plan-card{padding:24px 20px;border-radius:4px;border:1px solid var(--b2);background:var(--s1);position:relative;display:flex;flex-direction:column}
.plan-card.highlight{border:1.5px solid rgba(0,255,135,0.40);background:linear-gradient(135deg,rgba(0,255,135,0.07),rgba(0,0,0,0))}
.plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;padding:2px 10px;border-radius:999px;letter-spacing:0.08em;white-space:nowrap}
.pb-yearly{background:linear-gradient(135deg,var(--green),#00e87a);color:#020508}
.pb-monthly{background:rgba(153,69,255,0.22);color:#c4a8ff;border:1px solid rgba(153,69,255,0.40)}
.pb-weekly{background:rgba(0,255,135,0.10);color:var(--green);border:1px solid rgba(0,255,135,0.22)}
.plan-name{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--t2);margin-bottom:8px}
.plan-card.highlight .plan-name{color:var(--gdim)}
.plan-price-row{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.plan-price{font-family:var(--head);font-size:32px;font-weight:800;color:var(--t0);line-height:1}
.plan-card.highlight .plan-price{color:var(--green)}
.plan-period{font-size:11px;color:var(--t2)}
.plan-desc{font-size:11px;color:var(--t1);margin-bottom:20px;line-height:1.4}
.plan-feats{list-style:none;flex:1;margin-bottom:20px;display:flex;flex-direction:column;gap:6px}
.plan-feat{font-size:11px;color:var(--t1);display:flex;gap:8px;align-items:flex-start}
.plan-feat-check{color:var(--green);flex-shrink:0;font-size:10px}
.plan-btn{width:100%;padding:10px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border:none}
.plan-btn:hover{filter:brightness(1.1)}
.faq-section{border-top:1px solid var(--b1);padding-top:32px}
.faq-title{text-align:center;margin-bottom:24px;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--t2)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px;margin:0 auto}
.faq-item{padding:14px;background:var(--s1);border:1px solid var(--b1)}
.faq-q{font-size:11px;font-weight:700;color:var(--t0);margin-bottom:6px}
.faq-a{font-size:10px;color:var(--t1);line-height:1.6}
.trust-strip{margin-top:24px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.trust-item{font-size:9px;color:var(--t2);letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.trust-check{color:var(--gdim)}

/* UPGRADE MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.on{display:flex}
.modal-box{background:linear-gradient(180deg,rgba(6,12,26,0.98) 0%,rgba(2,5,8,0.99) 100%);border:1px solid rgba(0,255,135,0.14);border-radius:4px;padding:24px;max-width:560px;width:100%;box-shadow:0 0 32px rgba(0,255,135,0.10),0 22px 56px rgba(0,0,0,0.60);max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-title{font-family:var(--head);font-size:20px;font-weight:800;color:var(--t0);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--t1);line-height:1.5}
.modal-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:0 0 0 16px;flex-shrink:0}
.plan-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 12px}
.ps-card{padding:13px 12px;border:1px solid var(--b2);background:rgba(255,255,255,0.03);cursor:pointer;transition:all 0.12s}
.ps-card.on{border:1.5px solid rgba(0,255,135,0.46);background:linear-gradient(135deg,rgba(0,255,135,0.09),rgba(0,0,0,0))}
.ps-badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:999px;margin-bottom:4px;display:inline-block}
.ps-label{font-size:13px;font-weight:900;color:var(--t0);margin-bottom:2px}
.ps-card.on .ps-label{color:var(--green)}
.ps-price{font-size:12px;font-weight:700;color:var(--t0)}
.ps-note{font-size:10px;color:var(--t2);margin-bottom:8px}
.ps-feats{list-style:none;display:flex;flex-direction:column;gap:4px}
.ps-feat{font-size:10px;color:var(--t1);display:flex;gap:5px}
.ps-feat-check{color:var(--gdim)}
.modal-cta{width:100%;background:var(--green);color:#000;border:none;padding:12px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-bottom:10px}
.modal-trust{display:flex;justify-content:center;gap:16px;font-size:9px;color:var(--t2);margin-bottom:12px}
.modal-restore-link{background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--t2);cursor:pointer;letter-spacing:0.06em;text-decoration:underline;text-decoration-color:var(--b2);display:block;margin:0 auto}
.checkout-wrap{min-height:400px;border-radius:4px;overflow:hidden}
.restore-wrap{}
.restore-row{display:flex;gap:8px;margin-bottom:10px}
.restore-in{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t0);padding:10px 12px;font-family:var(--mono);font-size:12px;outline:none}
.restore-btn{padding:10px 16px;background:var(--green);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;flex-shrink:0}
.restore-note{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:12px}
.restore-back{background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--t2);cursor:pointer;letter-spacing:0.06em}
.restore-success{padding:16px;background:var(--gfaint2);border:1px solid rgba(0,255,135,0.2);text-align:center}
.restore-success-icon{font-size:20px;margin-bottom:8px}
.restore-success-title{font-family:var(--head);font-size:14px;font-weight:700;color:var(--green);margin-bottom:4px}
.restore-success-sub{font-size:11px;color:var(--t1)}
.msg-warn{font-size:11px;color:var(--yel);margin-bottom:8px}
.msg-err{font-size:11px;color:var(--red);margin-bottom:8px}
.back-btn{margin-top:10px;padding:7px 12px;border:1px solid var(--b2);background:rgba(255,255,255,0.04);color:var(--t1);font-size:11px;cursor:pointer;font-family:var(--mono)}

/* ALPHA TRACER PAGE */
.alpha-wrap{flex:1;overflow-y:auto}
.alpha-inner{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.alpha-hero{margin-bottom:20px}
.alpha-eyebrow{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gdim);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.alpha-title{font-family:var(--head);font-size:24px;font-weight:800;color:var(--t0);letter-spacing:-0.03em;line-height:1.1;margin-bottom:8px}
.alpha-sub{font-size:12px;color:var(--t1);line-height:1.6;max-width:560px}
.tracer-box{background:var(--s1);border:1px solid var(--b2);padding:16px;margin-bottom:20px}
.tracer-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--t2);margin-bottom:8px}
.tracer-row{display:flex;gap:8px}
.tracer-in{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t0);padding:10px 12px;font-family:var(--mono);font-size:12px;outline:none}
.tracer-btn{padding:10px 18px;background:var(--green);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.tracer-hint{font-size:9px;color:var(--t3);margin-top:8px}
.section-hd{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--t1);display:flex;align-items:center;gap:8px;margin:24px 0 10px}
.section-hd span.bar{display:inline-block;width:3px;height:12px;background:var(--green)}
.buyer-row{display:grid;grid-template-columns:24px 1fr auto auto;align-items:center;gap:12px;padding:11px 14px;background:var(--s1);border:1px solid var(--b1);margin-bottom:1px;cursor:pointer;transition:background 0.1s}
.buyer-row:hover{background:var(--s2)}
.buyer-rank{font-family:var(--head);font-size:14px;font-weight:800;color:var(--gdim)}
.buyer-addr{font-family:var(--mono);font-size:11px;color:var(--t0);margin-bottom:2px}
.buyer-meta{font-size:9px;color:var(--t2)}
.buyer-stat{text-align:right}
.buyer-stat-val{font-family:var(--head);font-size:14px;font-weight:800;line-height:1}
.buyer-stat-lbl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.alpha-card{background:var(--s1);border:1px solid var(--b1);padding:14px;margin-bottom:1px;display:grid;grid-template-columns:4px 1fr auto;gap:0;cursor:pointer;transition:background 0.1s}
.alpha-card:hover{background:var(--s2)}
.alpha-card-body{padding-left:12px}
.alpha-token{font-family:var(--head);font-size:15px;font-weight:700;color:var(--t0);margin-bottom:3px}
.alpha-detail{font-size:10px;color:var(--t1);line-height:1.5}
.alpha-conf{text-align:right;padding-left:12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center}
.alpha-conf-val{font-family:var(--head);font-size:24px;font-weight:800;line-height:1}
.alpha-conf-lbl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px}
.alpha-loading{text-align:center;padding:40px 20px;color:var(--t1);font-size:12px}
.alpha-locked{position:relative}
.alpha-locked .alpha-card{opacity:0.3;filter:blur(1px);pointer-events:none}

/* FAMOUS PUMPS GALLERY */
.pumps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.pump-card{background:linear-gradient(135deg,var(--s1) 0%,rgba(0,255,135,0.04) 100%);border:1px solid var(--b2);padding:13px 11px;cursor:pointer;transition:all 0.15s;text-align:left;font-family:var(--mono);position:relative;overflow:hidden}
.pump-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent);opacity:0.6}
.pump-card:hover{border-color:rgba(0,255,135,0.46);background:linear-gradient(135deg,var(--gfaint) 0%,rgba(0,255,135,0.10) 100%);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,255,135,0.12)}
.pump-ticker{font-family:var(--head);font-size:13px;font-weight:800;color:var(--t0);letter-spacing:-0.02em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pump-ticker::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.pump-gain{font-family:var(--head);font-size:17px;font-weight:800;color:var(--green);text-shadow:0 0 14px rgba(0,255,135,0.35);line-height:1;margin-bottom:5px;letter-spacing:-0.02em}
.pump-meta{font-size:8px;color:var(--t2);letter-spacing:0.05em;text-transform:uppercase;line-height:1.3}

/* PROOF STRIP */
.proof-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--b1);border-bottom:1px solid var(--b2);flex-shrink:0}
.ps-stat{background:var(--s1);padding:11px 12px;text-align:center}
.ps-num{font-family:var(--head);font-size:17px;font-weight:800;color:var(--green);line-height:1;margin-bottom:3px;text-shadow:0 0 12px rgba(0,255,135,0.25)}
.ps-lbl{font-size:8px;color:var(--t2);letter-spacing:0.09em;text-transform:uppercase}

/* SOCIAL TICKER */
.social-ticker{height:28px;background:linear-gradient(90deg,var(--s2),var(--s1));border-bottom:1px solid var(--b1);overflow:hidden;display:flex;align-items:center;position:relative;flex-shrink:0}
.st-track{display:flex;gap:36px;white-space:nowrap;animation:scrollX 45s linear infinite;padding-left:100%}
.st-item{font-size:9px;color:var(--t1);letter-spacing:0.04em;display:flex;align-items:center;gap:7px;flex-shrink:0}
.st-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0;animation:pulse 2s infinite}
.st-item strong{color:var(--t0);font-weight:700}
.st-item em{color:var(--green);font-style:normal;font-weight:700}
@keyframes scrollX{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* MOBILE STICKY CTA */
.mobile-sticky-cta{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(4,7,6,0.0) 0%,rgba(4,7,6,0.96) 35%,var(--bg) 100%);padding:14px 14px 16px;z-index:200;backdrop-filter:blur(8px)}
.msc-inner{background:linear-gradient(135deg,rgba(0,255,135,0.12),rgba(0,255,135,0.04));border:1px solid rgba(0,255,135,0.30);padding:10px 12px;border-radius:4px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,255,135,0.18)}
.msc-text{flex:1;min-width:0}
.msc-headline{font-family:var(--head);font-size:12px;font-weight:700;color:var(--t0);line-height:1.2;margin-bottom:2px}
.msc-sub{font-size:9px;color:var(--gdim);letter-spacing:0.04em}
.msc-btn{background:var(--green);color:#000;border:none;padding:9px 14px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:2px;flex-shrink:0;box-shadow:0 0 18px rgba(0,255,135,0.25)}
.msc-close{background:none;border:none;color:var(--t2);font-size:14px;cursor:pointer;padding:0 4px;flex-shrink:0}

/* PROOF BANNER ON FEED */
.proof-banner{padding:12px 16px;background:linear-gradient(90deg,var(--gfaint2) 0%,transparent 100%);border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:12px;flex-shrink:0}
.pb-emoji{font-size:20px;flex-shrink:0}
.pb-text{flex:1;font-size:11px;color:var(--t1);line-height:1.5}
.pb-text strong{color:var(--t0);font-family:var(--head)}
.pb-text em{color:var(--green);font-style:normal;font-weight:700}
.pb-cta{font-size:9px;letter-spacing:0.07em;text-transform:uppercase;background:transparent;border:1px solid rgba(0,255,135,0.3);color:var(--green);padding:6px 11px;cursor:pointer;font-family:var(--mono);font-weight:700;flex-shrink:0;transition:all 0.12s}
.pb-cta:hover{background:var(--green);color:#000}

/* ═══ MOBILE RESPONSIVE ═══ */
@media (max-width:820px){
  html,body{overflow:auto;height:auto;min-height:100%}
  .topbar{height:auto;flex-wrap:wrap;position:sticky;top:0}
  .logo-block{width:auto;flex:1;border-right:none;padding:10px 14px}
  .tb-right{padding:10px 14px;border-left:none}
  .tb-btn{padding:7px 10px;font-size:8px}
  .topbar-nav{order:3;width:100%;border-top:1px solid var(--b1);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
  .tn{padding:10px 12px;font-size:9px;flex-shrink:0}
  .workspace{display:flex;flex-direction:column;overflow:visible}
  .left{display:none}
  .left.mobile-open{display:flex;width:100%;border-right:none}
  .page{flex-direction:column !important}
  .center{border-right:none;flex:none}
  .right{width:100% !important;border-left:none !important;border-top:1px solid var(--b1)}
  .feed,.alerts-list,.wl-wallets,.wallet-content,.alpha-wrap,.pricing-wrap{overflow-y:visible !important}
  .feed{min-height:auto}
  #page-alerts > div:last-child{width:100% !important;border-left:none !important;border-top:1px solid var(--b1)}
  .wl-layout{flex-direction:column}
  .wl-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--b1)}
  .wl-list{max-height:160px}
  .plan-grid{grid-template-columns:1fr;gap:24px}
  .faq-grid{grid-template-columns:1fr}

.ta-flow{background:#0a0a0a;border:1px solid var(--b2);border-radius:6px;padding:14px}
.ta-flow-bar{display:flex;height:10px;border-radius:4px;overflow:hidden;background:#000;margin-bottom:12px}
.ta-flow-buys{background:linear-gradient(90deg,var(--green),#00cc6a);box-shadow:0 0 8px rgba(0,255,135,0.3)}
.ta-flow-sells{background:linear-gradient(90deg,#ff3b69,#cc1a40)}
.ta-flow-stats{display:flex;justify-content:space-between}
.ta-flow-stat{font-family:var(--mono)}
.ta-flow-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:3px}
.ta-flow-val{font-family:var(--head);font-size:18px;font-weight:800;letter-spacing:-0.01em}
.ta-flow-stat.ta-buys .ta-flow-val{color:var(--green)}
.ta-flow-stat.ta-sells .ta-flow-val{color:#ff3b69;text-align:right}
.ta-flow-ratio{font-family:var(--mono);font-size:11px;color:var(--t2);text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--b2)}

.ta-trade-mini{display:flex;justify-content:center;align-items:center;gap:8px;padding:11px 20px;background:linear-gradient(135deg,rgba(153,69,255,0.1) 0%,rgba(20,241,149,0.08) 100%);border:1px solid rgba(153,69,255,0.4);color:#fff;text-decoration:none;border-radius:6px;font-family:var(--head);font-weight:700;font-size:13px;margin:14px 0;letter-spacing:-0.005em;transition:all 0.15s}
.ta-trade-mini:hover{background:linear-gradient(135deg,rgba(153,69,255,0.2) 0%,rgba(20,241,149,0.16) 100%);transform:translateY(-1px)}

.ta-signals{display:flex;flex-direction:column;gap:8px}
.ta-signal{display:flex;gap:12px;padding:11px 13px;background:#0a0a0a;border:1px solid var(--b2);border-left:3px solid var(--b2);border-radius:6px}
.ta-signal.pass{border-left-color:var(--green)}
.ta-signal.fail{border-left-color:#ff3b69}
.ta-signal.warn{border-left-color:#ffb43b}
.ta-sig-icon{font-size:18px;flex-shrink:0;font-family:var(--head);font-weight:800}
.ta-signal.pass .ta-sig-icon{color:var(--green)}
.ta-signal.fail .ta-sig-icon{color:#ff3b69}
.ta-signal.warn .ta-sig-icon{color:#ffb43b}
.ta-sig-content{flex:1}
.ta-sig-h{font-family:var(--head);font-size:13px;color:var(--t1);font-weight:700;letter-spacing:-0.01em;margin-bottom:2px}
.ta-sig-d{font-size:11.5px;color:var(--t2);line-height:1.45}

.ta-pairs{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.ta-pair{background:#0a0a0a;border:1px solid var(--b2);border-radius:6px;padding:11px 13px}
.ta-pair-dex{font-family:var(--head);font-size:13px;color:var(--t1);font-weight:700;letter-spacing:-0.01em;text-transform:capitalize}
.ta-pair-liq{font-family:var(--mono);font-size:10.5px;color:var(--t2);margin-top:3px}
.ta-pair-vol{font-family:var(--mono);font-size:10.5px;color:var(--t3);margin-top:1px}

.ta-links{display:flex;flex-wrap:wrap;gap:8px}
.ta-link{padding:8px 14px;background:#0a0a0a;border:1px solid var(--b2);color:var(--t1);text-decoration:none;font-family:var(--mono);font-size:11.5px;border-radius:6px;font-weight:600;letter-spacing:0.3px;transition:all 0.15s}
.ta-link:hover{border-color:#9945ff;color:#fff;background:rgba(153,69,555,0.05)}
.ta-link.featured{background:linear-gradient(135deg,rgba(153,69,255,0.08),rgba(20,241,149,0.06));border-color:rgba(153,69,255,0.4)}

.ta-disclaimer{font-family:var(--mono);font-size:10px;color:var(--t3);text-align:center;margin-top:20px;line-height:1.5;padding:12px;background:#080808;border:1px dashed var(--b2);border-radius:6px}

.ta-scout{display:flex;align-items:center;gap:14px;background:#0a0a0a;border:1px solid var(--b2);border-radius:8px;padding:14px;margin-bottom:14px}
.ta-scout-circle{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;border:2px solid var(--b2);font-family:var(--head)}
.ta-scout-circle.high{border-color:var(--green);box-shadow:inset 0 0 16px rgba(0,255,135,0.18),0 0 12px rgba(0,255,135,0.15)}
.ta-scout-circle.mid{border-color:#ffb43b;box-shadow:inset 0 0 16px rgba(255,180,59,0.18),0 0 12px rgba(255,180,59,0.15)}
.ta-scout-circle.low{border-color:#ff3b69;box-shadow:inset 0 0 16px rgba(255,59,105,0.18),0 0 12px rgba(255,59,105,0.15)}
.ta-scout-v{font-weight:800;font-size:22px;line-height:1}
.ta-scout-l{font-size:7.5px;letter-spacing:0.8px;text-transform:uppercase;margin-top:1px;font-family:var(--mono);font-weight:600;opacity:0.85}
.ta-scout-circle.high .ta-scout-v,.ta-scout-circle.high .ta-scout-l{color:var(--green)}
.ta-scout-circle.mid .ta-scout-v,.ta-scout-circle.mid .ta-scout-l{color:#ffb43b}
.ta-scout-circle.low .ta-scout-v,.ta-scout-circle.low .ta-scout-l{color:#ff3b69}
.ta-scout-text{flex:1}
.ta-scout-h{font-family:var(--head);font-size:15px;color:var(--t1);font-weight:700;letter-spacing:-0.01em}
.ta-scout-sub{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.4}

/* SAFETY AUDIT — must scream when bad */
.ta-safety{margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--b2);background:#0a0a0a}
.ta-safety-loading{padding:18px;font-family:var(--mono);font-size:12px;color:var(--t3);text-align:center}
.ta-safety-banner{padding:16px 18px;display:flex;align-items:center;gap:14px;font-family:var(--head);font-weight:700;border-bottom:1px solid var(--b2)}
.ta-safety-banner .tsb-icon{font-size:30px;flex-shrink:0;line-height:1}
.ta-safety-banner .tsb-text{flex:1}
.ta-safety-banner .tsb-level{font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;opacity:0.85;font-weight:800}
.ta-safety-banner .tsb-title{font-size:17px;font-weight:800;letter-spacing:-0.01em;margin-bottom:3px;color:var(--t0)}
.ta-safety-banner .tsb-sum{font-family:var(--head);font-size:12.5px;font-weight:500;color:var(--t2);line-height:1.45;letter-spacing:0}
.ta-safety-banner .tsb-score{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;border-radius:8px;min-width:62px;flex-shrink:0;border:2px solid currentColor}
.ta-safety-banner .tsb-score-v{font-size:22px;font-weight:800;line-height:1}
.ta-safety-banner .tsb-score-l{font-size:8.5px;letter-spacing:0.7px;text-transform:uppercase;margin-top:2px;opacity:0.85;font-family:var(--mono);font-weight:600}
.ta-safety[data-level="CRITICAL"]{border:1px solid #ff1a4d;box-shadow:0 0 0 1px rgba(255,26,77,0.18),0 10px 36px rgba(255,26,77,0.18)}
.ta-safety[data-level="CRITICAL"] .ta-safety-banner{background:linear-gradient(135deg,rgba(255,26,77,0.18),rgba(255,26,77,0.06));color:#ff1a4d}
.ta-safety[data-level="HIGH"]{border:1px solid #ff7b3b}
.ta-safety[data-level="HIGH"] .ta-safety-banner{background:linear-gradient(135deg,rgba(255,123,59,0.14),rgba(255,123,59,0.04));color:#ff7b3b}
.ta-safety[data-level="MEDIUM"]{border:1px solid #ffb43b}
.ta-safety[data-level="MEDIUM"] .ta-safety-banner{background:linear-gradient(135deg,rgba(255,180,59,0.12),rgba(255,180,59,0.03));color:#ffb43b}
.ta-safety[data-level="LOW"]{border:1px solid rgba(0,255,135,0.4)}
.ta-safety[data-level="LOW"] .ta-safety-banner{background:linear-gradient(135deg,rgba(0,255,135,0.10),rgba(0,255,135,0.02));color:var(--green)}
.ta-safety-grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px}
.ta-safety-sig{padding:11px 13px;background:#000;border-radius:6px;border:1px solid var(--b2);border-left:3px solid var(--b2)}
.ta-safety-sig.pass{border-left-color:var(--green)}
.ta-safety-sig.fail.critical{border-left-color:#ff1a4d;background:rgba(255,26,77,0.04)}
.ta-safety-sig.fail.high{border-left-color:#ff7b3b}
.ta-safety-sig.warn{border-left-color:#ffb43b}
.ta-safety-sig.info{border-left-color:var(--b3);opacity:0.85}
.ta-safety-sig .tss-h{font-family:var(--head);font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-0.005em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ta-safety-sig .tss-icon{font-family:var(--head);font-weight:800;font-size:14px}
.ta-safety-sig.pass .tss-icon{color:var(--green)}
.ta-safety-sig.fail.critical .tss-icon{color:#ff1a4d}
.ta-safety-sig.fail.high .tss-icon{color:#ff7b3b}
.ta-safety-sig.warn .tss-icon{color:#ffb43b}
.ta-safety-sig.info .tss-icon{color:var(--t3)}
.ta-safety-sig .tss-d{font-size:11.5px;color:var(--t2);line-height:1.45}
.ta-safety-disclaimer{padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--t3);border-top:1px solid var(--b2);text-align:center}
@keyframes warningPulse{0%,100%{box-shadow:0 0 0 1px rgba(255,26,77,0.18),0 10px 36px rgba(255,26,77,0.18)}50%{box-shadow:0 0 0 1px rgba(255,26,77,0.4),0 12px 48px rgba(255,26,77,0.32)}}
.ta-safety[data-level="CRITICAL"]{animation:warningPulse 2.4s ease-in-out infinite}

/* LAUNCH FORENSICS — deployer-funded buyer detection */
.ta-forensics{margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--b2);background:#0a0a0a}
.ta-forensics-loading{padding:18px;font-family:var(--mono);font-size:12px;color:var(--t3);text-align:center}
.ta-forensics-hdr{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b2);background:#070707}
.ta-forensics-hdr .tfh-icon{font-size:22px}
.ta-forensics-hdr .tfh-text{flex:1;min-width:0}
.ta-forensics-hdr .tfh-eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:3px}
.ta-forensics-hdr .tfh-title{font-family:var(--head);font-size:15px;color:var(--t1);font-weight:800;letter-spacing:-0.01em}
.ta-forensics-hdr .tfh-pct{font-family:var(--head);font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1;flex-shrink:0;padding:6px 12px;border-radius:8px;border:2px solid currentColor}
.ta-forensics[data-level="CRITICAL"]{border-color:#ff1a4d;box-shadow:0 0 0 1px rgba(255,26,77,0.14)}
.ta-forensics[data-level="CRITICAL"] .tfh-pct{color:#ff1a4d}
.ta-forensics[data-level="HIGH"]{border-color:#ff7b3b}
.ta-forensics[data-level="HIGH"] .tfh-pct{color:#ff7b3b}
.ta-forensics[data-level="MEDIUM"] .tfh-pct{color:#ffb43b}
.ta-forensics[data-level="LOW"] .tfh-pct{color:var(--green)}
.ta-forensics[data-level="UNKNOWN"] .tfh-pct{color:var(--t3)}
.ta-forensics-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b2)}
.ta-forensics-stat{padding:10px 12px;background:#000;text-align:center}
.tfs-v{font-family:var(--head);font-size:18px;color:var(--t0);font-weight:800;letter-spacing:-0.01em}
.tfs-l{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;margin-top:3px;font-weight:600}
.ta-forensics-verdict{padding:14px 18px;font-size:13px;color:var(--t1);line-height:1.55;font-family:var(--head);font-weight:500}
.ta-forensics-flagged{padding:0 18px 14px;font-family:var(--mono);font-size:10.5px;color:var(--t2)}
.ta-forensics-flagged-h{color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-size:9px;margin-bottom:6px;font-weight:700}
.ta-forensics-flagged-list{display:flex;flex-wrap:wrap;gap:4px}
.ta-forensics-flagged-list span{padding:3px 7px;background:rgba(255,26,77,0.08);border:1px solid rgba(255,26,77,0.25);border-radius:4px;color:#ff7b3b;font-size:10px;letter-spacing:0.2px;cursor:pointer}
.ta-forensics-flagged-list span:hover{background:rgba(255,26,77,0.15)}
.ta-forensics-deployer{padding:10px 18px;font-family:var(--mono);font-size:10.5px;color:var(--t3);border-top:1px solid var(--b2);background:#050505;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ta-forensics-deployer .tfd-l{color:var(--t3)}
.ta-forensics-deployer .tfd-v{color:var(--t1);font-weight:600;cursor:pointer}
.ta-forensics-deployer .tfd-v:hover{color:#ff7b3b}

/* SMART MONEY card — Layer 3 alpha-group footprint */
.ta-smartmoney{margin-bottom:18px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#0a0a0a 0%,#0c0a14 100%)}

.ta-conviction{margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--b2);background:#0a0a0a}
.ta-conviction[data-signal="CONVICTION CLUSTER"]{border-color:#14f195;background:linear-gradient(135deg,#0a0a0a 0%,#021a12 100%)}
.ta-conviction[data-signal="FRESH CLUSTER"]{border-color:#9945ff;background:linear-gradient(135deg,#0a0a0a 0%,#100628 50%,#021a12 100%);box-shadow:inset 0 0 30px rgba(153,69,255,0.08)}
.ta-conviction[data-signal="FRESH CLUSTER"] .ta-conv-pct{color:#c4a8ff}
.ta-conviction[data-signal="HONEYPOT PATTERN"]{border-color:#ff1a4d;background:linear-gradient(135deg,#0a0a0a 0%,#1a0006 100%)}
.ta-conviction-loading{padding:18px;color:var(--t2);font-family:var(--mono);font-size:11px;text-align:center}
.ta-conv-hdr{padding:14px 16px 10px;display:flex;align-items:center;gap:12px}
.ta-conv-icon{font-size:24px;line-height:1}
.ta-conv-text{flex:1;min-width:0}
.ta-conv-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:1.4px;color:var(--t3);text-transform:uppercase;margin-bottom:3px}
.ta-conv-title{font-family:var(--head);font-size:14px;font-weight:800;color:var(--t0);letter-spacing:-0.01em;line-height:1.3}
.ta-conv-pct{font-family:var(--mono);font-size:18px;font-weight:800}
.ta-conviction[data-signal="CONVICTION CLUSTER"] .ta-conv-pct{color:#14f195}
.ta-conviction[data-signal="HONEYPOT PATTERN"] .ta-conv-pct{color:#ff1a4d}
.ta-conv-stats{display:grid;grid-template-columns:repeat(3,1fr);padding:10px 16px;background:rgba(0,0,0,0.4);gap:8px}
.ta-conv-stat{text-align:center}
.ta-conv-stat-v{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--t1)}
.ta-conv-stat-l{font-family:var(--mono);font-size:8.5px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;margin-top:2px}
.ta-conv-verdict{padding:10px 16px;font-size:12px;color:var(--t1);line-height:1.5;border-top:1px solid rgba(255,255,255,0.04)}
.ta-conv-buyers{padding:8px 16px 14px}
.ta-conv-buyers-h{font-family:var(--mono);font-size:9px;letter-spacing:0.8px;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.ta-conv-buyer{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(0,0,0,0.5);border:1px solid var(--b2);border-radius:6px;margin-bottom:5px;font-family:var(--mono);font-size:10.5px}
.ta-conv-buyer:hover{background:rgba(20,241,149,0.04);border-color:var(--b3);cursor:pointer}
.ta-conv-buyer-w{color:var(--t2)}
.ta-conv-buyer-u{color:#14f195;font-weight:700}
.ta-conv-buyer-s{color:var(--t3);font-size:9.5px}
.ta-conv-skip{padding:14px 16px;color:var(--t3);font-family:var(--mono);font-size:10.5px;text-align:center;font-style:italic}

.ta-smartmoney[data-level="HOT"]{border:1px solid #14F195;box-shadow:0 0 0 1px rgba(20,241,149,0.15),0 10px 40px rgba(20,241,149,0.12)}
.ta-smartmoney[data-level="WARM"]{border:1px solid rgba(20,241,149,0.4)}
.ta-smartmoney[data-level="COLD"]{border:1px solid var(--b2)}
.ta-smartmoney[data-level="EMPTY"]{border:1px solid var(--b2)}
.ta-sm-hdr{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b2)}
.ta-sm-hdr .tsh-icon{font-size:22px}
.ta-sm-hdr .tsh-text{flex:1;min-width:0}
.ta-sm-hdr .tsh-eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:3px}
.ta-sm-hdr .tsh-title{font-family:var(--head);font-size:15px;color:var(--t1);font-weight:800;letter-spacing:-0.01em}
.ta-sm-hdr .tsh-count{font-family:var(--head);font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1;flex-shrink:0;padding:6px 14px;border-radius:8px;border:2px solid currentColor}
.ta-smartmoney[data-level="HOT"] .tsh-count{color:#14F195}
.ta-smartmoney[data-level="WARM"] .tsh-count{color:rgba(20,241,149,0.7)}
.ta-smartmoney[data-level="COLD"] .tsh-count,.ta-smartmoney[data-level="EMPTY"] .tsh-count{color:var(--t3)}
.ta-sm-verdict{padding:13px 18px;font-size:13px;color:var(--t1);line-height:1.55;font-family:var(--head);font-weight:500}
.ta-sm-hits{padding:0 18px 14px;display:flex;flex-direction:column;gap:6px}
.ta-sm-hit{padding:10px 12px;background:#000;border-radius:6px;border:1px solid rgba(20,241,149,0.25);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s}
.ta-sm-hit:hover{border-color:#14F195;background:rgba(20,241,149,0.04)}
.ta-sm-hit-label{flex:1;min-width:0}
.ta-sm-hit-name{font-family:var(--head);font-size:13px;color:var(--t1);font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.ta-sm-hit-name::before{content:'★';color:#14F195;font-size:11px}
.ta-sm-hit-notes{font-size:10.5px;color:var(--t3);line-height:1.4}
.ta-sm-hit-addr{font-family:var(--mono);font-size:10px;color:#14F195;background:rgba(20,241,149,0.08);padding:4px 7px;border-radius:4px;letter-spacing:0.3px;flex-shrink:0}
.ta-sm-footer{padding:10px 18px;border-top:1px solid var(--b2);background:#050505;font-family:var(--mono);font-size:10.5px;color:var(--t3);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}

/* VERDICT HERO — cuts to the chase */
.ta-verdict{margin-bottom:22px;border-radius:14px;overflow:hidden;position:relative;background:#0a0a0a}
.ta-verdict-loading{padding:24px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--t3);background:#0a0a0a;border:1px dashed var(--b2);border-radius:14px}
.ta-verdict-loading .tvl-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-right:8px;animation:pulse 1.4s infinite}
.ta-vd-top{padding:18px 22px 14px;display:flex;align-items:flex-start;gap:14px}
.ta-vd-emoji{font-size:36px;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 8px currentColor)}
.ta-vd-text{flex:1;min-width:0}
.ta-vd-level{font-family:var(--head);font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1;margin-bottom:6px;text-transform:uppercase}
.ta-vd-headline{font-family:var(--head);font-size:13.5px;color:var(--t1);font-weight:500;line-height:1.45;letter-spacing:-0.005em}
.ta-vd-score{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px;border-radius:10px;flex-shrink:0;border:2px solid currentColor;min-width:74px}
.ta-vd-score-v{font-family:var(--head);font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.02em}
.ta-vd-score-l{font-family:var(--mono);font-size:8.5px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;opacity:0.8;font-weight:700}
.ta-vd-findings{padding:0 22px 14px;display:flex;flex-direction:column;gap:5px}
.ta-vd-finding{font-family:var(--head);font-size:12.5px;color:var(--t1);font-weight:500;line-height:1.4;display:flex;align-items:flex-start;gap:8px;letter-spacing:-0.005em}
.ta-vd-finding-icon{flex-shrink:0;font-family:var(--mono);font-size:11px;font-weight:800;width:14px;text-align:center}
.ta-vd-finding.good .ta-vd-finding-icon{color:var(--green)}
.ta-vd-finding.bad .ta-vd-finding-icon{color:#ff1a4d}
.ta-vd-finding.warn .ta-vd-finding-icon{color:#ffb43b}
.ta-vd-finding.star .ta-vd-finding-icon{color:#14F195}
.ta-vd-cta{display:block;padding:14px 22px;text-align:center;font-family:var(--head);font-size:14px;font-weight:800;letter-spacing:0.3px;text-decoration:none;border:none;cursor:pointer;width:100%;text-transform:uppercase;transition:filter 0.15s}
.ta-vd-cta:hover{filter:brightness(1.1)}

/* level color schemes */
.ta-verdict[data-level="strong-entry"]{border:2px solid #14F195;box-shadow:0 0 0 1px rgba(20,241,149,0.2),0 16px 48px rgba(20,241,149,0.2)}
.ta-verdict[data-level="strong-entry"] .ta-vd-emoji{color:#14F195}
.ta-verdict[data-level="strong-entry"] .ta-vd-level{color:#14F195}
.ta-verdict[data-level="strong-entry"] .ta-vd-score{color:#14F195}
.ta-verdict[data-level="strong-entry"] .ta-vd-cta{background:linear-gradient(135deg,#14F195 0%,#0ed583 100%);color:#001a0d}
.ta-verdict[data-level="strong-entry"] .ta-vd-top{background:linear-gradient(180deg,rgba(20,241,149,0.06) 0%,transparent 100%)}

.ta-verdict[data-level="clean-entry"]{border:2px solid rgba(20,241,149,0.55);box-shadow:0 6px 24px rgba(20,241,149,0.08)}
.ta-verdict[data-level="clean-entry"] .ta-vd-emoji{color:var(--green)}
.ta-verdict[data-level="clean-entry"] .ta-vd-level{color:var(--green)}
.ta-verdict[data-level="clean-entry"] .ta-vd-score{color:var(--green)}
.ta-verdict[data-level="clean-entry"] .ta-vd-cta{background:linear-gradient(135deg,#14F195 0%,#0ed583 100%);color:#001a0d}

.ta-verdict[data-level="watch"]{border:2px solid #ffb43b}
.ta-verdict[data-level="watch"] .ta-vd-emoji{color:#ffb43b}
.ta-verdict[data-level="watch"] .ta-vd-level{color:#ffb43b}
.ta-verdict[data-level="watch"] .ta-vd-score{color:#ffb43b}
.ta-verdict[data-level="watch"] .ta-vd-cta{background:linear-gradient(135deg,#ffb43b 0%,#e8a232 100%);color:#1a0f00}

.ta-verdict[data-level="caution"]{border:2px solid #ff7b3b}
.ta-verdict[data-level="caution"] .ta-vd-emoji{color:#ff7b3b}
.ta-verdict[data-level="caution"] .ta-vd-level{color:#ff7b3b}
.ta-verdict[data-level="caution"] .ta-vd-score{color:#ff7b3b}
.ta-verdict[data-level="caution"] .ta-vd-cta{background:#1a1a1a;color:#ff7b3b;border:1px solid #ff7b3b}

.ta-verdict[data-level="avoid"]{border:2px solid #ff1a4d;box-shadow:0 0 0 1px rgba(255,26,77,0.15),0 12px 36px rgba(255,26,77,0.18);animation:warningPulse 2.4s ease-in-out infinite}
.ta-verdict[data-level="avoid"] .ta-vd-emoji{color:#ff1a4d}
.ta-verdict[data-level="avoid"] .ta-vd-level{color:#ff1a4d}
.ta-verdict[data-level="avoid"] .ta-vd-score{color:#ff1a4d}
.ta-verdict[data-level="avoid"] .ta-vd-cta{background:#1a0508;color:#ff7b8e;border:1px solid #ff1a4d}
.ta-verdict[data-level="avoid"] .ta-vd-cta::after{content:" (NOT RECOMMENDED)";font-size:0.85em;opacity:0.85;font-weight:600}
.ta-verdict[data-level="avoid"] .ta-vd-top{background:linear-gradient(180deg,rgba(255,26,77,0.10) 0%,transparent 100%)}

/* LIVE CALLS PAGE — cuts to the chase */
.calls-wrap{flex:1;overflow-y:auto;padding:30px 24px 50px}
.calls-inner{max-width:920px;margin:0 auto}
.calls-hero{margin-bottom:22px}
.calls-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.calls-filter{display:flex;gap:6px}
.calls-fbtn{background:#0d0d0d;border:1px solid var(--b2);color:var(--t2);padding:8px 14px;font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:0.5px}
.calls-fbtn:hover{border-color:var(--b3);color:var(--t1)}
.calls-fbtn.on{background:rgba(20,241,149,0.10);border-color:#14F195;color:#14F195}
.calls-refresh{background:#0d0d0d;border:1px solid var(--b2);color:var(--t2);padding:8px 14px;font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:0.5px;transition:all 0.15s}
.calls-refresh:hover{border-color:var(--b3);color:var(--t1)}
.calls-refresh:disabled{opacity:0.5;cursor:wait}
.calls-list{display:flex;flex-direction:column;gap:10px}
.calls-empty{padding:40px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--t3);background:#0a0a0a;border:1px dashed var(--b2);border-radius:10px}
.calls-footer{margin-top:24px;padding:14px 16px;font-family:var(--mono);font-size:10.5px;color:var(--t3);text-align:center;line-height:1.6;background:#070707;border-radius:8px;border:1px solid var(--b2)}

/* Each call row */
.call-row{background:#0a0a0a;border:1px solid var(--b2);border-left:4px solid var(--b2);border-radius:8px;padding:14px 16px;transition:all 0.15s;position:relative}
.call-row.loading{opacity:0.6}
.call-row[data-level="strong-entry"]{border-color:rgba(20,241,149,0.4);border-left:4px solid #14F195;box-shadow:0 4px 18px rgba(20,241,149,0.10)}
.call-row[data-level="clean-entry"]{border-left:4px solid var(--green)}
.call-row[data-level="watch"]{border-left:4px solid #ffb43b}
.call-row[data-level="caution"]{border-left:4px solid #ff7b3b;opacity:0.85}
.call-row[data-level="avoid"]{border-left:4px solid #ff1a4d;opacity:0.7}
.call-row[data-level="error"]{border-left:4px solid var(--t3);opacity:0.5}

.cr-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.cr-rank{font-family:var(--mono);font-size:11px;color:var(--t3);font-weight:700;letter-spacing:0.5px;flex-shrink:0}
.cr-symbol{font-family:var(--head);font-size:16px;color:var(--t0);font-weight:800;letter-spacing:-0.01em}
.cr-price{font-family:var(--mono);font-size:13px;color:var(--green);font-weight:700;letter-spacing:-0.01em}
.cr-price sub{font-size:0.75em;color:rgba(20,241,149,0.7);font-weight:700;vertical-align:sub;margin:0 1px}
.cr-badge{font-family:var(--head);font-size:11px;font-weight:800;letter-spacing:0.5px;padding:4px 9px;border-radius:5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px;border:1px solid currentColor}
.call-row[data-level="strong-entry"] .cr-badge{color:#14F195;background:rgba(20,241,149,0.10)}
.call-row[data-level="clean-entry"] .cr-badge{color:var(--green);background:rgba(0,255,135,0.08)}
.call-row[data-level="watch"] .cr-badge{color:#ffb43b;background:rgba(255,180,59,0.08)}
.call-row[data-level="caution"] .cr-badge{color:#ff7b3b;background:rgba(255,123,59,0.08)}
.call-row[data-level="avoid"] .cr-badge{color:#ff1a4d;background:rgba(255,26,77,0.08)}
.cr-stars{font-family:var(--head);font-size:12px;color:#14F195;font-weight:800;background:rgba(20,241,149,0.10);padding:3px 8px;border-radius:5px;border:1px solid rgba(20,241,149,0.3)}
.cr-ch{font-family:var(--mono);font-size:11px;font-weight:700;margin-left:auto}
.cr-reason{font-family:var(--head);font-size:13px;color:var(--t1);font-weight:500;line-height:1.45;letter-spacing:-0.005em;margin-bottom:11px}
.cr-actions{display:flex;gap:8px}
.cr-trade{flex:1;padding:11px 14px;text-align:center;font-family:var(--head);font-size:12.5px;font-weight:800;letter-spacing:0.3px;text-decoration:none;border-radius:6px;text-transform:uppercase;transition:filter 0.15s;background:linear-gradient(135deg,#14F195 0%,#0ed583 100%);color:#001a0d;border:none;cursor:pointer}
.cr-trade:hover{filter:brightness(1.1)}
.call-row[data-level="caution"] .cr-trade,.call-row[data-level="avoid"] .cr-trade{background:#1a1a1a;color:var(--t2);border:1px solid var(--b2)}
.cr-detail{padding:11px 16px;background:#0d0d0d;border:1px solid var(--b2);color:var(--t2);font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.15s;flex-shrink:0}
.cr-detail:hover{border-color:var(--b3);color:var(--t1);background:#111}
.cr-status{font-family:var(--mono);font-size:11px;color:var(--t3);font-style:italic}

.calls-locked{position:relative;overflow:hidden}
.calls-locked::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,#000 90%);pointer-events:none}
.calls-paywall{padding:24px;text-align:center;background:linear-gradient(135deg,#0a0a0a 0%,#150a1a 100%);border:1px solid var(--b2);border-radius:10px;margin-top:14px}
.calls-paywall-h{font-family:var(--head);font-size:16px;color:var(--t1);font-weight:800;margin-bottom:6px}
.calls-paywall-s{font-family:var(--mono);font-size:11px;color:var(--t3);margin-bottom:14px}
.calls-paywall-btn{background:linear-gradient(135deg,#9945ff 0%,#14F195 100%);color:#000;padding:12px 28px;border:none;border-radius:8px;font-weight:800;font-size:13px;letter-spacing:0.5px;cursor:pointer;font-family:var(--head)}

/* SOLINTEL LIVE ALERTS — strong entry feed on the Alerts page */
.sol-alerts-wrap{padding:14px 16px 6px;border-bottom:1px solid var(--b2);background:linear-gradient(180deg,rgba(20,241,149,0.05) 0%,transparent 100%)}
.sol-alerts-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.sol-alerts-title{font-family:var(--head);font-size:14px;font-weight:800;color:var(--t0);letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.sol-alerts-title .live-dot{background:#14F195;box-shadow:0 0 8px #14F195}
.sol-alerts-meta{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:0.3px}
.sol-notif-btn{background:#0d0d0d;border:1px solid #14F195;color:#14F195;padding:6px 12px;font-family:var(--mono);font-size:10px;border-radius:5px;cursor:pointer;font-weight:700;letter-spacing:0.5px}
.sol-notif-btn:hover{background:rgba(20,241,149,0.08)}
.sol-notif-btn.granted{border-color:var(--b2);color:var(--t3);cursor:default}
.sol-alerts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.sol-alert{background:#0a0a0a;border:1px solid var(--b2);border-left:3px solid var(--green);border-radius:6px;padding:11px 13px;cursor:pointer;transition:all 0.15s}
.sol-alert:hover{border-left-color:#14F195;background:#0c0c0c}
.sol-alert.strong{border-left:4px solid #14F195;box-shadow:0 0 0 1px rgba(20,241,149,0.10),0 4px 12px rgba(20,241,149,0.10)}
.sol-alert-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.sol-alert-symbol{font-family:var(--head);font-size:14px;color:var(--t0);font-weight:800;letter-spacing:-0.01em}
.sol-alert-price{font-family:var(--mono);font-size:12px;color:#14F195;font-weight:700}
.sol-alert-price sub{font-size:0.75em;color:rgba(20,241,149,0.7);vertical-align:sub;margin:0 1px}
.sol-alert-badge{font-family:var(--head);font-size:10px;font-weight:800;letter-spacing:0.5px;padding:3px 7px;border-radius:4px;text-transform:uppercase;border:1px solid currentColor}
.sol-alert.strong .sol-alert-badge{color:#14F195;background:rgba(20,241,149,0.10)}
.sol-alert:not(.strong) .sol-alert-badge{color:var(--green);background:rgba(0,255,135,0.06)}
.sol-alert-sm{font-family:var(--head);font-size:11px;color:#14F195;background:rgba(20,241,149,0.10);padding:2px 6px;border-radius:4px;border:1px solid rgba(20,241,149,0.3);font-weight:800}
.sol-alert-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3)}
.sol-alert-row2{font-family:var(--head);font-size:11.5px;color:var(--t2);font-weight:500;letter-spacing:-0.005em}
.sol-alerts-empty{padding:18px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--t3);background:#080808;border:1px dashed var(--b2);border-radius:6px}
/* INSIDE PLAYS — flagship fresh-cluster detection page */
#page-inside{flex-direction:column;background:linear-gradient(180deg,#0a0a0a 0%,#0a0612 100%);overflow-y:auto}
.ip-hero{padding:32px 20px 22px;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(153,69,255,0.12) 0%,transparent 60%);border-bottom:1px solid var(--b1)}
.ip-eyebrow{display:inline-block;padding:4px 11px;border:1px solid #9945ff;border-radius:99px;font-family:var(--mono);font-size:9px;letter-spacing:1.4px;color:#c4a8ff;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.ip-title{font-family:var(--head);font-size:34px;font-weight:900;letter-spacing:-0.025em;margin:0 0 10px;background:linear-gradient(135deg,#9945ff 0%,#c4a8ff 50%,#14f195 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.05}
.ip-sub{font-size:13px;color:var(--t2);line-height:1.55;margin:0 auto;max-width:540px}
.ip-sub-strong{color:#c4a8ff;font-weight:600}
.ip-email{margin:18px 16px;padding:16px;background:linear-gradient(135deg,rgba(153,69,255,0.07) 0%,rgba(20,241,149,0.04) 100%);border:1px solid rgba(153,69,255,0.25);border-radius:12px}
.ip-email-title{font-family:var(--head);font-size:14px;font-weight:800;color:var(--t0);margin-bottom:4px;letter-spacing:-0.01em}
.ip-email-sub{font-size:11px;color:var(--t2);margin-bottom:11px;line-height:1.5}
.ip-email-form{display:flex;gap:7px}
#ip-email-input{flex:1;padding:10px 12px;background:#0a0a0a;border:1px solid var(--b2);border-radius:6px;color:var(--t1);font-family:var(--mono);font-size:11.5px;outline:none;min-width:0}
#ip-email-input:focus{border-color:#9945ff}
.ip-email-btn{padding:10px 14px;background:linear-gradient(135deg,#9945ff,#7838d9);color:#fff;border:none;border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ip-email-btn:hover{filter:brightness(1.12)}
.ip-email-btn:disabled{opacity:0.5;cursor:wait}
.ip-email-note{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:8px;line-height:1.5}
.ip-meta{padding:10px 16px;font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--b1);display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.ip-meta-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#14f195;animation:ip-pulse 2s ease-in-out infinite;margin-right:6px;vertical-align:middle}
@keyframes ip-pulse{0%,100%{opacity:0.5}50%{opacity:1}}
.ip-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px;padding:14px;background:linear-gradient(135deg,rgba(20,241,149,0.05) 0%,rgba(153,69,255,0.05) 100%);border:1px solid rgba(20,241,149,0.15);border-radius:12px}
.ip-stat{text-align:center}
.ip-stat-v{font-family:var(--head);font-size:18px;font-weight:900;color:var(--t1);letter-spacing:-0.02em}
.ip-stat-v.hi{color:#14f195}
.ip-stat-l{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;margin-top:3px;line-height:1.3}
@media (max-width:480px){.ip-stats{grid-template-columns:repeat(2,1fr)}.ip-stat-v{font-size:16px}}
.ip-card-perf{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:11px 16px;background:linear-gradient(135deg,rgba(20,241,149,0.04) 0%,rgba(0,0,0,0.4) 100%);border-top:1px solid rgba(20,241,149,0.12);border-bottom:1px solid rgba(255,255,255,0.04)}
.ip-card-perf-block{text-align:center}
.ip-card-perf-l{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:3px}
.ip-card-perf-v{font-family:var(--head);font-size:16px;font-weight:800;letter-spacing:-0.01em}
.ip-card-perf-v.up{color:#14f195}
.ip-card-perf-v.down{color:#ff3b69}
.ip-card-perf-v.neutral{color:var(--t2)}

.ip-feed{padding:16px 14px 80px}
.ip-empty{padding:60px 24px 80px;text-align:center}
.ip-empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.ip-empty-title{font-family:var(--head);font-size:18px;font-weight:800;color:var(--t1);margin-bottom:12px;letter-spacing:-0.01em}
.ip-empty-sub{font-size:12px;color:var(--t3);line-height:1.65;max-width:460px;margin:0 auto}
.ip-empty-sub strong{color:#c4a8ff}
.ip-card{margin-bottom:14px;background:#0a0a0a;border:1px solid rgba(153,69,255,0.3);border-radius:12px;overflow:hidden;box-shadow:inset 0 0 30px rgba(153,69,255,0.04)}
.ip-card-top{display:flex;align-items:center;gap:11px;padding:14px 16px 10px}
.ip-card-icon{font-size:22px;line-height:1}
.ip-card-textblock{flex:1;min-width:0}
.ip-card-sym{font-family:var(--head);font-size:18px;font-weight:800;color:#c4a8ff;letter-spacing:-0.01em;line-height:1.1}
.ip-card-name{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ip-card-detect{text-align:right;flex-shrink:0}
.ip-card-detect-v{font-family:var(--mono);font-size:11px;font-weight:700;color:#14f195}
.ip-card-detect-l{font-family:var(--mono);font-size:8.5px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;margin-top:2px}
.ip-card-headline{padding:6px 16px 12px;font-size:12px;color:var(--t1);line-height:1.5;border-bottom:1px solid rgba(153,69,255,0.1)}
.ip-card-headline strong{color:#c4a8ff;font-weight:700}
.ip-card-stats{display:grid;grid-template-columns:repeat(3,1fr);padding:10px 16px;gap:6px;background:rgba(0,0,0,0.4)}
.ip-card-stat{text-align:center}
.ip-card-stat-v{font-family:var(--mono);font-size:13px;font-weight:800;color:var(--t1)}
.ip-card-stat-l{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;margin-top:2px}
.ip-card-stat.hi .ip-card-stat-v{color:#14f195}
.ip-card-buyers{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.04)}
.ip-card-buyers-h{font-family:var(--mono);font-size:8.5px;letter-spacing:0.8px;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.ip-buyer{display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;padding:6px 9px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.04);border-radius:5px;margin-bottom:4px;cursor:pointer}
.ip-buyer:hover{border-color:rgba(153,69,255,0.3)}
.ip-buyer-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ip-buyer-fresh{flex-shrink:0;font-weight:700}
.ip-buyer-fresh.ultra{color:#14f195}
.ip-buyer-fresh.fresh{color:#c4a8ff}
.ip-buyer-fresh.old{color:var(--t3)}
.ip-buyer-addr{color:var(--t2);font-family:var(--mono)}
.ip-buyer-amt{color:#14f195;font-weight:700;flex-shrink:0}
.ip-card-actions{display:flex;gap:7px;padding:11px 16px 14px}
.ip-card-btn{flex:1;padding:9px 10px;background:#0a0a0a;border:1px solid var(--b2);color:var(--t1);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.5px;border-radius:6px;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;text-transform:uppercase}
.ip-card-btn:hover{border-color:var(--b3);color:var(--t0)}

let _trialEnd = parseInt(localStorage.getItem('solintel_trial_end') || '0');

function _trialMsLeft() {

    const plan = params.get('plan') || 'yearly';
    markSubscribed(plan);

}

function applySticky() {

  if (!el) return;

  el.classList.toggle('on', shouldShow);

}

function dismissSticky() {
  stickyDismissed = true;
  sessionStorage.setItem('solintel_sticky_dismissed', 'true');
  applySticky();
}

// ═══════════════════════════════════
// SUBSCRIPTION & IP-BASED TRIAL
// ═══════════════════════════════════
async function initTrialStatus() {
  // If they've already paid, no need to check trial
  if (_paidSub) {
    subscribed = true;
    updateUI();
    return;
  }
  try {
    const res = await fetch(API + '/solintel/trial-status', { method: 'GET' });
    const data = await res.json();
    if (data.access === 'trial') {
      _trialEnd = data.trial_end;
      localStorage.setItem('solintel_trial_end', String(_trialEnd));
      subscribed = true;
      _expired = false;
      updateUI();
      updateTrialBanner();
      applySticky();
      if (data.fresh) {
        showToast('🎯 3-day free trial activated — full site unlocked');
      }
    } else if (data.access === 'expired') {
      enforceExpired();
    }
  } catch (e) {
    // Network failure fallback: trust localStorage trial_end if still valid
    if (_trialEnd > Date.now()) {
      subscribed = true;
      updateUI();
      updateTrialBanner();
    } else if (_trialEnd > 0) {
      // Local trial expired and server unreachable — be lenient, let them retry
      console.log('Trial status check failed, retrying in 30s');
      setTimeout(initTrialStatus, 30000);
    }
  }
}

function enforceExpired() {
  _expired = true;
  subscribed = false;
  _paidSub = false;
  localStorage.removeItem('solintel_subscribed');
  localStorage.removeItem('solintel_plan');
  document.body.classList.add('expired-locked');
  updateUI();
  updateTrialBanner();
  // Force them to the home page and open the paywall
  const cur = ['feed','alerts','alpha','radar','watchlists','wallet','pricing'].find(
    p => document.getElementById('page-'+p)?.style.display !== 'none'
  );
  if (cur !== 'alpha') showPage('alpha');
  openModal('plans');
}

function markSubscribed(plan) {
  localStorage.setItem('solintel_subscribed', 'true');
  localStorage.setItem('solintel_plan', plan);
  _paidSub = true;
  subscribed = true;
  _expired = false;
  document.body.classList.remove('expired-locked');
  updateUI();
  updateTrialBanner();
  applySticky();
}

function updateTrialBanner() {
  const banner = document.getElementById('trial-banner');
  if (!banner) return;
  // Paid users: no banner
  if (_paidSub) { banner.classList.remove('on'); return; }
  // Expired: no countdown banner (the modal handles the messaging)
  if (_expired) { banner.classList.remove('on'); return; }
  // Trial active: show countdown
  if (!_trialActive()) { banner.classList.remove('on'); return; }
  const ms = _trialMsLeft();
  const totalH = Math.floor(ms / (60*60*1000));
  const d = Math.floor(totalH / 24);
  const h = totalH % 24;
  const m = Math.floor((ms % (60*60*1000)) / (60*1000));
  let label;
  if (d > 0) label = `${d}d ${h}h`;
  else if (h > 0) label = `${h}h ${m}m`;
  else label = `${m}m`;
  const el = document.getElementById('trial-time-left');
  if (el) el.textContent = label;
  banner.classList.add('on');
  // When trial flips to expired between polls, re-fetch from server to confirm
  if (ms <= 0 && !_paidSub) {
    initTrialStatus();
  }
}

    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3400);
}

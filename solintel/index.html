async function fetchSolPrice() {
  try {
    const r = await fetch(`https://lite-api.jup.ag/price/v3?ids=${SOL_MINT}`);
    const d = await r.json();
    solPrice = Number(d?.[SOL_MINT]?.usdPrice || 0);
  } catch(e) { solPrice = 0; }
}

async function analyzeWallet() {
  const addr = document.getElementById('wallet-addr-input').value.trim();
  if (!addr) return;
  if (!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr)) {
    document.getElementById('wallet-result').innerHTML = '<div style="padding:12px 16px;background:var(--rfaint);border:1px solid var(--red);color:var(--red);font-size:11px">Invalid Solana address. Enter a valid base58 wallet address.</div>';
    return;
  }
  currentWalletAddr = addr;
  document.getElementById('wallet-result').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--t1);font-size:12px"><div style="margin-bottom:8px;color:var(--green);font-size:20px">⟳</div>Loading wallet data…</div>';
  document.getElementById('monitor-btn').textContent = 'Watch Wallet →';

  try {
    if (solPrice === 0) await fetchSolPrice();

    const [balRes, txRes] = await Promise.all([
      fetch(API+'/wallet/rpc', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getBalance', params:[addr] }) }),
      fetch(API+'/wallet/rpc', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getSignaturesForAddress', params:[addr, { limit:10 }] }) }),
    ]);

    const balData = await balRes.json();
    const txData = await txRes.json();

    const balance = (balData?.result?.value || 0) / 1e9;
    const txns = txData?.result || [];
    const txCount = txns.length;

    let walletType = 'small';
    if (balance > 100000) walletType = 'whale';
    else if (balance > 10000) walletType = 'large';
    else if (txCount > 100) walletType = 'active';
    else if (txCount > 20) walletType = 'regular';

    let score = 50;
    if (txCount > 100) score += 10;
    else if (txCount > 20) score += 5;
    if (balance > 1000) score += 10;
    if (balance > 100) score += 5;
    score = Math.min(100, score);

    const riskColor = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--yel)' : 'var(--red)';
    const riskLabel = score >= 70 ? 'Low Risk — Trusted Wallet' : score >= 40 ? 'Medium Risk — Review Needed' : 'High Risk — Caution Required';
    const typeLabels = { whale:'🐋 Whale', large:'💰 Large', active:'⚡ Active', regular:'👤 Regular', small:'🔍 Small' };
    const usdVal = solPrice > 0 ? '$' + (balance * solPrice).toLocaleString('en-US', { maximumFractionDigits:0 }) : '—';
    const isMonitored = monitoredWallets.includes(addr);

    document.getElementById('monitor-btn').textContent = isMonitored ? '✓ Monitoring' : 'Watch Wallet →';
    document.getElementById('monitor-btn').style.background = isMonitored ? 'var(--s2)' : 'var(--green)';
    document.getElementById('monitor-btn').style.color = isMonitored ? 'var(--gdim)' : '#000';

    document.getElementById('wallet-result').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--t2);margin-bottom:4px">// Wallet Intelligence</div>
            <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--t0);margin-bottom:6px">${addr.slice(0,8)}<span style="color:var(--t3)">···</span>${addr.slice(-6)}</div>
            <span style="font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border:1px solid rgba(0,255,135,0.3);color:var(--gdim);background:var(--gfaint)">${typeLabels[walletType]||walletType}</span>
            ${isMonitored ? '<span style="font-size:9px;padding:2px 7px;border:1px solid var(--gdim);color:var(--green);background:var(--gfaint2);margin-left:6px">● Monitoring</span>' : ''}
          </div>
        </div>
        <div class="risk-block">
          <div class="risk-stripe" style="background:${riskColor};box-shadow:0 0 12px ${riskColor}"></div>
          <div class="risk-score" style="color:${riskColor};text-shadow:0 0 20px ${riskColor}44">${score}</div>

async function traceToken() {
  const mint = document.getElementById('tracer-input').value.trim();
  const el = document.getElementById('tracer-results');
  if (!mint) return;
  if (!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(mint)) {
    el.innerHTML = '<div style="padding:12px 14px;background:var(--rfaint);border:1px solid var(--red);color:var(--red);font-size:11px;margin-bottom:8px">Invalid token mint address.</div>';
    return;
  }

  el.innerHTML = '<div class="alpha-loading"><div style="color:var(--green);font-size:20px;margin-bottom:8px">⟳</div>Tracing earliest buyers on-chain via Helius…<br><span style="font-size:10px;color:var(--t2)">Pulling the oldest signatures for this mint</span></div>';

  try {
    // Get the OLDEST signatures for the mint — these are the first interactions
    // We page back to the very first transactions on the token
    let allSigs = [];
    let before = undefined;
    // Pull up to 3 pages (3000 sigs) then take the oldest
    for (let i = 0; i < 3; i++) {
      const body = { jsonrpc:'2.0', id:1, method:'getSignaturesForAddress', params:[mint, before ? { limit:1000, before } : { limit:1000 }] };
      const r = await fetch(API+'/wallet/rpc', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const d = await r.json();
      const sigs = d?.result || [];
      if (sigs.length === 0) break;
      allSigs = allSigs.concat(sigs);
      before = sigs[sigs.length-1].signature;
      if (sigs.length < 1000) break;
    }

    if (allSigs.length === 0) {
      el.innerHTML = '<div style="padding:12px 14px;background:var(--s1);border:1px solid var(--b1);color:var(--t2);font-size:11px;margin-bottom:8px">No transactions found for this mint. It may be too new or the address may be wrong.</div>';
      return;
    }

    // Oldest signatures are at the end — take the earliest 25
    const earliest = allSigs.slice(-25).reverse();
    const firstTs = earliest[earliest.length-1]?.blockTime || 0;

    // Parse the earliest transactions to find the buyer wallets (fee payers)
    const sigList = earliest.slice(0, 15).map(s => s.signature);
    const buyers = [];
    for (const sig of sigList) {
      const r = await fetch(API+'/wallet/rpc', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getTransaction', params:[sig, { encoding:'jsonParsed', maxSupportedTransactionVersion:0 }] }) });
      const d = await r.json();
      const tx = d?.result;
      if (!tx) continue;
      const signer = tx.transaction?.message?.accountKeys?.find(k => k.signer)?.pubkey
                  || tx.transaction?.message?.accountKeys?.[0]?.pubkey
                  || tx.transaction?.message?.accountKeys?.[0];
      const ts = tx.blockTime || 0;
      if (signer && !buyers.find(b => b.addr === signer)) {
        buyers.push({ addr: typeof signer === 'string' ? signer : signer.pubkey, ts, secAfter: firstTs ? ts - firstTs : 0 });
      }
    }

    const isPro = subscribed;
    const shown = isPro ? buyers : buyers.slice(0, 3);

    let html = `<div style="font-size:10px;color:var(--t1);margin-bottom:10px">Found <strong style="color:var(--green)">${buyers.length}</strong> distinct early wallets across the first ${earliest.length} transactions on this mint. Ranked by how early they were in.</div>`;

    html += shown.map((b, i) => `
      <div class="buyer-row" onclick="window.open('https://solscan.io/account/'+'${b.addr}','_blank')">
        <div class="buyer-rank">${i+1}</div>
        <div>
          <div class="buyer-addr">${b.addr.slice(0,6)}...${b.addr.slice(-6)}</div>
          <div class="buyer-meta">Early buyer · entered ${b.secAfter > 0 ? formatSecs(b.secAfter)+' after launch' : 'at launch'}</div>
        </div>
        <div class="buyer-stat">
          <div class="buyer-stat-val" style="color:var(--gdim)">#${i+1}</div>
          <div class="buyer-stat-lbl">Entry rank</div>
        </div>
        <div class="buyer-stat">
          <button class="wl-view-btn" style="border-color:rgba(0,255,135,0.3);color:var(--green)" onclick="event.stopPropagation();quickWatch('${b.addr}');this.textContent='✓ Watching'">+ Watch</button>
        </div>
      </div>
    `).join('');

    if (!isPro && buyers.length > 3) {
      html += `
        <div class="alpha-locked">
          ${buyers.slice(3,7).map((b,i) => `
            <div class="buyer-row">
              <div class="buyer-rank">${i+4}</div>
              <div><div class="buyer-addr">${b.addr.slice(0,6)}...${b.addr.slice(-6)}</div><div class="buyer-meta">Early buyer</div></div>
              <div class="buyer-stat"><div class="buyer-stat-val">#${i+4}</div></div>
              <div class="buyer-stat"></div>
            </div>
          `).join('')}
        </div>
        <div class="locked-gate" style="margin-top:8px">
          <div class="lg-bar"></div>
          <div class="lg-body">
            <div class="lg-text"><strong>${buyers.length - 3} more early wallets hidden</strong><br>Unlock the full buyer list, funding-source tracing, and cross-token cluster detection.</div>
            <button class="lg-btn" onclick="openModal('plans')">Unlock Full Cluster →</button>
          </div>
        </div>
      `;
    }

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div style="padding:12px 14px;background:var(--rfaint);border:1px solid var(--red);color:var(--red);font-size:11px">Trace failed. The token may have too much history to scan quickly — try again.</div>';
  }
}

function formatSecs(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

async function renderRadar() {

async function loadRadarData() {
  _radarLoading = true;
  try {
    const res = await fetch(API + '/solintel/pre-pump-radar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ threshold: _radarThreshold })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data?.tokens) throw new Error('No tokens');
    _radarData = data.tokens.map(t => ({
      mint: t.mint,
      name: t.symbol || '?',
      fullName: t.name || '',
      price: t.price,
      mcap: t.mcap,
      liq: t.liquidity,
      vol24: t.vol24,
      ageH: t.ageH,
      ch24: t.ch24,
      ch1h: t.ch1h,
      buys24: t.buys24,
      sells24: t.sells24,
      txns24: t.buys24 + t.sells24,
      buyPct: (t.buys24 + t.sells24) > 0 ? (t.buys24 / (t.buys24 + t.sells24)) * 100 : 50,
      score: scoutScore({
        mcap: t.mcap, liq: t.liquidity, ageH: t.ageH,
        txns24: t.buys24 + t.sells24, ch24: t.ch24
      })
    })).sort((a, b) => b.score - a.score);
  } catch (e) {
    console.error('Pre-pump radar fetch failed', e);
    _radarData = [];
  } finally {
    _radarLoading = false;
  }
}

function scoutScore({mcap, liq, ageH, txns24, ch24}) {
  let s = 50;
  if (liq > 10000) s += 10;
  if (liq > 50000) s += 8;
  if (mcap > 0 && mcap < 100000) s += 12;
  if (mcap > 100000 && mcap < 1000000) s += 6;
  if (ageH < 24) s += 6;
  if (ageH < 6) s += 6;
  if (txns24 > 100) s += 5;
  if (txns24 > 500) s += 5;
  if (ch24 > 20) s += 5;
  if (ch24 < -40) s -= 12;
  if (liq < 2000) s -= 15;
  return Math.max(0, Math.min(99, Math.round(s)));
}

// Zero-subscript price formatting: $0.000005 → $0.0₅5
function fmtZeroSub(p) {
  if (!p || p <= 0) return '—';
  if (p >= 0.01) return '$' + p.toFixed(4);
  if (p >= 0.001) return '$' + p.toFixed(5);
  // Find leading zeros after decimal
  const s = p.toFixed(20).replace(/0+$/, '');
  const m = s.match(/^0\.(0+)([1-9]\d*)/);
  if (!m) return '$' + s;
  const zeros = m[1].length;
  const digits = m[2].slice(0, 4);
  if (zeros < 4) return '$0.' + m[1] + digits;
  // Use subscript notation for 4+ zeros
  return `$0.0<sub>${zeros}</sub>${digits}`;
}

function fmtMcap(n) {
  if (!n || n <= 0) return '—';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + Math.round(n);
}

function fmtAge(h) {
  if (!h || h <= 0) return '—';
  if (h < 1) return Math.round(h*60) + 'm';
  if (h < 48) return Math.round(h) + 'h';
  return Math.round(h/24) + 'd';
}

    sub.textContent = `Solana tokens currently below ${thStr} · ${_radarData.length} matches · auto-refresh every 45s`;
  }
}

    const sigs = [
      d.liq > 10000, d.mcap > 0 && d.mcap < 1000000, d.ageH < 24, d.txns24 > 100, d.ch24 > 0
    ];
    const sigBars = sigs.map(p => `<div class="rgc-sig ${p?'pass':'fail'}"></div>`).join('');
    const chColor = d.ch24 >= 0 ? 'var(--green)' : '#ff3b69';
    const inner = `
      <div class="rgc-row1">
        <div style="min-width:0;flex:1">
          <div class="rgc-name">$${escapeHtml(d.name)}</div>
          <div class="rgc-mint">${d.mint.slice(0,4)}…${d.mint.slice(-4)} · ${ageFmt} old</div>
        </div>

          <div class="rgc-score-v">${d.score}</div>
          <div class="rgc-score-l">Scout</div>
        </div>
      </div>
      <div class="rgc-price-big">${priceHtml}<span style="color:${chColor};font-size:11px;font-weight:700;margin-left:8px">${d.ch24>=0?'+':''}${d.ch24.toFixed(1)}%</span></div>
      <div class="rgc-row2">

let _callsData = [];
let _callsFilter = 'entry-plus';
let _callsLoading = false;
let _callsLastLoad = 0;

async function loadCalls(force) {
  if (_callsLoading) return;
  if (!force && Date.now() - _callsLastLoad < 30_000) return;
  _callsLoading = true;
  _callsLastLoad = Date.now();
  const refreshBtn = document.getElementById('calls-refresh-btn');
  if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = '↻ Analyzing…'; }

  let candidates = [];
  try {
    const r = await fetch(API + '/solintel/pre-pump-radar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ threshold: 0.00001 })
    });
    if (r.ok) {
      const data = await r.json();
      candidates = (data.tokens || []).slice(0, 8);
    }
  } catch (e) { /* swallow */ }

  if (candidates.length === 0) {
    _callsData = [];
    _callsLoading = false;
    if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '↻ Refresh'; }
    renderCallsList();
    return;
  }

  _callsData = candidates.map(t => ({
    token: t, safety: null, forensics: null, smartMoney: null,
    verdict: null, loading: true, error: false
  }));
  renderCallsList();

  await Promise.all(_callsData.map(async (row) => {
    try {
      const [safetyR, traceR] = await Promise.all([
        fetch(API + '/solintel/safety-audit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mint: row.token.mint })
        }),
        fetch(API + '/solintel/deployer-trace', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mint: row.token.mint })
        })
      ]);
      const safety = safetyR.ok ? await safetyR.json() : null;
      const trace = traceR.ok ? await traceR.json() : null;
      if (safety?.ok && trace?.ok) {
        row.safety = safety;
        row.forensics = trace;
        row.smartMoney = trace.smartMoney || { hits: [], tracked: 0 };
        row.verdict = synthVerdict(safety, trace, row.smartMoney);
      } else { row.error = true; }
    } catch (e) { row.error = true; }
    finally { row.loading = false; renderCallsList(); }
  }));

  _callsLoading = false;
  if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '↻ Refresh'; }
}

function setCallsFilter(f, btn) {
  _callsFilter = f;
  document.querySelectorAll('.calls-fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCallsList();
}

function renderCallsList() {
  const grid = document.getElementById('calls-list');
  if (!grid) return;
  if (_callsData.length === 0) {
    grid.innerHTML = _callsLoading
      ? '<div class="calls-empty">🎯 Loading candidates from the pre-pump zone…</div>'
      : '<div class="calls-empty">No sub-$0.00001 candidates with active liquidity right now. Try the Pre-Pump page for raw feed, or refresh in a minute.</div>';
    return;
  }
  const sorted = [..._callsData].sort((a, b) => {
    if (a.loading && !b.loading) return 1;
    if (!a.loading && b.loading) return -1;
    return (b.verdict?.score || 0) - (a.verdict?.score || 0);
  });
  let filtered = sorted;
  if (_callsFilter === 'entry-plus') {
    filtered = sorted.filter(r =>
      r.loading || (r.verdict && ['STRONG ENTRY', 'CLEAN ENTRY', 'WATCH'].includes(r.verdict.level))
    );
  }
  const showFree = 2;
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="calls-empty">No tokens hit Entry+ right now. Switch to "Show all" to see the AVOID/CAUTION calls (so you know what to skip), or wait — the feed updates every refresh.</div>`;
    return;
  }
  const html = filtered.map((row, idx) => {
    const locked = !subscribed && idx >= showFree;
    return renderCallRow(row, idx + 1, locked);
  }).join('');
  const paywall = (!subscribed && filtered.length > showFree)
    ? `<div class="calls-paywall">
        <div class="calls-paywall-h">🔒 ${filtered.length - showFree} more call${filtered.length - showFree > 1 ? 's' : ''} hidden</div>
        <div class="calls-paywall-s">Unlock the full Live Calls feed + AI reports + unlimited audits</div>
        <button class="calls-paywall-btn" onclick="openModal('plans')">View Plans →</button>
      </div>` : '';
  grid.innerHTML = html + paywall;
}

// SOLINTEL LIVE ALERTS (Strong Entry feed on Alerts page)
// ═══════════════════════════════════
let _solAlertsLastSeen = 0;
let _solAlertsKnownIds = new Set();
let _solAlertsInterval = null;
let _solAlertsFirstLoad = true;

async function loadSolAlerts() {
  try {
    const r = await fetch(API + '/solintel/alerts?limit=30');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const alerts = data.alerts || [];

    // Detect fresh ones (not seen before)
    const freshAlerts = [];
    if (!_solAlertsFirstLoad) {
      for (const a of alerts) {
        const id = a.mint + '_' + a.firedAt;
        if (!_solAlertsKnownIds.has(id)) {
          freshAlerts.push(a);
        }
      }
    }
    alerts.forEach(a => _solAlertsKnownIds.add(a.mint + '_' + a.firedAt));
    _solAlertsFirstLoad = false;

    // Fire browser notification for each fresh alert (if permitted)
    if (freshAlerts.length > 0 && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
      for (const a of freshAlerts.slice(0, 3)) {
        try {
          const notif = new Notification(`🎯 ${a.level}: $${a.symbol}`, {
            body: `Score ${a.score}${a.smHits > 0 ? ' · ★' + a.smHits + ' smart-money in' : ''} · ${fmtZeroSubPlain(a.price)}`,
            tag: 'solintel-' + a.mint,
            requireInteraction: false,
            silent: false
          });
          notif.onclick = () => {
            window.focus();
            showPage('analyzer');
            setTimeout(() => {
              const inp = document.getElementById('ta-input');
              if (inp) { inp.value = a.mint; runAnalyzer(); }
            }, 100);
            notif.close();
          };
        } catch (e) { /* ignore */ }
      }
    }

    paintSolAlerts(alerts, freshAlerts);
    updateSolAlertsMeta(data);
  } catch (e) {
    // keep last good state
  }
}

function fmtZeroSubPlain(p) {
  // Plain-text version for notification body (no HTML <sub>)
  if (!p || p <= 0) return '—';
  if (p >= 0.001) return '$' + p.toFixed(6);
  const s = p.toFixed(20).replace(/0+$/, '');
  const m = s.match(/^0\.(0+)([1-9]\d*)/);
  if (!m) return '$' + s;
  return '$0.0(×' + m[1].length + ')' + m[2].slice(0, 4);
}

function paintSolAlerts(alerts, freshAlerts) {
  const list = document.getElementById('sol-alerts-list');
  if (!list) return;
  if (alerts.length === 0) {
    list.innerHTML = '<div class="sol-alerts-empty">⏳ No Strong Entry signals yet. Worker scans every 4 minutes — fresh signals appear here automatically.</div>';
    return;
  }
  const freshSet = new Set((freshAlerts || []).map(a => a.mint + '_' + a.firedAt));
  const now = Date.now();
  list.innerHTML = alerts.map(a => {
    const isFresh = freshSet.has(a.mint + '_' + a.firedAt);
    const isStrong = a.level === 'STRONG ENTRY';
    const ageSec = Math.floor((now - a.firedAt) / 1000);
    const ageStr = ageSec < 60 ? ageSec + 's ago'
                : ageSec < 3600 ? Math.floor(ageSec/60) + 'm ago'
                : ageSec < 86400 ? Math.floor(ageSec/3600) + 'h ago'
                : Math.floor(ageSec/86400) + 'd ago';
    return `<div class="sol-alert ${isStrong?'strong':''} ${isFresh?'fresh':''}" onclick="openCallDetail('${a.mint}')">
      <div class="sol-alert-row1">
        <span class="sol-alert-symbol">$${escapeHtml(a.symbol||'?')}</span>
        <span class="sol-alert-price">${fmtZeroSub(a.price)}</span>
        <span class="sol-alert-badge">${a.level} ${a.score}</span>
        ${a.smHits > 0 ? `<span class="sol-alert-sm">★${a.smHits}</span>` : ''}
        <span class="sol-alert-time">${ageStr}</span>
      </div>
      <div class="sol-alert-row2">${a.smHits > 0 ? `${a.smHits} tracked smart-money in · ` : ''}Tap to open full Analyzer →</div>
    </div>`;
  }).join('');
}

function updateSolAlertsMeta(data) {
  const meta = document.getElementById('sol-alerts-meta');
  if (!meta) return;
  if (!data.workerActive) {
    meta.textContent = 'Worker offline (HELIUS_API_KEY missing)';
    meta.style.color = '#ff7b3b';
    return;
  }
  meta.textContent = `${data.count} active · ${data.stats?.cycles || 0} cycles · ${data.stats?.alertsCreated || 0} total fired`;
  meta.style.color = '';
}

async function requestSolAlertNotifs() {
  const btn = document.getElementById('sol-notif-btn');
  if (typeof Notification === 'undefined') {
    if (btn) btn.textContent = '⚠ Browser does not support notifications';
    return;
  }
  if (Notification.permission === 'granted') {
    if (btn) { btn.textContent = '✓ Notifications enabled'; btn.classList.add('granted'); }
    return;
  }
  if (Notification.permission === 'denied') {
    if (btn) { btn.textContent = '⚠ Denied — change in browser settings'; btn.classList.add('granted'); }
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      if (btn) { btn.textContent = '✓ Notifications enabled'; btn.classList.add('granted'); }
      // Test notification
      try {
        new Notification('🎯 SolIntel alerts enabled', {
          body: 'You\'ll get a ping when a Strong Entry fires on the Live Calls feed.',
          tag: 'solintel-welcome'
        });
      } catch (e) {}
    } else {
      if (btn) btn.textContent = '⚠ Permission not granted';
    }
  } catch (e) {
    if (btn) btn.textContent = '⚠ Permission request failed';
  }
}

function checkSolAlertNotifButton() {
  const btn = document.getElementById('sol-notif-btn');
  if (!btn) return;
  if (typeof Notification === 'undefined') {
    btn.textContent = '⚠ Notifications unsupported';
    btn.classList.add('granted');
    return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent = '✓ Notifications enabled';
    btn.classList.add('granted');
  } else if (Notification.permission === 'denied') {
    btn.textContent = '⚠ Blocked in browser settings';
    btn.classList.add('granted');
  }
}

function startSolAlertsAutoRefresh() {
  if (_solAlertsInterval) return;
  checkSolAlertNotifButton();
  loadSolAlerts();
  // Refresh every 20s while on Alerts page; less often elsewhere
  _solAlertsInterval = setInterval(() => {
    const pg = document.getElementById('page-alerts');
    if (pg && pg.style.display !== 'none') {
      loadSolAlerts();
    }
  }, 20_000);
}

let _freshMintsInterval = null;

function fmtFreshAge(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  if (sec < 86400) return Math.floor(sec/3600) + 'h';
  return Math.floor(sec/86400) + 'd';
}

function paintFreshMints() {
  const list = document.getElementById('fm-list');
  const count = document.getElementById('fm-count');
  if (!list) return;
  count.textContent = _freshMintsData.length;
  if (_freshMintsData.length === 0) {
    list.innerHTML = '<div class="fm-empty">No fresh mints captured yet. Poller may still be warming up.</div>';
    return;
  }
  const now = Date.now();
  list.innerHTML = _freshMintsData.map(m => {
    const ageSec = Math.floor((now - m.detectedAt) / 1000);
    const isFreshFresh = ageSec < 60;
    const ageStr = fmtFreshAge(ageSec);
    const mintShort = m.mint.slice(0, 4) + '…' + m.mint.slice(-4);
    const devShort = m.deployer ? (m.deployer.slice(0, 4) + '…' + m.deployer.slice(-4)) : 'unknown';
    return `<a class="fm-card" onclick="showPage('analyzer');setTimeout(()=>{document.getElementById('ta-input').value='${m.mint}';runAnalyzer();},80);return false;" href="#">
      <div class="fm-card-mint"><span>$${mintShort}</span><span class="fm-card-age ${isFreshFresh?'fresh':''}">${ageStr}</span></div>
      <div class="fm-card-dev">dev ${devShort}</div>
    </a>`;
  }).join('');
}

function paintFreshMintsError() {
  const list = document.getElementById('fm-list');
  const count = document.getElementById('fm-count');
  if (!list) return;
  if (count) count.textContent = '—';
  if (_freshMintsData.length === 0) {
    list.innerHTML = '<div class="fm-empty">⚠ Fresh mints feed unavailable. Poller may not be running yet.</div>';
  }
  // If we have stale data, keep showing it
}

function startFreshMintsAutoRefresh() {
  if (_freshMintsInterval) return;
  loadFreshMints();
  _freshMintsInterval = setInterval(() => {
    // Only refresh if user is currently on the radar page (saves API)
    const pg = document.getElementById('page-radar');
    if (pg && pg.style.display !== 'none') {
      loadFreshMints();
    } else {
      // Repaint with current data so age counters update
      if (_freshMintsData.length > 0) paintFreshMints();
    }
  }, 12_000);
  // Update age counters every 2s without fetching
  setInterval(() => {
    const pg = document.getElementById('page-radar');
    if (pg && pg.style.display !== 'none' && _freshMintsData.length > 0) {
      paintFreshMints();
    }
  }, 2_000);
}

const SWAP_BASE_URL = 'https://swap.verixiaapps.com';
const SOL_WRAPPED = 'So11111111111111111111111111111111111111112';

function swapLinkFor(mint, symbol) {
  // Forward-compatible deep link to Verixia Swap. If swap site doesn't
  // parse these params yet, link still works — user lands on swap home.
  const params = new URLSearchParams({
    inputMint: SOL_WRAPPED,
    outputMint: mint,
    token: mint
  });
  if (symbol) params.set('symbol', symbol);
  return `${SWAP_BASE_URL}/?${params.toString()}`;
}

function quickAnalyze(q) {
  document.getElementById('ta-input').value = q;
  runAnalyzer();
}

function runAnalyzer() {
  const q = (document.getElementById('ta-input').value || '').trim();
  if (!q) { showToast('Enter a mint address or token name'); return; }
  // Mint detection: base58 charset, 32-44 chars
  if (/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(q)) {
    loadTokenByMint(q);
  } else {
    searchTokenByName(q);
  }
}

function showAnalyzerLoading(msg) {
  document.getElementById('analyzer-result').innerHTML =
    `<div class="ta-loading">⏳ ${msg || 'Fetching on-chain data…'}</div>`;
}

function showAnalyzerError(msg) {
  document.getElementById('analyzer-result').innerHTML =
    `<div class="ta-error">⚠ ${msg}</div>`;
}

async function loadTokenByMint(mint) {
  showAnalyzerLoading('Pulling token data from DexScreener…');
  try {
    const r = await fetch(`https://api.dexscreener.com/tokens/v1/solana/${mint}`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const arr = await r.json();
    if (!Array.isArray(arr) || arr.length === 0) {
      showAnalyzerError('Token not found. Check the mint address — may be brand new with no liquidity pool yet.');
      return;
    }
    const allPairs = arr.filter(p => p.chainId === 'solana');
    if (allPairs.length === 0) {
      showAnalyzerError('Token exists but has no Solana liquidity pools.');
      return;
    }
    const pair = allPairs.sort((a,b) => (b.liquidity?.usd||0) - (a.liquidity?.usd||0))[0];
    renderTokenAnalysis(mint, pair, allPairs);
  } catch (e) {
    showAnalyzerError('Could not fetch token data. Try again in a moment.');
  }
}

async function searchTokenByName(query) {
  showAnalyzerLoading(`Searching for "${query}"…`);
  try {
    const r = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(query)}`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if (!data?.pairs || data.pairs.length === 0) {
      showAnalyzerError(`No tokens match "${query}". Try a different name or paste the mint address directly.`);
      return;
    }
    const solPairs = data.pairs.filter(p => p.chainId === 'solana');
    if (solPairs.length === 0) {
      showAnalyzerError(`No Solana tokens match "${query}". Try a different name.`);
      return;
    }
    // Dedupe by mint, keep highest-liquidity pair per token
    const byMint = {};
    solPairs.forEach(p => {
      const m = p.baseToken?.address;
      if (!m) return;
      if (!byMint[m] || (p.liquidity?.usd||0) > (byMint[m].liquidity?.usd||0)) {
        byMint[m] = p;
      }
    });
    const unique = Object.values(byMint).sort((a,b) => (b.liquidity?.usd||0) - (a.liquidity?.usd||0));
    if (unique.length === 1) {
      const m = unique[0].baseToken.address;
      const matchingPairs = solPairs.filter(p => p.baseToken.address === m);
      renderTokenAnalysis(m, unique[0], matchingPairs);
    } else {
      renderTokenPicker(unique.slice(0, 12));
    }
  } catch (e) {
    showAnalyzerError('Search failed. Try again or paste the mint address directly.');
  }
}

function renderTokenAnalysis(mint, pair, allPairs) {
  const sym = pair.baseToken?.symbol || 'UNKNOWN';
  const name = pair.baseToken?.name || '';
  const price = parseFloat(pair.priceUsd || '0');
  const mcap = pair.marketCap || 0;
  const fdv = pair.fdv || 0;
  const liq = pair.liquidity?.usd || 0;
  const vol24 = pair.volume?.h24 || 0;
  const ch5m = pair.priceChange?.m5 || 0;
  const ch1h = pair.priceChange?.h1 || 0;
  const ch6h = pair.priceChange?.h6 || 0;
  const ch24 = pair.priceChange?.h24 || 0;
  const buys24 = pair.txns?.h24?.buys || 0;
  const sells24 = pair.txns?.h24?.sells || 0;
  const ageH = pair.pairCreatedAt ? (Date.now() - pair.pairCreatedAt) / (60*60*1000) : 0;
  const totalTxn = buys24 + sells24;
  const buyPct = totalTxn > 0 ? (buys24 / totalTxn) * 100 : 50;
  const sellPct = 100 - buyPct;
  const score = scoutScore({ mcap, liq, ageH, txns24: totalTxn, ch24 });
  const scoreClass = score >= 75 ? 'high' : score >= 55 ? 'mid' : 'low';
  const verdict = score >= 80
    ? 'Strong pattern. Liquidity, activity, and momentum all check out.'
    : score >= 60
    ? 'Mixed signals. Some checks pass, others don\'t. Trade with care.'
    : 'Weak signals. Liquidity, momentum, or activity flagged as risky.';
  const swap = swapLinkFor(mint, sym);
  const info = pair.info || {};
  const socials = (info.socials || []);
  const websites = (info.websites || []);

  // Signals
  const signals = [];
  signals.push({
    pass: liq > 10000,
    h: liq > 10000 ? 'Healthy liquidity' : 'Thin liquidity — slippage risk',
    d: `$${fmtFull(liq)} in active pools. ${liq > 50000 ? 'Easy to enter and exit.' : liq > 10000 ? 'Tradeable but watch slippage on size.' : 'Hard to exit cleanly.'}`
  });
  signals.push({
    pass: mcap > 0 && mcap < 100000000,
    warn: mcap >= 100000000 && mcap < 1000000000,
    h: mcap === 0 ? 'No reported market cap' : mcap < 100000 ? 'Micro-cap — pre-pump range' : mcap < 1000000 ? 'Low cap — early entry' : mcap < 100000000 ? 'Mid cap — room to run' : mcap < 1000000000 ? 'Large cap — moves slower' : 'Mega cap — multi-baggers unlikely',
    d: `Market cap: $${fmtFull(mcap)}. FDV: $${fmtFull(fdv)}.`
  });
  signals.push({
    pass: ageH < 168 && ageH > 0.5,
    warn: ageH >= 168 && ageH < 720,
    h: ageH < 0.5 ? 'Brand new — extreme risk' : ageH < 24 ? 'Fresh launch' : ageH < 168 ? 'Recent launch (under 1 week)' : ageH < 720 ? 'Established (1+ week old)' : 'Mature token',
    d: ageH < 1 ? `${Math.round(ageH*60)} minutes since pool created` : ageH < 48 ? `${Math.round(ageH)} hours since pool created` : `${Math.round(ageH/24)} days since pool created`
  });
  signals.push({
    pass: totalTxn > 100,
    warn: totalTxn > 20 && totalTxn <= 100,
    h: totalTxn > 1000 ? 'High trading activity' : totalTxn > 100 ? 'Active trading' : totalTxn > 20 ? 'Light activity' : 'Almost no activity',
    d: `${buys24} buys, ${sells24} sells in 24h. Buy/sell ratio: ${sells24 > 0 ? (buys24/sells24).toFixed(2) : '∞'}`
  });
  signals.push({
    pass: ch24 > 0 && buyPct >= 50,
    fail: ch24 < -25,
    warn: (ch24 <= 0 && ch24 >= -25) || (ch24 > 0 && buyPct < 50),
    h: ch24 > 50 ? 'Strong upward momentum' : ch24 > 0 ? 'Positive 24h momentum' : ch24 > -25 ? 'Drifting / consolidating' : 'Heavy 24h sell pressure',
    d: `5m ${fmtPct(ch5m)} · 1h ${fmtPct(ch1h)} · 6h ${fmtPct(ch6h)} · 24h ${fmtPct(ch24)}. Buy flow ${buyPct.toFixed(0)}%.`
  });

// ── HELPERS ──
function fmtUsd(n) {
  if (!n || n === 0) return '—';
  if (n >= 1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}
function fmtFull(n) {
  if (!n) return '0';
  return Math.round(n).toLocaleString();
}
function fmtPrice(p) {
  if (!p || p === 0) return '—';
  if (p >= 1) return '$'+p.toFixed(4);
  if (p >= 0.01) return '$'+p.toFixed(5);
  if (p >= 0.0001) return '$'+p.toFixed(7);
  return '$'+p.toFixed(10);
}
function fmtPct(p) {
  if (p === 0 || !isFinite(p)) return '0.0%';
  return (p >= 0 ? '+' : '') + p.toFixed(1) + '%';
}
function dirClass(p) {
  if (p > 0.1) return 'up';
  if (p < -0.1) return 'down';
  return 'zero';
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function copyMint(mint) {
  navigator.clipboard?.writeText(mint).then(() => showToast('Mint copied ✓'));
}

async function runConvictionTrace(mint) {
  const box = document.getElementById('ta-conviction-' + mint);
  if (!box) return;
  box.style.display = 'block';
  box.innerHTML = '<div class="ta-conviction-loading">💰 Scanning early buyers for conviction signal…</div>';
  try {
    const r = await fetch(API + '/solintel/conviction-trace', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mint })
    });
    if (!r.ok) {
      box.innerHTML = '<div class="ta-conv-skip">💰 Conviction trace unavailable for this token</div>';
      return;
    }
    const data = await r.json();
    if (data.signal === 'TOO_OLD') {
      box.innerHTML = `<div class="ta-conv-skip">💰 Conviction trace skipped — token is ${data.tokenAgeDays}d old (signal weakens after 7d)</div>`;
      return;
    }
    if (!data.ok) {
      box.innerHTML = '<div class="ta-conv-skip">💰 Conviction trace incomplete</div>';
      return;
    }
    renderConvictionTrace(box, data);
    // Feed verdict synthesis
    if (!_currentAnalysis || _currentAnalysis.mint !== mint) {
      _currentAnalysis = { mint, safety: null, forensics: null, smartMoney: null, conviction: null };
    }
    _currentAnalysis.conviction = data;
    tryRenderVerdict(mint);
  } catch (e) {
    box.innerHTML = '<div class="ta-conv-skip">💰 Conviction trace failed to load</div>';
  }
}

function renderConvictionTrace(box, data) {
  const signal = data.signal || 'NONE';
  const cluster = data.clusterSize || 0;
  const totalUsd = data.totalClusterUsd || 0;
  const fresh = data.freshConvictionCount || 0;
  const ultraFresh = data.ultraFreshCount || 0;
  const hp = data.honeypot || {};
  const buyers = data.convictionBuyers || [];
  const age = data.tokenAgeDisplay || '—';

  let icon, title, verdict;
  if (signal === 'HONEYPOT PATTERN') {
    icon = '🚨';
    title = 'Honeypot pattern — fake conviction detected';
    verdict = (hp.reasons && hp.reasons[0]) || 'Conviction buyers funded by deployer';
  } else if (signal === 'FRESH CLUSTER') {
    icon = '🆕';
    const dayTxt = ultraFresh >= 2 ? `${ultraFresh} same-day` : `${fresh} brand-new`;
    title = `Fresh cluster firing — ${dayTxt} wallets, $${(totalUsd/1000).toFixed(1)}K in first ${age}`;
    verdict = `Brand-new wallets putting real money down on a brand-new token = inside-group signature. ${ultraFresh > 0 ? ultraFresh + ' wallet' + (ultraFresh > 1 ? 's' : '') + ' created within 24h of launch.' : ''} None funded by deployer — this is the pattern that turns $5K into $100K+.`;
  } else if (signal === 'CONVICTION CLUSTER') {
    icon = '★';
    title = `Conviction cluster — ${cluster} wallets, $${(totalUsd/1000).toFixed(1)}K in first ${age}`;
    verdict = hp.deployerFundedCount === 0
      ? `${cluster} wallets independently putting $2K+ each. ${fresh > 0 ? fresh + ' fresh wallet' + (fresh > 1 ? 's' : '') + ' in the mix.' : 'All established wallets — could be coordinated alpha group.'}`
      : `Mostly clean (${cluster - hp.deployerFundedCount} of ${cluster} buyers independently funded)`;
  } else if (signal === 'PARTIAL CLUSTER') {
    icon = '⚠';
    title = `${cluster} wallets put $${(totalUsd/1000).toFixed(1)}K down — cluster forming`;
    verdict = 'Need one more independent conviction buyer to confirm a strong cluster signal.';
  } else if (signal === 'SINGLE WHALE') {
    icon = '⚠';
    title = `Single whale put $${(totalUsd/1000).toFixed(1)}K down`;
    verdict = 'One wallet alone could be the deployer or a smart-money loner. Watch for cluster confirmation.';
  } else {
    icon = '·';
    title = `No conviction signal — token age ${age}`;
    verdict = `${data.uniqueBuyers || 0} unique buyers scanned in first ${data.analyzed || 0} txs. No wallet put $2,000+ down.`;
  }

  const buyersHtml = buyers.length > 0
    ? `<div class="ta-conv-buyers">
        <div class="ta-conv-buyers-h">Conviction buyers (≥$2,000) · 🆕 = wallet &lt; 3 days old</div>
        ${buyers.slice(0, 8).map(b => {
          const freshBadge = b.isUltraFresh
            ? `<span style="color:#14f195;font-weight:700">🆕 ${b.walletAgeDays < 1 ? '<1d' : b.walletAgeDays + 'd'}</span>`
            : b.isFresh
              ? `<span style="color:#9945ff;font-weight:700">🆕 ${b.walletAgeDays}d</span>`
              : b.walletAgeDays !== null && b.walletAgeDays > 0
                ? `<span style="color:var(--t3)">${b.walletAgeDays >= 365 ? Math.round(b.walletAgeDays / 365) + 'y' : Math.round(b.walletAgeDays) + 'd'}</span>`
                : '<span style="color:var(--t3)">·</span>';
          return `
          <div class="ta-conv-buyer" onclick="navigator.clipboard.writeText('${b.wallet}');showToast('Wallet copied')">
            <div>
              <div class="ta-conv-buyer-w">${b.wallet.slice(0,4)}…${b.wallet.slice(-4)}</div>
              <div class="ta-conv-buyer-s">${freshBadge} · ${b.walletTxCount} tx</div>
            </div>
            <div style="text-align:right">
              <div class="ta-conv-buyer-u">$${b.usdValue.toLocaleString()}</div>
              <div class="ta-conv-buyer-s">${b.solSpent} SOL</div>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

  const headlineMetric = signal === 'FRESH CLUSTER' ? `${fresh}🆕` : (cluster > 0 ? `${cluster}` : '—');
  box.setAttribute('data-signal', signal);
  box.innerHTML = `
    <div class="ta-conv-hdr">
      <div class="ta-conv-icon">${icon}</div>
      <div class="ta-conv-text">
        <div class="ta-conv-eyebrow">Conviction Trace · Layer 6</div>
        <div class="ta-conv-title">${escapeHtml(title)}</div>
      </div>
      <div class="ta-conv-pct">${headlineMetric}</div>
    </div>
    <div class="ta-conv-stats">
      <div class="ta-conv-stat"><div class="ta-conv-stat-v">${cluster}</div><div class="ta-conv-stat-l">Conviction Buyers</div></div>

      <div class="ta-conv-stat"><div class="ta-conv-stat-v" style="color:${hp.level==='CRITICAL'?'#ff1a4d':hp.level==='HIGH'?'#ff7b3b':'var(--green)'}">${hp.deployerFundedCount || 0}</div><div class="ta-conv-stat-l">Funded By Dev</div></div>

// Pure synthesizer — used by both the Analyzer verdict hero and the Live Calls feed
function synthVerdict(safety, forensics, smartMoney, conviction) {
  smartMoney = smartMoney || { hits: [], tracked: 0 };
  conviction = conviction || null;
  const isCriticalSafety = safety?.riskLevel === 'CRITICAL';
  const isCriticalForensics = forensics?.riskLevel === 'CRITICAL';
  const isHoneypotConviction = conviction?.honeypot?.level === 'CRITICAL';
  const isHardAvoid = isCriticalSafety || isCriticalForensics || isHoneypotConviction;
  let level, levelKey, emoji, headline, score;
  const findings = [];
  const smHits = (smartMoney.hits || []).length;
  const overlap = forensics?.stats?.overlapPct || 0;
  const overlapBuyers = forensics?.stats?.deployerFundedBuyers || 0;
  const totalBuyers = forensics?.stats?.earlyBuyersIdentified || 0;
  const clusterSize = conviction?.clusterSize || 0;
  const clusterUsd = conviction?.totalClusterUsd || 0;
  const freshCount = conviction?.freshConvictionCount || 0;
  const ultraFreshCount = conviction?.ultraFreshCount || 0;
  const hpDeployerFunded = conviction?.honeypot?.deployerFundedCount || 0;

  if (isHardAvoid) {
    level = 'AVOID'; levelKey = 'avoid'; emoji = '🚨'; score = 0;
    if (isHoneypotConviction) {
      headline = 'Honeypot pattern — conviction buyers funded by deployer';
      findings.push({ icon: '✗', cls: 'bad', text: `${hpDeployerFunded} of ${clusterSize} "conviction" buyers funded by deployer — coordinated fake conviction` });
    } else if (isCriticalSafety) {
      const c = (safety.signals || []).find(s => s.severity === 'critical' && !s.pass);
      headline = c ? c.h : 'Critical safety failure detected';
      if (c) findings.push({ icon: '✗', cls: 'bad', text: c.h + ' — ' + c.d });
    }
    if (isCriticalForensics) {
      if (!headline) headline = 'Coordinated launch — deployer-funded snipers';
      findings.push({ icon: '✗', cls: 'bad', text: `${overlapBuyers} of ${totalBuyers} early buyers funded by deployer (${overlap}%)` });
    }
    if (smHits > 0) findings.push({ icon: '⚠', cls: 'warn', text: `${smHits} smart-money still in, but fatal flags override` });
  } else {
    const safetyScore = typeof safety?.safetyScore === 'number' ? safety.safetyScore : 50;
    const forensicsScore = Math.max(0, 100 - (overlap * 2.2));
    const smBonus = Math.min(15, smHits * 5);
    // Conviction scoring: FRESH cluster scores higher than regular cluster
    const convictionBonus = Math.min(20, (freshCount * 7) + (clusterSize * 2));
    score = Math.round((safetyScore * 0.40) + (forensicsScore * 0.32) + smBonus + convictionBonus);
    score = Math.max(0, Math.min(100, score));

    const freshCluster = freshCount >= 2 && conviction?.honeypot?.level === 'NONE';
    const strongConviction = clusterSize >= 3 && conviction?.honeypot?.level === 'NONE';

    if (freshCluster && safetyScore >= 70 && overlap < 15) {
      // The user's "real tell" — highest-conviction signal
      level = 'STRONG ENTRY'; levelKey = 'strong-entry'; emoji = '🎯';
      const dayText = ultraFreshCount >= 2 ? 'same-day' : `<${Math.ceil(FRESH_WALLET_THRESHOLD_DAYS_CLIENT)}d`;
      headline = `Fresh cluster firing — ${freshCount} brand-new wallets (${dayText}) put down $${(clusterUsd/1000).toFixed(1)}K, no honeypot pattern`;
    } else if ((smHits >= 3 || strongConviction) && safetyScore >= 75 && overlap < 10) {
      level = 'STRONG ENTRY'; levelKey = 'strong-entry'; emoji = '🎯';
      if (smHits >= 3 && strongConviction) {
        headline = `Alpha cluster + conviction cluster firing — ${smHits} smart-money in, ${clusterSize} wallets put down $${(clusterUsd/1000).toFixed(1)}K`;
      } else if (strongConviction) {
        headline = `Conviction cluster firing — ${clusterSize} independent wallets put down $${(clusterUsd/1000).toFixed(1)}K, no honeypot pattern`;
      } else {
        headline = `Alpha cluster firing — ${smHits} smart-money in, safety clean, no deployer farming`;
      }
    } else if (score >= 75) {
      level = 'CLEAN ENTRY'; levelKey = 'clean-entry'; emoji = '✓';
      if (freshCount >= 1) {
        headline = `Safety checks pass · ${freshCount} fresh wallet${freshCount > 1 ? 's' : ''} put $${(clusterUsd/1000).toFixed(1)}K down early`;
      } else if (clusterSize >= 2) {
        headline = `Safety checks pass · ${clusterSize} wallets put down $${(clusterUsd/1000).toFixed(1)}K early`;
      } else if (smHits > 0) {
        headline = `Safety checks pass · ${smHits} smart-money wallet${smHits > 1 ? 's' : ''} already in`;
      } else {
        headline = 'Safety checks pass · no deployer farming detected';
      }
    } else if (score >= 55) {
      level = 'WATCH'; levelKey = 'watch'; emoji = '👀';
      headline = 'Mixed signals — clean basics with some structural concerns';
    } else if (score >= 30) {
      level = 'CAUTION'; levelKey = 'caution'; emoji = '⚠️';
      headline = 'Multiple risk flags — only with strong conviction and small size';
    } else {
      level = 'AVOID'; levelKey = 'avoid'; emoji = '🚨';
      headline = 'Too many concerns to recommend entry';
    }

    if (smHits > 0) {
      const labels = smartMoney.hits.slice(0, 2).map(h => h.label || 'smart money').join(', ');
      findings.push({ icon: '★', cls: 'star', text: `${smHits} tracked smart-money wallet${smHits > 1 ? 's' : ''} bought early${smHits <= 2 ? ` (${labels})` : ''}` });
    }
    if (freshCount >= 2 && conviction?.honeypot?.level === 'NONE') {
      findings.push({ icon: '🆕', cls: 'star', text: `Fresh cluster: ${freshCount} brand-new wallets (${ultraFreshCount > 0 ? ultraFreshCount + ' same-day' : 'recent'}) put down $${(clusterUsd/1000).toFixed(1)}K — inside-group signature` });
    } else if (clusterSize >= 3 && conviction?.honeypot?.level === 'NONE') {
      findings.push({ icon: '★', cls: 'star', text: `Conviction cluster: ${clusterSize} wallets put down $${(clusterUsd/1000).toFixed(1)}K — no honeypot pattern` });
    } else if (clusterSize >= 2 && conviction?.honeypot?.level === 'NONE') {
      findings.push({ icon: '✓', cls: 'good', text: `${clusterSize} wallets put $${(clusterUsd/1000).toFixed(1)}K down early (cluster forming)` });
    } else if (clusterSize === 1) {
      findings.push({ icon: '⚠', cls: 'warn', text: `Single whale put $${(clusterUsd/1000).toFixed(1)}K down — watch for cluster confirmation` });
    }
    if (conviction?.honeypot?.level === 'HIGH') {
      findings.push({ icon: '⚠', cls: 'warn', text: conviction.honeypot.reasons[0] || 'Partial honeypot signal' });
    }
    const mintAuth = (safety?.signals || []).find(s => s.id === 'mint_authority');
    const freezeAuth = (safety?.signals || []).find(s => s.id === 'freeze_authority');
    if (mintAuth?.pass) findings.push({ icon: '✓', cls: 'good', text: 'Mint authority revoked' });
    if (freezeAuth?.pass) findings.push({ icon: '✓', cls: 'good', text: 'Freeze authority revoked' });
    if (overlap === 0 && totalBuyers > 0) {
      findings.push({ icon: '✓', cls: 'good', text: `No deployer-funded snipers in first ${totalBuyers} buyers` });
    } else if (overlap > 0 && overlap < 30) {
      findings.push({ icon: '⚠', cls: 'warn', text: `${overlapBuyers} of ${totalBuyers} early buyers funded by deployer (${overlap}%)` });
    }
    const conc = (safety?.signals || []).find(s => s.id === 'concentration');
    if (conc) {
      if (conc.pass) findings.push({ icon: '✓', cls: 'good', text: conc.h });
      else if (conc.warn) findings.push({ icon: '⚠', cls: 'warn', text: conc.h });
      else findings.push({ icon: '✗', cls: 'bad', text: conc.h });
    }
    const tp = (safety?.signals || []).find(s => s.id === 'token_program');
    if (tp && tp.warn) findings.push({ icon: '⚠', cls: 'warn', text: tp.h });
  }

  return { level, levelKey, emoji, headline, score, findings };
}

async function runCexTrace(wallet) {
  const btn = document.getElementById('ta-cex-btn-' + wallet);

  if (btn) { btn.disabled = true; btn.textContent = '🔍 Tracing funding origin…'; }

    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));

  const input = document.getElementById('ta-input');
  if (input) input.value = t;
  // Run after a tick so analyzer page is visible
  setTimeout(() => runAnalyzer(), 100);
  // Don't strip the param yet — we'll update meta tags from the loaded result
  // (cleared inside renderTokenAnalysis after meta update so share-backs preserve attribution)
}

function updateMetaTagsForToken(sym, name, mint, price, ch24) {
  const titleBase = `$${sym} ${name ? `(${name}) ` : ''}— Live Analysis & Scout Score · SolIntel`;
  document.title = titleBase;
  const desc = `Real-time on-chain analysis for $${sym}. Price $${(price||0).toFixed(price>=1?4:8)}, ${(ch24||0).toFixed(1)}% 24h. Scout Score, risk signals, AI deep analysis, and where to trade.`;
  setMeta('description', desc);
  setMeta('og:title', titleBase, true);
  setMeta('og:description', desc, true);
  setMeta('og:url', `${window.location.origin}${window.location.pathname}?token=${encodeURIComponent(mint)}`, true);
  setMeta('twitter:title', titleBase, true);
  setMeta('twitter:description', desc, true);
  setMeta('twitter:card', 'summary_large_image', true);
}

function setMeta(name, content, isProperty) {
  const attr = isProperty ? 'property' : 'name';
  let el = document.querySelector(`meta[${attr}="${name}"]`);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, name);
    document.head.appendChild(el);
  }
  el.setAttribute('content', content);
}

// ═══════════════════════════════════
// SMART MONEY RIGHT NOW (DexScreener trending)
// ═══════════════════════════════════
async function loadSmartMoneyNow() {
  const grid = document.getElementById('sm-now-grid');
  if (!grid) return;
  try {
    // DexScreener doesn't have a single "trending" endpoint, but search for SOL
    // returns the highest-volume pairs by default — perfect for "what's hot now"
    const r = await fetch('https://api.dexscreener.com/latest/dex/search?q=SOL');
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if (!data?.pairs || data.pairs.length === 0) {
      grid.innerHTML = '<div class="sm-now-empty">No trending data right now. Check back in a moment.</div>';
      return;
    }
    // Filter Solana pairs only, dedupe by mint, sort by 24h volume desc
    const solPairs = data.pairs.filter(p => p.chainId === 'solana' && (p.volume?.h24||0) > 0);
    const byMint = {};
    solPairs.forEach(p => {
      const m = p.baseToken?.address;
      if (!m) return;
      if (!byMint[m] || (p.volume?.h24||0) > (byMint[m].volume?.h24||0)) byMint[m] = p;
    });
    const top = Object.values(byMint)
      .sort((a,b) => (b.volume?.h24||0) - (a.volume?.h24||0))
      .slice(0, 8);
    if (top.length === 0) {
      grid.innerHTML = '<div class="sm-now-empty">No Solana movers right now.</div>';
      return;
    }
    grid.innerHTML = top.map(p => {
      const sym = p.baseToken?.symbol || '?';
      const mint = p.baseToken?.address;
      const ch24 = p.priceChange?.h24 || 0;
      const vol = p.volume?.h24 || 0;
      const mcap = p.marketCap || p.fdv || 0;
      const url = `${window.location.pathname}?token=${encodeURIComponent(mint)}`;
      return `<a class="sm-now-card" href="${url}" onclick="event.preventDefault();showPage('analyzer');document.getElementById('ta-input').value='${mint}';setTimeout(runAnalyzer,80);">
        <div class="sm-now-row1">
          <div class="sm-now-sym">$${escapeHtml(sym)}</div>
          <div class="sm-now-ch ${ch24>=0?'up':'down'}">${ch24>=0?'+':''}${ch24.toFixed(1)}%</div>
        </div>
        <div class="sm-now-row2">
          <span>Vol ${fmtUsd(vol)}</span>
          <span>Mcap ${fmtUsd(mcap)}</span>
        </div>
      </a>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="sm-now-empty">Trending data temporarily unavailable.</div>';
  }
}

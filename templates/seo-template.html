<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{CANONICAL_URL}}">

<style>
:root{
--bg-top:#eef4ff;
--bg-bottom:#ffffff;

--ink:#1f2937;
--ink-strong:#0f172a;
--muted:#667085;
--muted-2:#94a3b8;
--line:#e2e8f0;
--line-soft:#edf2f7;

--blue:#2563eb;
--blue-2:#4f7df3;
--blue-3:#1d4ed8;
--blue-soft:#eff6ff;
--blue-line:#bfdbfe;
--navy:#1e293b;

--red:#dc2626;
--red-dark:#991b1b;
--red-soft:#fef2f2;
--red-soft-2:#fff7f7;
--red-line:#fecaca;

--amber:#b45309;
--amber-soft:#fffbeb;
--amber-line:#fde68a;

--green:#15803d;
--green-soft:#f0fdf4;
--green-line:#bbf7d0;

--shadow-hero:0 26px 70px rgba(37,99,235,.08);
--shadow-xl:0 30px 80px rgba(15,23,42,.10);
--shadow-lg:0 20px 50px rgba(15,23,42,.08);
--shadow-md:0 12px 30px rgba(15,23,42,.07);
--shadow-sm:0 8px 20px rgba(15,23,42,.05);
}

*{
box-sizing:border-box;
}

html{
-webkit-text-size-adjust:100%;
}

body{
font-family:system-ui,-apple-system,Arial,sans-serif;
background:
radial-gradient(circle at top center, rgba(79,125,243,.12), transparent 30%),
radial-gradient(circle at 20% 8%, rgba(37,99,235,.06), transparent 20%),
linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
margin:0;
padding-top:96px;
color:var(--ink);
line-height:1.6;
}

.top-bar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 16px;
z-index:1000;
pointer-events:none;
box-sizing:border-box;
}

.logo{
pointer-events:auto;
display:inline-flex;
align-items:center;
gap:8px;
font-size:14px;
font-weight:900;
color:#334155;
margin-left:8px;
letter-spacing:-.01em;
opacity:.97;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.84);
border:1px solid rgba(226,232,240,.95);
backdrop-filter:blur(10px);
box-shadow:0 10px 26px rgba(15,23,42,.06);
}

.logo-dot{
width:10px;
height:10px;
border-radius:50%;
background:linear-gradient(180deg,#60a5fa 0%,#2563eb 100%);
box-shadow:0 0 0 4px rgba(59,130,246,.12);
flex:0 0 10px;
}

.top-actions{
pointer-events:auto;
display:flex;
align-items:center;
gap:10px;
margin-right:28px;
}

.app-top{
display:inline-flex;
align-items:center;
justify-content:center;
padding:11px 14px;
font-size:14px;
border-radius:16px;
font-weight:900;
background:rgba(255,255,255,.9);
color:#111827;
border:1px solid rgba(226,232,240,.95);
text-decoration:none;
white-space:nowrap;
backdrop-filter:blur(10px);
box-shadow:0 12px 28px rgba(15,23,42,.08);
}

.upgrade-top{
pointer-events:auto;
padding:11px 15px;
font-size:14px;
border-radius:16px;
box-shadow:0 16px 36px rgba(15,23,42,.16);
font-weight:900;
background:linear-gradient(180deg,#22324b 0%,var(--navy) 100%);
color:#fff;
border:none;
cursor:pointer;
white-space:nowrap;
max-width:120px;
overflow:hidden;
text-overflow:ellipsis;
}

@supports (padding: max(0px)) {
  .top-bar{
    padding-left:max(16px, env(safe-area-inset-left));
    padding-right:max(16px, env(safe-area-inset-right));
  }
}

.page-shell{
max-width:860px;
margin:0 auto;
padding:0 14px;
}

.hero{
text-align:center;
padding:22px 20px 18px;
max-width:940px;
margin:0 auto 10px;
}

.hero h1{
margin:0;
font-size:44px;
line-height:1.02;
letter-spacing:-.045em;
color:var(--ink-strong);
font-weight:900;
text-wrap:balance;
}

.hero p{
margin-top:14px;
font-size:19px;
max-width:760px;
margin-left:auto;
margin-right:auto;
color:#334155;
text-wrap:balance;
}

.hero-tr

<script>
/* =========================
   FINAL CONSISTENCY + SAFETY PASS
   ========================= */

(function () {
  if (window.__SCAM_CHECK_FINAL_PASS__) return;
  window.__SCAM_CHECK_FINAL_PASS__ = true;

  function normalizeText(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function normalizeVisibleCopy() {
    document.querySelectorAll("h1,h2,h3,h4,p,li,a,button,span,div.note,div.input-help").forEach(el => {
      if (!el) return;
      if (el.children.length === 0) {
        el.textContent = normalizeText(el.textContent);
      }
    });
  }

  function makeExternalLinksSafe() {
    document.querySelectorAll("a[target='_blank']").forEach(a => {
      a.setAttribute("rel", "noopener noreferrer");
    });
  }

  function ensureResultRegion() {
    const result = document.getElementById("result");
    if (!result) return;
    result.setAttribute("role", "region");
    result.setAttribute("aria-live", "polite");
    result.setAttribute("aria-label", "Scam analysis result");
  }

  function ensureInputsAccessible() {
    const text = document.getElementById("text");
    const email = document.getElementById("email");

    if (text) {
      text.setAttribute("aria-label", "Paste suspicious message, email, link, or website");
      text.setAttribute("spellcheck", "false");
      text.setAttribute("autocapitalize", "off");
      text.setAttribute("autocomplete", "off");
      text.setAttribute("autocorrect", "off");
    }

    if (email) {
      email.setAttribute("aria-label", "Subscriber email");
      email.setAttribute("inputmode", "email");
      email.setAttribute("autocomplete", "email");
      email.value = normalizeText(email.value);
    }
  }

  function protectButtons() {
    document.querySelectorAll("button").forEach(btn => {
      if (!btn.getAttribute("type")) {
        btn.setAttribute("type", "button");
      }
    });
  }

  function stabilizeResultRendering() {
    const result = document.getElementById("result");
    if (!result) return;

    const observer = new MutationObserver(() => {
      const card = result.querySelector(".result-card");
      if (!card) return;

      card.style.wordBreak = "break-word";
      card.style.overflowWrap = "anywhere";

      const shareStatus = card.querySelector("#shareStatus");
      if (shareStatus) {
        shareStatus.setAttribute("aria-live", "polite");
      }
    });

    observer.observe(result, {
      childList: true,
      subtree: true
    });
  }

  function normalizePlaceholders() {
    const text = document.getElementById("text");
    const email = document.getElementById("email");

    if (text) {
      text.placeholder = normalizeText(text.placeholder);
    }

    if (email) {
      email.placeholder = normalizeText(email.placeholder);
    }
  }

  function tidyLinks() {
    document.querySelectorAll("#relatedLinks a, #moreLinks a").forEach(a => {
      a.textContent = normalizeText(a.textContent);
      a.setAttribute("title", a.textContent);
    });
  }

  function guardAgainstEmptyAnchors() {
    document.querySelectorAll("a").forEach(a => {
      const href = a.getAttribute("href");
      if (href === "" || href == null) {
        a.setAttribute("href", "#");
      }
    });
  }

  function normalizeTextareaOnBlur() {
    const text = document.getElementById("text");
    if (!text) return;

    text.addEventListener("blur", function () {
      text.value = normalizeText(text.value);
    });
  }

  function finalHeroCleanup() {
    const h1 = document.getElementById("heroKeyword");
    const sub = document.getElementById("heroSubheading");

    if (h1) h1.textContent = normalizeText(h1.textContent);
    if (sub) sub.textContent = normalizeText(sub.textContent);
  }

  function finalFooterCleanup() {
    const footer = document.querySelector(".footer");
    if (!footer) return;

    footer.querySelectorAll("div").forEach(div => {
      if (div.children.length === 0) {
        div.textContent = normalizeText(div.textContent);
      }
    });
  }

  function init() {
    normalizeVisibleCopy();
    makeExternalLinksSafe();
    ensureResultRegion();
    ensureInputsAccessible();
    protectButtons();
    stabilizeResultRendering();
    normalizePlaceholders();
    tidyLinks();
    guardAgainstEmptyAnchors();
    normalizeTextareaOnBlur();
    finalHeroCleanup();
    finalFooterCleanup();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

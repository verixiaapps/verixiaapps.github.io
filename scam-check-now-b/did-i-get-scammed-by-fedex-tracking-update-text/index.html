<script>
(function () {

  const CRO_STATE_KEY = "scam_check_cro_state_v2";
  const CRO_VARIANT_KEY = "scam_check_variant_v2";
  const CRO_FIRST_SEEN = "scam_check_first_seen_v2";
  const CRO_INTERACTIONS = "scam_check_interactions_v2";

  function now() {
    return Date.now();
  }

  function getNumber(key) {
    return parseInt(localStorage.getItem(key) || "0", 10);
  }

  function setNumber(key, value) {
    localStorage.setItem(key, String(value));
  }

  function increment(key) {
    setNumber(key, getNumber(key) + 1);
  }

  function getVariant() {
    let v = localStorage.getItem(CRO_VARIANT_KEY);
    if (!v) {
      v = Math.random() > 0.5 ? "A" : "B";
      localStorage.setItem(CRO_VARIANT_KEY, v);
    }
    return v;
  }

  function markFirstSeen() {
    if (!localStorage.getItem(CRO_FIRST_SEEN)) {
      localStorage.setItem(CRO_FIRST_SEEN, String(now()));
    }
  }

  function timeSinceFirstSeen() {
    const ts = getNumber(CRO_FIRST_SEEN);
    if (!ts) return 0;
    return now() - ts;
  }

  function buildFloatingBar() {
    const bar = document.createElement("div");
    bar.id = "floating-upgrade-bar";

    bar.style.position = "fixed";
    bar.style.bottom = "14px";
    bar.style.left = "50%";
    bar.style.transform = "translateX(-50%)";
    bar.style.zIndex = "9999";
    bar.style.padding = "12px 16px";
    bar.style.borderRadius = "999px";
    bar.style.display = "flex";
    bar.style.alignItems = "center";
    bar.style.gap = "10px";
    bar.style.background = "rgba(15,23,42,.88)";
    bar.style.border = "1px solid rgba(255,255,255,.14)";
    bar.style.backdropFilter = "blur(10px)";
    bar.style.boxShadow = "0 20px 50px rgba(0,0,0,.35)";
    bar.style.opacity = "0";
    bar.style.pointerEvents = "none";
    bar.style.transition = "opacity .25s ease, transform .25s ease";

    const text = document.createElement("div");
    text.style.fontSize = "13px";
    text.style.fontWeight = "900";
    text.style.color = "#fff";
    text.style.whiteSpace = "nowrap";

    const btn = document.createElement("button");
    btn.textContent = "Unlock";
    btn.style.padding = "8px 14px";
    btn.style.borderRadius = "999px";
    btn.style.border = "none";
    btn.style.fontWeight = "900";
    btn.style.cursor = "pointer";
    btn.style.background = "linear-gradient(135deg,#8679f7,#2cc6e8)";
    btn.style.color = "#fff";

    bar.appendChild(text);
    bar.appendChild(btn);

    document.body.appendChild(bar);

    return { bar, text, btn };
  }

  function showFloatingBar(state) {
    const el = document.getElementById("floating-upgrade-bar");
    if (!el) return;

    el.style.opacity = "1";
    el.style.pointerEvents = "auto";
    el.style.transform = "translateX(-50%) translateY(0)";
  }

  function hideFloatingBar() {
    const el = document.getElementById("floating-upgrade-bar");
    if (!el) return;

    el.style.opacity = "0";
    el.style.pointerEvents = "none";
    el.style.transform = "translateX(-50%) translateY(10px)";
  }

  function attachFloatingLogic() {
    const { bar, text, btn } = buildFloatingBar();
    const variant = getVariant();

    function updateCopy() {
      const interactions = getNumber(CRO_INTERACTIONS);

      if (variant === "A") {
        text.textContent = interactions > 1
          ? "More messages coming. Stay protected."
          : "Check the next message instantly.";
      } else {
        text.textContent = interactions > 1
          ? "Don’t guess next time."
          : "Avoid costly mistakes.";
      }
    }

    updateCopy();

    let visible = false;

    function maybeShow() {
      const interactions = getNumber(CRO_INTERACTIONS);
      const timeElapsed = timeSinceFirstSeen();

      if (interactions >= 1 && timeElapsed > 3000 && !visible) {
        visible = true;
        showFloatingBar();
      }
    }

    window.addEventListener("scroll", function () {
      if (window.scrollY > 600) {
        maybeShow();
      }
    });

    btn.addEventListener("click", function () {
      increment(CRO_INTERACTIONS);
      hideFloatingBar();
      if (window.openEmbeddedUpgrade) {
        window.openEmbeddedUpgrade("monthly");
      }
    });

    setInterval(updateCopy, 3000);
  }

  function attachExitIntent() {
    let triggered = false;

    document.addEventListener("mouseout", function (e) {
      if (triggered) return;

      if (!e.relatedTarget && e.clientY <= 0) {
        triggered = true;

        setTimeout(function () {
          if (window.openEmbeddedUpgrade) {
            window.openEmbeddedUpgrade("monthly");
          }
        }, 200);
      }
    });
  }

  function attachResultTracking() {
    const observer = new MutationObserver(function () {
      const result = document.getElementById("result");
      if (!result) return;

      if (result.innerText && result.innerText.length > 20) {
        increment(CRO_INTERACTIONS);
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function attachScrollDepth() {
    let maxDepth = 0;

    window.addEventListener("scroll", function () {
      const scrollTop = window.scrollY;
      const docHeight = document.body.scrollHeight - window.innerHeight;
      const percent = docHeight > 0 ? scrollTop / docHeight : 0;

      if (percent > maxDepth) {
        maxDepth = percent;

        if (percent > 0.6) {
          increment(CRO_INTERACTIONS);
        }
      }
    });
  }

  function attachIdleTimer() {
    let idleTimeout;

    function resetIdle() {
      clearTimeout(idleTimeout);
      idleTimeout = setTimeout(function () {
        if (window.openEmbeddedUpgrade) {
          window.openEmbeddedUpgrade("monthly");
        }
      }, 18000);
    }

    ["mousemove", "keydown", "scroll", "touchstart"].forEach(function (event) {
      document.addEventListener(event, resetIdle, { passive: true });
    });

    resetIdle();
  }

  function init() {
    markFirstSeen();
    attachFloatingLogic();
    attachExitIntent();
    attachResultTracking();
    attachScrollDepth();
    attachIdleTimer();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

})();
</script>

<script>
(function () {

  const UX_STATE = {
    hasFocused: false,
    hasTyped: false,
    hasChecked: false,
    lastValue: "",
    idleTimer: null,
    hintVisible: false
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function createHelperBubble() {
    const bubble = document.createElement("div");
    bubble.id = "input-helper-bubble";

    bubble.style.position = "absolute";
    bubble.style.bottom = "110%";
    bubble.style.left = "0";
    bubble.style.padding = "10px 12px";
    bubble.style.borderRadius = "14px";
    bubble.style.fontSize = "13px";
    bubble.style.fontWeight = "800";
    bubble.style.lineHeight = "1.4";
    bubble.style.color = "#fff";
    bubble.style.background = "rgba(15,23,42,.95)";
    bubble.style.border = "1px solid rgba(255,255,255,.12)";
    bubble.style.boxShadow = "0 18px 40px rgba(0,0,0,.35)";
    bubble.style.backdropFilter = "blur(8px)";
    bubble.style.opacity = "0";
    bubble.style.pointerEvents = "none";
    bubble.style.transform = "translateY(6px)";
    bubble.style.transition = "opacity .2s ease, transform .2s ease";

    return bubble;
  }

  function showBubble(bubble, text) {
    if (!bubble) return;

    bubble.textContent = text;
    bubble.style.opacity = "1";
    bubble.style.pointerEvents = "auto";
    bubble.style.transform = "translateY(0)";
    UX_STATE.hintVisible = true;
  }

  function hideBubble(bubble) {
    if (!bubble) return;

    bubble.style.opacity = "0";
    bubble.style.pointerEvents = "none";
    bubble.style.transform = "translateY(6px)";
    UX_STATE.hintVisible = false;
  }

  function attachTextareaUX() {
    const textarea = byId("text");
    if (!textarea) return;

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";

    textarea.parentNode.insertBefore(wrapper, textarea);
    wrapper.appendChild(textarea);

    const bubble = createHelperBubble();
    wrapper.appendChild(bubble);

    function getContextHint(value) {
      const lower = value.toLowerCase();

      if (!value) return "Paste a full message or link to analyze it.";

      if (lower.includes("http") || lower.includes("www")) {
        return "Good. Links are high risk. Checking domain patterns helps.";
      }

      if (lower.includes("code") || lower.includes("verify")) {
        return "Codes are sensitive. Never share them from messages.";
      }

      if (lower.includes("job") || lower.includes("interview")) {
        return "Job scams often rush or skip real interview steps.";
      }

      if (lower.includes("wallet") || lower.includes("crypto")) {
        return "Never approve wallet actions or share recovery phrases.";
      }

      if (lower.includes("delivery") || lower.includes("package")) {
        return "Delivery scams often ask for small payments or clicks.";
      }

      return "Checking for urgency, links, impersonation, and payment traps.";
    }

    textarea.addEventListener("focus", function () {
      UX_STATE.hasFocused = true;
      showBubble(bubble, "Paste anything suspicious. We will scan it instantly.");
    });

    textarea.addEventListener("blur", function () {
      setTimeout(function () {
        hideBubble(bubble);
      }, 120);
    });

    textarea.addEventListener("input", function () {
      const value = textarea.value.trim();

      if (value && value !== UX_STATE.lastValue) {
        UX_STATE.hasTyped = true;
        UX_STATE.lastValue = value;
        showBubble(bubble, getContextHint(value));
      }

      if (!value) {
        showBubble(bubble, "Paste a full message or link to analyze it.");
      }
    });

    textarea.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        const btn = document.querySelector(".check");
        if (btn) btn.click();
      }
    });

    startIdleHints(textarea, bubble);
  }

  function startIdleHints(textarea, bubble) {
    function resetIdle() {
      clearTimeout(UX_STATE.idleTimer);

      UX_STATE.idleTimer = setTimeout(function () {
        if (!UX_STATE.hasTyped) {
          showBubble(bubble, "Try pasting a real message. Results take seconds.");
        } else if (!UX_STATE.hasChecked) {
          showBubble(bubble, "Ready. Click check to see scam signals.");
        }
      }, 4000);
    }

    ["mousemove", "keydown", "scroll", "touchstart"].forEach(function (evt) {
      document.addEventListener(evt, resetIdle, { passive: true });
    });

    resetIdle();
  }

  function attachCheckEnhancements() {
    const btn = document.querySelector(".check");
    if (!btn) return;

    btn.addEventListener("click", function () {
      UX_STATE.hasChecked = true;
      pulseResult();
    });
  }

  function pulseResult() {
    const result = byId("result");
    if (!result) return;

    result.style.transition = "transform .2s ease";
    result.style.transform = "scale(1.01)";

    setTimeout(function () {
      result.style.transform = "scale(1)";
    }, 180);
  }

  function attachAutoScroll() {
    const observer = new MutationObserver(function () {
      const result = byId("result");
      if (!result) return;

      if (result.innerText && result.innerText.length > 20) {
        setTimeout(function () {
          result.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }, 120);
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function attachResultHighlighting() {
    const observer = new MutationObserver(function () {
      const signals = document.querySelectorAll(".signal-item");
      if (!signals.length) return;

      signals.forEach(function (item, index) {
        item.style.opacity = "0";
        item.style.transform = "translateY(6px)";
        item.style.transition = "opacity .2s ease, transform .2s ease";

        setTimeout(function () {
          item.style.opacity = "1";
          item.style.transform = "translateY(0)";
        }, index * 80);
      });
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function attachInputMemory() {
    const textarea = byId("text");
    if (!textarea) return;

    const KEY = "scam_check_last_input";

    const saved = localStorage.getItem(KEY);
    if (saved && !textarea.value) {
      textarea.value = saved;
    }

    textarea.addEventListener("input", function () {
      localStorage.setItem(KEY, textarea.value);
    });
  }

  function attachKeyboardShortcuts() {
    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
        e.preventDefault();
        const textarea = byId("text");
        if (textarea) textarea.focus();
      }
    });
  }

  function attachPasteBoost() {
    const textarea = byId("text");
    if (!textarea) return;

    textarea.addEventListener("paste", function () {
      textarea.style.transition = "box-shadow .2s ease";
      textarea.style.boxShadow = "0 0 0 5px rgba(102,217,239,.12)";

      setTimeout(function () {
        textarea.style.boxShadow = "";
      }, 300);
    });
  }

  function init() {
    attachTextareaUX();
    attachCheckEnhancements();
    attachAutoScroll();
    attachResultHighlighting();
    attachInputMemory();
    attachKeyboardShortcuts();
    attachPasteBoost();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

})();
</script>

<script>
(function () {

  const PERF = {
    observers: [],
    timers: [],
    events: []
  };

  function on(el, event, handler, opts) {
    if (!el) return;
    el.addEventListener(event, handler, opts || false);
    PERF.events.push({ el, event, handler });
  }

  function offAll() {
    PERF.events.forEach(function (e) {
      try { e.el.removeEventListener(e.event, e.handler); } catch (err) {}
    });
    PERF.events = [];
  }

  function addObserver(obs) {
    PERF.observers.push(obs);
  }

  function disconnectObservers() {
    PERF.observers.forEach(function (o) {
      try { o.disconnect(); } catch (err) {}
    });
    PERF.observers = [];
  }

  function addTimer(id) {
    PERF.timers.push(id);
  }

  function clearTimers() {
    PERF.timers.forEach(function (t) {
      clearTimeout(t);
      clearInterval(t);
    });
    PERF.timers = [];
  }

  function debounce(fn, delay) {
    let t;
    return function () {
      const ctx = this;
      const args = arguments;
      clearTimeout(t);
      t = setTimeout(function () {
        fn.apply(ctx, args);
      }, delay);
    };
  }

  function throttle(fn, limit) {
    let inThrottle;
    return function () {
      if (!inThrottle) {
        fn.apply(this, arguments);
        inThrottle = true;
        setTimeout(function () {
          inThrottle = false;
        }, limit);
      }
    };
  }

  function idle(cb) {
    if ("requestIdleCallback" in window) {
      requestIdleCallback(cb, { timeout: 1000 });
    } else {
      setTimeout(cb, 200);
    }
  }

  function lazyImages() {
    const imgs = document.querySelectorAll("img[data-src]");
    if (!imgs.length) return;

    const obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.src = img.getAttribute("data-src");
          img.removeAttribute("data-src");
          obs.unobserve(img);
        }
      });
    }, { rootMargin: "200px" });

    imgs.forEach(function (img) {
      obs.observe(img);
    });

    addObserver(obs);
  }

  function reduceReflows() {
    const result = document.getElementById("result");
    if (!result) return;

    const observer = new MutationObserver(debounce(function () {
      result.style.willChange = "transform, opacity";
      setTimeout(function () {
        result.style.willChange = "auto";
      }, 400);
    }, 100));

    observer.observe(result, {
      childList: true,
      subtree: true
    });

    addObserver(observer);
  }

  function cacheSelectors() {
    window.__SC_CACHE__ = {
      textarea: document.getElementById("text"),
      result: document.getElementById("result"),
      checkBtn: document.querySelector(".check"),
      email: document.getElementById("email")
    };
  }

  function optimizeScroll() {
    const handler = throttle(function () {
      const y = window.scrollY;

      if (y > 800) {
        document.body.style.setProperty("--scroll-depth", "deep");
      } else {
        document.body.style.setProperty("--scroll-depth", "shallow");
      }
    }, 120);

    on(window, "scroll", handler, { passive: true });
  }

  function optimizeInput() {
    const textarea = document.getElementById("text");
    if (!textarea) return;

    const handler = debounce(function () {
      textarea.dataset.len = textarea.value.length;
    }, 120);

    on(textarea, "input", handler);
  }

  function deferHeavyScripts() {
    const scripts = document.querySelectorAll("script[data-defer]");
    scripts.forEach(function (s) {
      idle(function () {
        const newScript = document.createElement("script");
        newScript.textContent = s.textContent;
        document.body.appendChild(newScript);
        s.remove();
      });
    });
  }

  function reduceLayoutThrash() {
    const elements = document.querySelectorAll(".preview-card, .result-card, .container");

    elements.forEach(function (el) {
      el.style.transform = "translateZ(0)";
      el.style.backfaceVisibility = "hidden";
    });
  }

  function idleCleanup() {
    idle(function () {
      disconnectObservers();
      clearTimers();
    });
  }

  function monitorMemory() {
    if (!("performance" in window) || !performance.memory) return;

    const check = function () {
      const mem = performance.memory.usedJSHeapSize;

      if (mem > 200000000) {
        disconnectObservers();
      }
    };

    const t = setInterval(check, 5000);
    addTimer(t);
  }

  function batchDOMUpdates() {
    const queue = [];
    let scheduled = false;

    window.__SC_BATCH__ = function (fn) {
      queue.push(fn);

      if (!scheduled) {
        scheduled = true;

        requestAnimationFrame(function () {
          const fragment = document.createDocumentFragment();

          queue.forEach(function (f) {
            f(fragment);
          });

          queue.length = 0;
          scheduled = false;
        });
      }
    };
  }

  function init() {
    cacheSelectors();
    lazyImages();
    reduceReflows();
    optimizeScroll();
    optimizeInput();
    deferHeavyScripts();
    reduceLayoutThrash();
    idleCleanup();
    monitorMemory();
    batchDOMUpdates();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  window.addEventListener("beforeunload", function () {
    offAll();
    disconnectObservers();
    clearTimers();
  });

})();
</script>

<script>
(function () {
  const SEO_ENHANCER = {
    initialized: false,
    faqInjected: false,
    schemaInjected: false,
    examplesInjected: false,
    headingsTuned: false,
    relatedTuned: false,
    bridgeTuned: false,
    cardsTuned: false,
    observations: []
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function qs(sel, root) {
    return (root || document).querySelector(sel);
  }

  function qsa(sel, root) {
    return Array.from((root || document).querySelectorAll(sel));
  }

  function normalize(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .replace(/[–—]/g, "-")
      .trim();
  }

  function lower(value) {
    return normalize(value).toLowerCase();
  }

  function cap(value) {
    const v = normalize(value);
    return v ? v.charAt(0).toUpperCase() + v.slice(1) : "";
  }

  function safeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function cleanBaseKeyword(keyword) {
    return normalize(keyword)
      .replace(/^\s*is\s+/i, "")
      .replace(/^\s*can\s+i\s+trust\s+/i, "")
      .replace(/^\s*did\s+i\s+get\s+scammed\s+(?:by|on|with)\s+/i, "")
      .replace(/\s+a\s+scam$/i, "")
      .replace(/\s+or\s+legit$/i, "")
      .replace(/\s+or\s+scam$/i, "")
      .replace(/\s+legit$/i, "")
      .replace(/\s+real$/i, "")
      .replace(/\s+safe$/i, "")
      .replace(/\s+scam$/i, "")
      .replace(/\s+a$/i, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function cleanSentenceKeyword(keyword) {
    return cleanBaseKeyword(keyword)
      .replace(/\bmessage\b/gi, "")
      .replace(/\bmessages\b/gi, "")
      .replace(/\bemail\b/gi, "")
      .replace(/\bemails\b/gi, "")
      .replace(/\btext\b/gi, "")
      .replace(/\btexts\b/gi, "")
      .replace(/\blink\b/gi, "")
      .replace(/\blinks\b/gi, "")
      .replace(/\bwebsite\b/gi, "")
      .replace(/\bwebsites\b/gi, "")
      .replace(/\balert\b/gi, "")
      .replace(/\balerts\b/gi, "")
      .replace(/\bwarning\b/gi, "")
      .replace(/\bwarnings\b/gi, "")
      .replace(/\bnotification\b/gi, "")
      .replace(/\bnotifications\b/gi, "")
      .replace(/\brequest\b/gi, "")
      .replace(/\brequests\b/gi, "")
      .replace(/\boffer\b/gi, "")
      .replace(/\boffers\b/gi, "")
      .replace(/\bscam\b/gi, "")
      .replace(/\bscams\b/gi, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function includesAny(text, terms) {
    return terms.some(function (term) {
      return text.indexOf(String(term).toLowerCase()) !== -1;
    });
  }

  function detectIntent(keywordRaw) {
    const value = lower(keywordRaw);

    if (includesAny(value, ["job", "recruiter", "interview", "hiring", "onboarding"])) {
      return "job";
    }

    if (includesAny(value, ["crypto", "bitcoin", "ethereum", "wallet", "airdrop", "nft", "seed phrase", "metamask"])) {
      return "crypto";
    }

    if (includesAny(value, ["delivery", "usps", "ups", "fedex", "package", "shipment", "parcel", "tracking"])) {
      return "delivery";
    }

    if (includesAny(value, ["bank", "paypal", "venmo", "zelle", "cash app", "amazon", "refund", "payment", "account locked", "login alert", "verification code"])) {
      return "payments";
    }

    if (
      value.startsWith("how to ") ||
      value.startsWith("what to do after ") ||
      value.startsWith("how to recover after ") ||
      value.startsWith("how to secure ") ||
      value.startsWith("how to block ") ||
      value.startsWith("how to avoid ") ||
      value.startsWith("what happens after ") ||
      value.startsWith("what is ") ||
      value.startsWith("why ") ||
      value.startsWith("when ") ||
      value.startsWith("where ") ||
      value.startsWith("who ")
    ) {
      return "guidance";
    }

    return "general";
  }

  function extractBrand(keywordRaw) {
    const value = lower(keywordRaw);
    const brands = [
      "usps","ups","fedex","paypal","venmo","zelle","cash app","amazon","apple","google","microsoft",
      "bank of america","chase","wells fargo","td bank","citibank","capital one","coinbase","metamask",
      "binance","kraken","telegram","whatsapp","snapchat","facebook","instagram","linkedin"
    ];

    const hit = brands.find(function (brand) {
      return value.indexOf(brand) !== -1;
    });

    return hit ? cap(hit) : "";
  }

  function buildFaqItems(keywordRaw) {
    const intent = detectIntent(keywordRaw);
    const clean = cap(cleanBaseKeyword(keywordRaw) || keywordRaw || "this message");
    const brand = extractBrand(keywordRaw);

    if (intent === "job") {
      return [
        {
          q: "Is " + clean + " likely a job scam?",
          a: "It may be a scam if it skips real interviews, asks for money, requests ID documents too early, or pressures you to move fast without verifying the employer."
        },
        {
          q: "What are the biggest red flags in job scam messages?",
          a: "Common red flags include fake recruiters, urgent onboarding, personal document requests, direct deposit details, gift cards, crypto, and equipment fees."
        },
        {
          q: "What should I do before replying to a recruiter message?",
          a: "Check the company site, verify the recruiter on official channels, confirm the domain, and avoid sending sensitive information until the job process is verified."
        },
        {
          q: "Do real employers ask for payment during hiring?",
          a: "Legitimate employers generally do not ask candidates to pay for equipment, training, background checks, or setup fees through messages."
        }
      ];
    }

    if (intent === "crypto") {
      return [
        {

  function removeOldFaqSchema() {

  function injectRealFake() {

        <div class="real-side fake">

            ${data.fake.map(function (item) {

            }).join("")}

    section.insertBefore(wrap, relatedHeading.parentNode);
    SEO_ENHANCER.realFakeInjected = true;

  function tuneMainHeading() {
    if (SEO_ENHANCER.headingsTuned) return;

    const h1 = byId("heroKeyword");

    if (intent === "payments") {

    } else if (intent === "delivery") {

    } else if (intent === "job") {
      h2.textContent = clean + " Job Scam Signs, Hiring Red Flags, and What to Check";
    } else if (intent === "crypto") {
      h2.textContent = clean + " Crypto Scam Signs, Wallet Red Flags, and What to Avoid";
    } else if (intent === "guidance") {
      h2.textContent = clean + " Scam Warning Signs, Verification Steps, and Safer Responses";
    } else {
      h2.textContent = clean + " Scam Warning Signs, Real vs Fake Signals, and What to Do";
    }

    SEO_ENHANCER.headingsTuned = true;
  }

  function tuneBridge() {
    if (SEO_ENHANCER.bridgeTuned) return;

    const bridge = byId("contentBridge");
    if (!bridge) return;

    const raw = normalize(window.RAW_KEYWORD || "");
    const clean = cap(cleanSentenceKeyword(raw) || cleanBaseKeyword(raw) || raw || "this message");
    const intent = detectIntent(raw);

    if (intent === "job") {
      bridge.textContent = "If this " + clean + " just showed up, compare it against common hiring scam patterns before replying, sending documents, or sharing payment information.";
    } else if (intent === "crypto") {
      bridge.textContent = "If this " + clean + " just showed up, pause before connecting a wallet, approving anything, or moving funds. Crypto scams often become irreversible fast.";
    } else if (intent === "delivery") {
      bridge.textContent = "If this " + clean + " just showed up, verify the shipment through the official carrier site or app before clicking links or entering any payment details.";
    } else if (intent === "payments") {
      bridge.textContent = "If this " + clean + " just showed up, check the real account directly before clicking, logging in, sharing a code, or responding to the message.";
    } else {
      bridge.textContent = "If this " + clean + " just showed up, compare the sender, request, urgency, and next step before you click, reply, pay, or share personal information.";
    }

    SEO_ENHANCER.bridgeTuned = true;
  }

  function tuneRelatedLinks() {
    if (SEO_ENHANCER.relatedTuned) return;

    const relatedHeading = byId("relatedHeading");
    const moreLinksHeading = byId("moreLinksHeading");

    if (relatedHeading) {
      relatedHeading.textContent = "Similar Scam Checks";
    }

    if (moreLinksHeading) {
      moreLinksHeading.textContent = "More Pages Like This";
    }

    qsa("#relatedLinks a, #moreLinks a").forEach(function (a) {
      const text = normalize(a.textContent || "");
      a.textContent = text;

  function strengthenCards() {

    qsa(".story-card p").forEach(function (p) {

  function observeSeoArea() {

    const observer = new MutationObserver(function () {

    observer.observe(seo, {
      childList: true,
      subtree: true
    });

    SEO_ENHANCER.observations.push(observer);
  }

  function init() {
    if (SEO_ENHANCER.initialized) return;
    SEO_ENHANCER.initialized = true;

    injectFaqSchema();
    injectFaqCard();
    injectExamples();
    injectRealFake();
    tuneMainHeading();
    tuneBridge();
    tuneRelatedLinks();
    strengthenCards();
    observeSeoArea();

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {

})();

<script>
(function () {
  const PAGE_POLISH = {
    started: false,
    polished: false,
    headingPolished: false,
    ctaPolished: false,
    previewPolished: false,
    resultPolished: false,
    footerPolished: false
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function qs(selector, root) {
    return (root || document).querySelector(selector);
  }

  function qsa(selector, root) {
    return Array.from((root || document).querySelectorAll(selector));
  }

  function normalize(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .replace(/[–—]/g, "-")
      .trim();
  }

  function lower(value) {
    return normalize(value).toLowerCase();
  }

  function cap(value) {
    const v = normalize(value);
    return v ? v.charAt(0).toUpperCase() + v.slice(1) : "";
  }

  function cleanBaseKeyword(keyword) {
    return normalize(keyword)
      .replace(/^\s*is\s+/i, "")
      .replace(/^\s*can\s+i\s+trust\s+/i, "")
      .replace(/^\s*did\s+i\s+get\s+scammed\s+(?:by|on|with)\s+/i, "")
      .replace(/\s+a\s+scam$/i, "")
      .replace(/\s+or\s+legit$/i, "")
      .replace(/\s+or\s+scam$/i, "")
      .replace(/\s+legit$/i, "")
      .replace(/\s+real$/i, "")
      .replace(/\s+safe$/i, "")
      .replace(/\s+scam$/i, "")
      .replace(/\s+a$/i, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function cleanSentenceKeyword(keyword) {
    return cleanBaseKeyword(keyword)
      .replace(/\bmessage\b/gi, "")
      .replace(/\bmessages\b/gi, "")
      .replace(/\bemail\b/gi, "")
      .replace(/\bemails\b/gi, "")
      .replace(/\btext\b/gi, "")
      .replace(/\btexts\b/gi, "")
      .replace(/\blink\b/gi, "")
      .replace(/\blinks\b/gi, "")
      .replace(/\bwebsite\b/gi, "")
      .replace(/\bwebsites\b/gi, "")
      .replace(/\balert\b/gi, "")
      .replace(/\balerts\b/gi, "")
      .replace(/\bwarning\b/gi, "")
      .replace(/\bwarnings\b/gi, "")
      .replace(/\bnotification\b/gi, "")
      .replace(/\bnotifications\b/gi, "")
      .replace(/\brequest\b/gi, "")
      .replace(/\brequests\b/gi, "")
      .replace(/\boffer\b/gi, "")
      .replace(/\boffers\b/gi, "")
      .replace(/\bscam\b/gi, "")
      .replace(/\bscams\b/gi, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function includesAny(text, terms) {
    return terms.some(function (term) {
      return text.indexOf(String(term).toLowerCase()) !== -1;
    });
  }

  function detectIntent(keywordRaw) {
    const value = lower(keywordRaw);

    if (includesAny(value, ["job", "recruiter", "interview", "hiring", "onboarding"])) {
      return "job";
    }

    if (includesAny(value, ["crypto", "bitcoin", "ethereum", "wallet", "airdrop", "nft", "seed phrase", "metamask"])) {
      return "crypto";
    }

    if (includesAny(value, ["delivery", "usps", "ups", "fedex", "package", "shipment", "parcel", "tracking"])) {
      return "delivery";
    }

    if (includesAny(value, ["bank", "paypal", "venmo", "zelle", "cash app", "amazon", "refund", "payment", "account locked", "verification code"])) {
      return "payments";
    }

    if (
      value.startsWith("how to ") ||
      value.startsWith("what to do after ") ||
      value.startsWith("how to recover after ") ||
      value.startsWith("how to secure ") ||
      value.startsWith("how to block ") ||
      value.startsWith("how to avoid ") ||
      value.startsWith("what happens after ") ||
      value.startsWith("what is ") ||
      value.startsWith("why ") ||
      value.startsWith("when ") ||
      value.startsWith("where ") ||
      value.startsWith("who ")
    ) {
      return "guidance";
    }

    return "general";
  }

  function getKeywordData() {
    const raw = normalize(window.RAW_KEYWORD || "");
    const clean = cap(cleanBaseKeyword(raw) || raw || "this message");
    const sentence = cap(cleanSentenceKeyword(raw) || cleanBaseKeyword(raw) || raw || "this message");
    const intent = detectIntent(raw);

    return {
      raw: raw,
      clean: clean,
      sentence: sentence,
      intent: intent
    };
  }

  function polishHero() {
    if (PAGE_POLISH.headingPolished) return;

    const hero = qs(".hero");
    const heroSub = byId("heroSubheading");
    const badgeRow = qs(".hero-badge-row");
    if (!hero || !heroSub || !badgeRow) return;

    const data = getKeywordData();

    if (data.intent === "job") {
      heroSub.textContent = "Review suspicious recruiter messages, hiring texts, interview invites, and onboarding requests before you reply, send documents, or pay anything.";
    } else if (data.intent === "crypto") {
      heroSub.textContent = "Review suspicious wallet prompts, support messages, token offers, and crypto alerts before you connect, approve, send funds, or share recovery details.";
    } else if (data.intent === "delivery") {
      heroSub.textContent = "Review suspicious delivery texts, package alerts, tracking links, and customs notices before you click, confirm details, or pay a redelivery fee.";
    } else if (data.intent === "payments") {
      heroSub.textContent = "Review suspicious bank alerts, refund notices, payment messages, and account warnings before you log in, share a code, reply, or send money.";
    } else if (data.intent === "guidance") {
      heroSub.textContent = "Use the checker below to compare suspicious messages, links, and requests against common scam patterns before you trust them.";
    } else {
      heroSub.textContent = "Paste the suspicious message, email, text, website, or request below to compare it against common scam signals before you act.";
    }

    if (!qs(".hero-extended", hero)) {
      const extra = document.createElement("div");
      extra.className = "hero-extended";

      extra.innerHTML = `
        <div class="hero-extended-card">
          <span class="hero-extended-icon">⚠️</span>
          <div class="hero-extended-title">Fast pattern match</div>
          <div class="hero-extended-copy">Compare suspicious wording, urgency, links, and pressure against common scam setups.</div>
        </div>
        <div class="hero-extended-card">
          <span class="hero-extended-icon">🛡️</span>
          <div class="hero-extended-title">Safer next step</div>
          <div class="hero-extended-copy">Know whether to ignore it, verify it, or stop before clicking, replying, logging in, or paying.</div>
        </div>
        <div class="hero-extended-card">
          <span class="hero-extended-icon">📲</span>
          <div class="hero-extended-title">Built for repeats</div>
          <div class="hero-extended-copy">Scam attempts often come in waves, so this page is designed for the next suspicious message too.</div>
        </div>
      `;

      hero.appendChild(extra);
    }

    const currentBadges = qsa(".hero-badge", badgeRow);
    if (currentBadges.length >= 3) {
      currentBadges[0].textContent = "Fast scam pattern match";
      currentBadges[1].textContent = "Safer next-step guidance";
      currentBadges[2].textContent = "Built for repeat checks";
    }

    PAGE_POLISH.headingPolished = true;
  }

  function polishPreviewCard() {
    if (PAGE_POLISH.previewPolished) return;

    const systemBadge = qs(".system-badge");
    const previewSub = byId("previewSub");
    const previewBadge = byId("previewBadge");
    const previewScore = byId("previewScore");
    if (!systemBadge || !previewSub || !previewBadge || !previewScore) return;

    const data = getKeywordData();

    systemBadge.textContent = "Pattern preview based on common scam setups";

    if (data.intent === "job") {
      previewBadge.textContent = "🔴 Job Scam Pattern";
      previewScore.textContent = "High-pressure hiring pattern";
      previewSub.textContent = "Common signals found in suspicious recruiter and onboarding messages";
    } else if (data.intent === "crypto") {
      previewBadge.textContent = "🔴 Crypto Scam Pattern";
      previewScore.textContent = "High-risk wallet pattern";
      previewSub.textContent = "Common signals found in suspicious wallet, support, and token messages";
    } else if (data.intent === "delivery") {
      previewBadge.textContent = "🔴 Delivery Scam Pattern";
      previewScore.textContent = "Fake tracking pattern";
      previewSub.textContent = "Common signals found in suspicious shipping and package alerts";
    } else if (data.intent === "payments") {
      previewBadge.textContent = "🔴 Payment Scam Pattern";
      previewScore.textContent = "Account alert pattern";
      previewSub.textContent = "Common signals found in suspicious refund, verification, and login alerts";
    } else if (data.intent === "guidance") {
      previewBadge.textContent = "🔴 Scam Risk Pattern";
      previewScore.textContent = "Verification needed";
      previewSub.textContent = "Common signals that usually appear before a suspicious request turns risky";
    } else {
      previewBadge.textContent = "🔴 Example Scam Pattern";
      previewScore.textContent = "Suspicious request pattern";
      previewSub.textContent = "Common signals found in suspicious messages like this";
    }

    PAGE_POLISH.previewPolished = true;
  }

  function polishCTA() {
    if (PAGE_POLISH.ctaPolished) return;

    const appCard = qs(".app-link-card");
    const appCardTitle = qs(".app-link-card h4");
    const appCardCopy = qs(".app-link-card p");
    const appButton = qs(".app-link-button");
    const checkButton = qs(".check");
    if (!appCard || !appCardTitle || !appCardCopy || !appButton || !checkButton) return;

    appCardTitle.textContent = "Keep checking suspicious messages before they cost you";
    appCardCopy.textContent = "Scam attempts usually do not stop at one. Use the app for the next delivery text, account alert, recruiter message, payment warning, or link that feels off.";
    appButton.textContent = "Get the App for Faster Checks";

    checkButton.textContent = "🔍 Check Scam Signals Now";

    if (!qs(".notice-bar", appCard.parentNode)) {
      const notice = document.createElement("div");
      notice.className = "notice-bar warning";
      notice.textContent = "Most people do not lose money on the first suspicious message. The risk grows when similar messages keep coming.";
      appCard.insertAdjacentElement("afterend", notice);
    }

    PAGE_POLISH.ctaPolished = true;
  }

  function polishResultArea() {
    if (PAGE_POLISH.resultPolished) return;

    const result = byId("result");
    if (!result) return;

    const observer = new MutationObserver(function () {
      const card = qs(".result-card", result);
      if (!card) return;

      if (!qs(".result-insight", card)) {
        const riskEl = qs(".risk", card);
        const riskText = normalize(riskEl ? riskEl.textContent : "").toLowerCase();

        let riskClass = "medium";
        let title = "Why this matters";
        let copy = "Suspicious messages often work because the risky part appears only after the message gets your attention.";

        if (riskText.indexOf("high") !== -1) {
          riskClass = "high";
          title = "Why this is dangerous";
          copy = "High-risk messages often combine urgency, impersonation, and a push to click, pay, log in, or share information before you verify anything.";
        } else if (riskText.indexOf("low") !== -1) {
          riskClass = "low";
          title = "Why you should still verify";
          copy = "Even lower-risk messages can become more dangerous when later versions ask for a login, code, payment, or fast action.";
        }

        const wrap = document.createElement("div");
        wrap.className = "result-extended";
        wrap.innerHTML = `
          <div class="result-insight ${riskClass}">
            <div class="result-insight-title">${title}</div>
            <div class="result-insight-copy">${copy}</div>
          </div>
        `;

        const payline = qs(".result-payline", card);
        if (payline) {
          payline.insertAdjacentElement("beforebegin", wrap);
        }
      }

      const cta = qs(".result-cta", card);
      if (cta) {
        cta.textContent = "🔁 Check Another Suspicious Message";
      }
    });

    observer.observe(result, {
      childList: true,
      subtree: true
    });

    PAGE_POLISH.resultPolished = true;
  }

  function polishFooter() {
    if (PAGE_POLISH.footerPolished) return;

    const footer = qs(".footer");
    if (!footer) return;

    const blocks = qsa("div", footer);
    if (blocks.length >= 2) {
      blocks[0].innerHTML = `
        By using this website you agree to our
        <a href="https://verixiaapps.com/website-policies/scam-check/" target="_blank" rel="noopener noreferrer">Terms and Privacy Policy</a>.
        Always verify suspicious messages through official sources before taking action.
      `;
      blocks[1].textContent = "Scam Check Now © 2026 • Scam detection, risk analysis, and safer response guidance";
    }

    PAGE_POLISH.footerPolished = true;
  }

  function polishContentSpacing() {
    qsa(".content-section p, .content-section li, .story-card p").forEach(function (el) {
      el.textContent = normalize(el.textContent || "");
    });

    qsa(".story-card").forEach(function (card, index) {
      card.style.scrollMarginTop = "110px";
      if (index === 0) {
        card.style.boxShadow = "0 20px 48px rgba(2,6,23,.24)";
      }
    });
  }

  function polishPageMeta() {
    const canonical = qs('link[rel="canonical"]');
    if (canonical) {
      canonical.setAttribute("href", normalize(canonical.getAttribute("href") || ""));
    }

    qsa('meta[property="og:title"], meta[name="twitter:title"]').forEach(function (meta) {
      meta.setAttribute("content", normalize(meta.getAttribute("content") || ""));
    });

    qsa('meta[property="og:description"], meta[name="twitter:description"], meta[name="description"]').forEach(function (meta) {
      meta.setAttribute("content", normalize(meta.getAttribute("content") || ""));
    });
  }

  function addScrollAids() {
    const contentSection = qs(".content-section");
    if (!contentSection || qs(".trust-bar", contentSection)) return;

    const bar = document.createElement("div");
    bar.className = "trust-bar";
    bar.innerHTML = `
      <div class="trust-chip">Pause before you click</div>
      <div class="trust-chip">Verify outside the message</div>
      <div class="trust-chip">Do not send codes</div>
      <div class="trust-chip">Do not rush payments</div>
    `;

    contentSection.insertBefore(bar, contentSection.firstChild.nextSibling);
  }

  function init() {
    if (PAGE_POLISH.started) return;
    PAGE_POLISH.started = true;

    polishHero();
    polishPreviewCard();
    polishCTA();
    polishResultArea();
    polishFooter();
    polishContentSpacing();
    polishPageMeta();
    addScrollAids();

    PAGE_POLISH.polished = true;
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<script>
(function () {
  const TEMPLATE_B_95 = {
    started: false,
    mounted: false,
    riskMap: {
      job: "high",
      crypto: "high",
      delivery: "medium",
      payments: "high",
      guidance: "medium",
      general: "medium"
    }
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function qs(selector, root) {
    return (root || document).querySelector(selector);
  }

  function qsa(selector, root) {
    return Array.from((root || document).querySelectorAll(selector));
  }

  function normalize(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .replace(/[–—]/g, "-")
      .trim();
  }

  function lower(value) {
    return normalize(value).toLowerCase();
  }

  function safeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function cap(value) {
    const v = normalize(value);
    return v ? v.charAt(0).toUpperCase() + v.slice(1) : "";
  }

  function includesAny(text, arr) {
    return arr.some(function (item) {
      return text.indexOf(String(item).toLowerCase()) !== -1;
    });
  }

  function cleanBaseKeyword(keyword) {
    return normalize(keyword)
      .replace(/^\s*is\s+/i, "")
      .replace(/^\s*can\s+i\s+trust\s+/i, "")
      .replace(/^\s*did\s+i\s+get\s+scammed\s+(?:by|on|with)\s+/i, "")
      .replace(/\s+a\s+scam$/i, "")
      .replace(/\s+or\s+legit$/i, "")
      .replace(/\s+or\s+scam$/i, "")
      .replace(/\s+legit$/i, "")
      .replace(/\s+real$/i, "")
      .replace(/\s+safe$/i, "")
      .replace(/\s+scam$/i, "")
      .replace(/\s+a$/i, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function detectIntent(keywordRaw) {
    const text = lower(keywordRaw);

    if (includesAny(text, ["job", "recruiter", "interview", "hiring", "onboarding"])) return "job";
    if (includesAny(text, ["crypto", "bitcoin", "ethereum", "wallet", "airdrop", "nft", "seed phrase", "metamask"])) return "crypto";
    if (includesAny(text, ["delivery", "usps", "ups", "fedex", "package", "shipment", "parcel", "tracking"])) return "delivery";
    if (includesAny(text, ["bank", "paypal", "venmo", "zelle", "cash app", "amazon", "refund", "payment", "verification code", "account locked"])) return "payments";

    if (
      text.startsWith("how to ") ||
      text.startsWith("what to do after ") ||
      text.startsWith("how to recover after ") ||
      text.startsWith("how to secure ") ||
      text.startsWith("how to block ") ||
      text.startsWith("how to avoid ") ||
      text.startsWith("what happens after ") ||
      text.startsWith("what is ") ||
      text.startsWith("why ") ||
      text.startsWith("when ") ||
      text.startsWith("where ") ||
      text.startsWith("who ")
    ) {
      return "guidance";
    }

    return "general";
  }

  function buildRiskSummary(keywordRaw) {
    const intent = detectIntent(keywordRaw);
    const clean = cap(cleanBaseKeyword(keywordRaw) || keywordRaw || "this message");

    if (intent === "job") {
      return {
        title: clean + " follows patterns often seen in fake recruiter and onboarding scams.",
        copy: "These scams usually try to speed past normal hiring steps and move straight into identity, banking, or payment requests before you can verify the company."
      };
    }

    if (intent === "crypto") {
      return {
        title: clean + " follows patterns often seen in urgent wallet and token scams.",
        copy: "These scams usually try to trigger wallet approvals, recovery phrase theft, fake support steps, or transfers that cannot be reversed once completed."
      };
    }

    if (intent === "delivery") {
      return {
        title: clean + " follows patterns often seen in fake tracking and delivery payment scams.",
        copy: "These scams work by making a routine shipment problem feel urgent enough that people click a link or enter card details before checking the real carrier."
      };
    }

    if (intent === "payments") {
      return {
        title: clean + " follows patterns often seen in fake account, refund, and payment alerts.",
        copy: "These scams often rely on panic, fake logins, and code requests to push people into handing over account access or approving a fraudulent payment step."
      };
    }

    if (intent === "guidance") {
      return {
        title: clean + " should be checked against sender, link, urgency, and requested action before you trust it.",
        copy: "Most scam attempts feel normal at first. The risk usually becomes obvious only once the message pushes you to act before verifying it independently."
      };
    }

    return {
      title: clean + " matches common scam structure when urgency, links, money pressure, or account requests appear together.",
      copy: "The safest move is to verify outside the original message and assume the request is untrusted until the source, link, and purpose all check out."
    };
  }

  function buildTrustMatrix(keywordRaw) {
    const intent = detectIntent(keywordRaw);

    if (intent === "job") {
      return [
        ["Normal hiring flow", "Real interviews, verified recruiter identity, clear role details, no payment request."],
        ["Suspicious hiring flow", "Instant offer, rushed onboarding, off-platform move, document or payment request too early."],
        ["Most important check", "Verify the recruiter and company outside the original message before sending anything."],
        ["Highest-risk action", "Sending ID, bank details, tax forms, or equipment money before the role is verified."]
      ];
    }

    if (intent === "crypto") {
      return [
        ["Normal wallet support", "Official help path, no seed phrase request, no rushed approvals."],
        ["Suspicious wallet support", "Emergency support, claim deadline, asset recovery promise, wallet connection prompt."],
        ["Most important check", "Use the official wallet or exchange app only, never the message link."],
        ["Highest-risk action", "Approving a transaction or sharing a recovery phrase."]
      ];
    }

    if (intent === "delivery") {
      return [
        ["Normal delivery issue", "Verify through the carrier app or official site without trusting the message itself."],
        ["Suspicious delivery issue", "Link-first alert, small payment request, urgent customs or redelivery claim."],
        ["Most important check", "Check tracking independently through the real carrier page."],
        ["Highest-risk action", "Entering card details or login information on the linked page."]
      ];
    }

    if (intent === "payments") {
      return [
        ["Normal account alert", "You can confirm it directly in the official app or website."],
        ["Suspicious account alert", "Message demands login, code entry, refund claim, or urgent verification."],
        ["Most important check", "Open the real app manually and check for alerts there."],
        ["Highest-risk action", "Using the original login link or sharing a code from the message."]
      ];
    }

    return [
      ["Normal request", "Can be checked independently without trusting the message itself."],
      ["Suspicious request", "Pushes fast action before you verify sender, link, or purpose."],
      ["Most important check", "Compare the request against an official source outside the message."],
      ["Highest-risk action", "Clicking, logging in, paying, or sending codes under pressure."]
    ];
  }

  function injectRiskStrip() {
    if (byId("dynamicRiskStrip")) return;

    const hero = qs(".hero");
    if (!hero) return;

    const info = buildRiskSummary(window.RAW_KEYWORD || "");
    const intent = detectIntent(window.RAW_KEYWORD || "");
    const risk = TEMPLATE_B_95.riskMap[intent] || "medium";

    const section = document.createElement("section");
    section.id = "dynamicRiskStrip";
    section.style.marginTop = "22px";
    section.style.display = "grid";
    section.style.gap = "12px";

    section.innerHTML = `
      <div class="highlight-box">
        <strong>${safeHtml(info.title)}</strong> ${safeHtml(info.copy)}
      </div>
      <div class="multi-column">
        <div class="multi-card">
          <div class="multi-card-title">Likely risk level</div>
          <div class="multi-card-copy">${safeHtml(cap(risk))} risk patterns are more consistent with this topic.</div>
        </div>
        <div class="multi-card">
          <div class="multi-card-title">Best immediate move</div>
          <div class="multi-card-copy">Pause, verify independently, and avoid clicking links, logging in, sending money, or sharing codes until checked.</div>
        </div>
      </div>
    `;

    hero.appendChild(section);
  }

  function injectTrustMatrix() {
    if (byId("dynamicTrustMatrix")) return;

    const contentSection = qs(".content-section");
    const close = qs(".content-close");
    if (!contentSection || !close) return;

    const rows = buildTrustMatrix(window.RAW_KEYWORD || "");
    const wrap = document.createElement("section");
    wrap.id = "dynamicTrustMatrix";
    wrap.className = "section-deep";

    wrap.innerHTML = `
      <div class="section-deep-title">What to Compare Before You Trust It</div>
      <div class="section-deep-sub">This quick comparison helps you separate a routine message from one that is trying to move you into a risky step too quickly.</div>
      <div class="section-grid">
        ${rows.map(function (row) {
          return `
            <div class="section-card">
              <div class="section-card-title">${safeHtml(row[0])}</div>
              <div class="section-card-copy">${safeHtml(row[1])}</div>
            </div>
          `;
        }).join("")}
      </div>
      <div class="section-footer">
        The most reliable signal is not how polished the message looks. <strong>The most reliable signal is whether you can verify the request safely outside the message.</strong>
      </div>
    `;

    contentSection.insertBefore(wrap, close);
  }

  function retitleButtons() {
    qsa("button.plan").forEach(function (btn, index) {
      if (index === 0) btn.textContent = "Weekly Protection Plan";
      if (index === 1) btn.textContent = "Monthly Protection Plan";
      if (index === 2) btn.textContent = "Yearly Protection Plan";
    });

    const topUpgrade = qs(".upgrade-top");
    if (topUpgrade) {
      topUpgrade.textContent = "Unlock Checks";
    }
  }

  function tuneInputArea() {
    const noteEls = qsa(".tool-shell .note");
    const help = qs(".input-help");
    const email = byId("email");

    if (help) {
      help.textContent = "Paste the full message, link, or alert so the checker can compare wording, urgency, impersonation, and risky requests.";
    }

    if (noteEls[0]) {
      noteEls[0].textContent = "1 free check • no signup needed • built for suspicious texts, emails, links, and payment alerts";
    }

    if (email) {
      email.placeholder = "Already subscribed? Enter the checkout email to unlock unlimited scam checks";
    }
  }

  function addSectionAnchors() {
    qsa(".content-section h2, .content-section h3").forEach(function (heading, index) {
      if (!heading.id) {
        heading.id = "section-anchor-" + (index + 1);
      }
    });
  }

  function normalizeLinkLists() {
    qsa("#relatedLinks li a, #moreLinks li a").forEach(function (a) {
      const txt = normalize(a.textContent || "");
      a.textContent = txt;
      a.setAttribute("aria-label", txt);
    });
  }

  function boostShareCopy() {
    const observer = new MutationObserver(function () {
      const copy = qs(".share-copy");
      const alert = qs(".share-alert");
      const warnBtn = qs(".share-btn.primary");

      if (alert) {
        alert.textContent = "⚠️ Scam messages often hit multiple people with the same script";
      }

      if (copy) {
        copy.textContent = "Know someone who could receive the same message? Send this page before they click, reply, log in, or pay.";
      }

      if (warnBtn) {
        warnBtn.textContent = "⚠️ Copy Warning Message";
      }
    });

    const result = byId("result");
    if (result) {
      observer.observe(result, { childList: true, subtree: true });
    }
  }

  function boostResultFallbacks() {
    const observer = new MutationObserver(function () {
      const cards = qsa(".result-card");
      cards.forEach(function (card) {
        const summary = qs(".result-summary", card);
        const action = qs(".action-box", card);

        if (summary) {
          summary.textContent = normalize(summary.textContent || "");
        }

        if (action) {
          action.textContent = normalize(action.textContent || "");
        }
      });
    });

    const result = byId("result");
    if (result) {
      observer.observe(result, { childList: true, subtree: true });
    }
  }

  function polishContentCards() {
    qsa(".story-card").forEach(function (card, index) {
      card.style.position = "relative";
      card.style.overflow = "hidden";

      if (!qs(".story-card-index", card)) {
        const label = document.createElement("div");
        label.className = "story-card-index";
        label.style.position = "absolute";
        label.style.top = "14px";
        label.style.right = "14px";
        label.style.fontSize = "11px";
        label.style.fontWeight = "900";
        label.style.letterSpacing = ".08em";
        label.style.textTransform = "uppercase";
        label.style.color = "#9cecff";
        label.textContent = "Part " + (index + 1);
        card.appendChild(label);
      }
    });
  }

  function injectNoticeBand() {
    if (byId("dynamicNoticeBand")) return;

    const container = qs(".container");
    const appCard = qs(".app-link-card");
    if (!container || !appCard) return;

    const band = document.createElement("div");
    band.id = "dynamicNoticeBand";
    band.className = "notice-bar critical";
    band.textContent = "Never trust urgency alone. Real companies, carriers, banks, and platforms can still be verified safely outside the original message.";
    appCard.insertAdjacentElement("beforebegin", band);
  }

  function init() {
    if (TEMPLATE_B_95.started) return;
    TEMPLATE_B_95.started = true;

    injectRiskStrip();
    injectTrustMatrix();
    retitleButtons();
    tuneInputArea();
    addSectionAnchors();
    normalizeLinkLists();
    boostShareCopy();
    boostResultFallbacks();
    polishContentCards();
    injectNoticeBand();

    TEMPLATE_B_95.mounted = true;
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<script>
(function () {
  const ACCESSIBILITY_AND_FINISH = {
    initDone: false,
    liveRegionId: "scam-check-live-region"
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function qs(selector, root) {
    return (root || document).querySelector(selector);
  }

  function qsa(selector, root) {
    return Array.from((root || document).querySelectorAll(selector));
  }

  function normalize(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function createLiveRegion() {
    if (byId(ACCESSIBILITY_AND_FINISH.liveRegionId)) return;

    const live = document.createElement("div");
    live.id = ACCESSIBILITY_AND_FINISH.liveRegionId;
    live.setAttribute("aria-live", "polite");
    live.setAttribute("aria-atomic", "true");
    live.style.position = "absolute";
    live.style.left = "-9999px";
    live.style.width = "1px";
    live.style.height = "1px";
    live.style.overflow = "hidden";
    document.body.appendChild(live);
  }

  function announce(message) {
    const live = byId(ACCESSIBILITY_AND_FINISH.liveRegionId);
    if (!live) return;
    live.textContent = "";
    setTimeout(function () {
      live.textContent = message;
    }, 40);
  }

  function improveButtons() {
    qsa("button").forEach(function (btn) {
      const label = normalize(btn.textContent || "");
      if (label && !btn.getAttribute("aria-label")) {
        btn.setAttribute("aria-label", label);
      }
    });

    qsa("a").forEach(function (link) {
      const label = normalize(link.textContent || "");
      if (label && !link.getAttribute("aria-label")) {
        link.setAttribute("aria-label", label);
      }
    });
  }

  function improveInputs() {
    const textarea = byId("text");
    const email = byId("email");

    if (textarea) {
      textarea.setAttribute("aria-label", "Paste suspicious message or link");
      textarea.setAttribute("spellcheck", "false");
      textarea.setAttribute("autocomplete", "off");
      textarea.setAttribute("autocapitalize", "off");
      textarea.setAttribute("autocorrect", "off");
    }

    if (email) {
      email.setAttribute("aria-label", "Subscriber email");
      email.setAttribute("inputmode", "email");
      email.setAttribute("autocomplete", "email");
    }
  }

  function improveResultRegion() {
    const result = byId("result");
    if (!result) return;

    result.setAttribute("role", "region");
    result.setAttribute("aria-label", "Scam analysis result");

    const observer = new MutationObserver(function () {
      const card = qs(".result-card", result);
      if (!card) return;

      const risk = qs(".risk", card);
      const riskText = normalize(risk ? risk.textContent : "Analysis updated");
      announce(riskText);
    });

    observer.observe(result, {
      childList: true,
      subtree: true
    });
  }

  function improveDetails() {
    qsa("details").forEach(function (detail, index) {
      const summary = qs("summary", detail);
      if (summary && !summary.id) {
        summary.id = "faq-summary-" + (index + 1);
      }
    });
  }

  function addSkipLink() {
    if (byId("skipToChecker")) return;

    const link = document.createElement("a");
    link.id = "skipToChecker";
    link.href = "#text";
    link.textContent = "Skip to checker";
    link.style.position = "absolute";
    link.style.left = "-9999px";
    link.style.top = "0";
    link.style.zIndex = "10001";
    link.style.padding = "10px 14px";
    link.style.borderRadius = "12px";
    link.style.background = "#fff";
    link.style.color = "#111827";
    link.style.fontWeight = "900";

<script>
(function () {
  const PERFORMANCE_AND_RESILIENCE = {
    initialized: false,
    idleCallbacks: [],
    observers: []
  };

  function qs(selector, root) {
    return (root || document).querySelector(selector);
  }

  function qsa(selector, root) {
    return Array.from((root || document).querySelectorAll(selector));
  }

  function safeText(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function runIdle(fn) {
    if ("requestIdleCallback" in window) {
      window.requestIdleCallback(fn, { timeout: 1200 });
    } else {
      setTimeout(fn, 300);
    }
  }

  function throttle(fn, limit) {
    let inThrottle;
    return function () {
      if (!inThrottle) {
        fn.apply(this, arguments);
        inThrottle = true;
        setTimeout(function () {
          inThrottle = false;
        }, limit);
      }
    };
  }

  function debounce(fn, delay) {
    let t;
    return function () {
      clearTimeout(t);
      const args = arguments;
      t = setTimeout(function () {
        fn.apply(null, args);
      }, delay);
    };
  }

  function lazyLoadExternalLinks() {
    const links = qsa("a[target='_blank']");
    links.forEach(function (link) {
      if (!link.getAttribute("rel")) {
        link.setAttribute("rel", "noopener noreferrer");
      }
    });
  }

  function optimizeImages() {
    qsa("img").forEach(function (img) {
      if (!img.getAttribute("loading")) {
        img.setAttribute("loading", "lazy");
      }
      if (!img.getAttribute("decoding")) {
        img.setAttribute("decoding", "async");
      }
    });
  }

  function reduceLayoutThrash() {
    const resizeHandler = debounce(function () {
      document.documentElement.style.setProperty("--vh", window.innerHeight * 0.01 + "px");
    }, 150);

    window.addEventListener("resize", resizeHandler);
    resizeHandler();
  }

  function stabilizeInput() {
    const textarea = qs("#text");
    if (!textarea) return;

    textarea.addEventListener("input", throttle(function () {
      textarea.value = textarea.value.replace(/\s{3,}/g, "  ");
    }, 200));
  }

  function safeFetchWrapper() {
    if (!window.fetch || window.__SAFE_FETCH_PATCH__) return;
    window.__SAFE_FETCH_PATCH__ = true;

    const originalFetch = window.fetch.bind(window);

    window.fetch = async function () {
      try {
        const response = await originalFetch.apply(null, arguments);
        return response;
      } catch (e) {
        console.error("Fetch error:", e);
        throw e;
      }
    };
  }

  function guardCheckButton() {
    const btn = qs(".check");
    if (!btn) return;

    let locked = false;

    btn.addEventListener("click", function () {
      if (locked) return;
      locked = true;
      btn.style.opacity = "0.7";
      btn.style.pointerEvents = "none";

      setTimeout(function () {
        locked = false;
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
      }, 1200);
    });
  }

  function ensureResultVisibility() {
    const result = qs("#result");
    if (!result) return;

    const observer = new MutationObserver(function () {
      if (result.innerHTML.trim()) {
        result.style.display = "block";
      }
    });

    observer.observe(result, { childList: true });
    PERFORMANCE_AND_RESILIENCE.observers.push(observer);
  }

  function compressDomText() {
    runIdle(function () {
      qsa("p, span, li, div").forEach(function (el) {
        if (el.children.length === 0) {
          el.textContent = safeText(el.textContent);
        }
      });
    });
  }

  function preventDoubleInit() {
    if (window.__SCAM_CHECK_FINALIZED__) return true;
    window.__SCAM_CHECK_FINALIZED__ = true;
    return false;
  }

  function optimizeScrolling() {
    let ticking = false;

    function update() {
      ticking = false;
    }

    window.addEventListener("scroll", function () {
      if (!ticking) {
        window.requestAnimationFrame(update);
        ticking = true;
      }
    });
  }

  function init() {
    if (PERFORMANCE_AND_RESILIENCE.initialized) return;
    if (preventDoubleInit()) return;

    PERFORMANCE_AND_RESILIENCE.initialized = true;

    runIdle(lazyLoadExternalLinks);
    runIdle(optimizeImages);
    reduceLayoutThrash();
    stabilizeInput();
    safeFetchWrapper();
    guardCheckButton();
    ensureResultVisibility();
    compressDomText();
    optimizeScrolling();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<script>
(function () {
  const FINAL_POLISH_LAYER = {
    booted: false
  };

  function qs(s, r){return (r||document).querySelector(s);}
  function qsa(s, r){return Array.from((r||document).querySelectorAll(s));}

  function clean(v){
    return String(v||"")
      .replace(/\s+/g," ")
      .trim();
  }

  function clampText(){
    qsa("p, li, span, a").forEach(function(el){
      if(el.children.length===0){
        el.textContent = clean(el.textContent);
      }
    });
  }

  function fixHeadings(){
    qsa("h1,h2,h3").forEach(function(h){
      h.textContent = clean(h.textContent);
    });
  }

  function unifyButtons(){
    qsa("button").forEach(function(b){
      b.textContent = clean(b.textContent);
      b.style.webkitTapHighlightColor = "transparent";
    });
  }

  function improveTapTargets(){
    qsa("button,a").forEach(function(el){
      if(el.offsetHeight < 44){
        el.style.minHeight = "44px";
      }
    });
  }

  function safeLinks(){
    qsa("a[target='_blank']").forEach(function(a){
      a.rel = "noopener noreferrer";
    });
  }

  function lockLayoutShift(){
    const result = qs("#result");
    if(!result) return;

    const observer = new MutationObserver(function(){
      result.style.minHeight = result.offsetHeight + "px";
    });

    observer.observe(result,{childList:true,subtree:true});
  }

  function smoothScrollFix(){
    qsa("a[href^='#']").forEach(function(a){
      a.addEventListener("click",function(e){
        const id = a.getAttribute("href").slice(1);
        const el = document.getElementById(id);
        if(el){
          e.preventDefault();
          el.scrollIntoView({behavior:"smooth",block:"start"});
        }
      });
    });
  }

  function resultAutoScroll(){
    const result = qs("#result");
    if(!result) return;

    const observer = new MutationObserver(function(){
      if(result.innerHTML.trim()){
        setTimeout(function(){
          result.scrollIntoView({behavior:"smooth",block:"start"});
        },200);
      }
    });

    observer.observe(result,{childList:true});
  }

  function normalizeInputs(){
    const textarea = qs("#text");
    if(!textarea) return;

    textarea.addEventListener("blur",function(){
      textarea.value = clean(textarea.value);
    });
  }

  function fixOverflow(){
    document.body.style.overflowX = "hidden";
  }

  function stabilizeFonts(){
    document.body.style.textRendering = "optimizeLegibility";
    document.body.style.webkitFontSmoothing = "antialiased";
  }

  function microInteraction(){
    qsa("button").forEach(function(btn){
      btn.addEventListener("touchstart",function(){
        btn.style.transform = "scale(.98)";
      });
      btn.addEventListener("touchend",function(){
        btn.style.transform = "scale(1)";
      });
    });
  }

  function init(){
    if(FINAL_POLISH_LAYER.booted) return;
    FINAL_POLISH_LAYER.booted = true;

    clampText();
    fixHeadings();
    unifyButtons();
    improveTapTargets();
    safeLinks();
    lockLayoutShift();
    smoothScrollFix();
    resultAutoScroll();
    normalizeInputs();

    stabilizeFonts();

  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",init);
  } else {
    init();
  }
})();
</script>

<script>
(function () {
  const BLOCK_25_SYSTEM = {
    initialized: false,
    selectors: {},
    state: {
      keyword: "",
      intent: "general",
      risk: "medium",
      analyzedCount: 0,
      subscriberVisible: false,
      shareMounted: false
    }
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function qs(selector, root) {
    return (root || document).querySelector(selector);
  }

  function qsa(selector, root) {
    return Array.from((root || document).querySelectorAll(selector));
  }

  function normalize(value) {
    return String(value || "")
      .replace(/\s+/g, " ")
      .replace(/[–—]/g, "-")
      .trim();
  }

  function lower(value) {
    return normalize(value).toLowerCase();
  }

  function cap(value) {
    const v = normalize(value);
    return v ? v.charAt(0).toUpperCase() + v.slice(1) : "";
  }

  function safeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function includesAny(text, arr) {
    return arr.some(function (item) {
      return text.indexOf(String(item).toLowerCase()) !== -1;
    });
  }

  function cleanBaseKeyword(keyword) {
    return normalize(keyword)
      .replace(/^\s*is\s+/i, "")
      .replace(/^\s*can\s+i\s+trust\s+/i, "")
      .replace(/^\s*did\s+i\s+get\s+scammed\s+(?:by|on|with)\s+/i, "")
      .replace(/\s+a\s+scam$/i, "")
      .replace(/\s+or\s+legit$/i, "")
      .replace(/\s+or\s+scam$/i, "")
      .replace(/\s+legit$/i, "")
      .replace(/\s+real$/i, "")
      .replace(/\s+safe$/i, "")
      .replace(/\s+scam$/i, "")
      .replace(/\s+a$/i, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function cleanSentenceKeyword(keyword) {
    return cleanBaseKeyword(keyword)
      .replace(/\bmessage\b/gi, "")
      .replace(/\bmessages\b/gi, "")
      .replace(/\bemail\b/gi, "")
      .replace(/\bemails\b/gi, "")
      .replace(/\btext\b/gi, "")
      .replace(/\btexts\b/gi, "")
      .replace(/\blink\b/gi, "")
      .replace(/\blinks\b/gi, "")
      .replace(/\bwebsite\b/gi, "")
      .replace(/\bwebsites\b/gi, "")
      .replace(/\balert\b/gi, "")
      .replace(/\balerts\b/gi, "")
      .replace(/\bwarning\b/gi, "")
      .replace(/\bwarnings\b/gi, "")
      .replace(/\bnotification\b/gi, "")
      .replace(/\bnotifications\b/gi, "")
      .replace(/\brequest\b/gi, "")
      .replace(/\brequests\b/gi, "")
      .replace(/\boffer\b/gi, "")
      .replace(/\boffers\b/gi, "")
      .replace(/\bscam\b/gi, "")
      .replace(/\bscams\b/gi, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function detectIntent(keywordRaw) {
    const value = lower(keywordRaw);

    if (includesAny(value, ["job", "recruiter", "interview", "hiring", "onboarding"])) {
      return "job";
    }

    if (includesAny(value, ["crypto", "bitcoin", "ethereum", "wallet", "airdrop", "nft", "seed phrase", "metamask"])) {
      return "crypto";
    }

    if (includesAny(value, ["delivery", "usps", "ups", "fedex", "package", "shipment", "parcel", "tracking"])) {
      return "delivery";
    }

    if (includesAny(value, ["bank", "paypal", "venmo", "zelle", "cash app", "amazon", "refund", "payment", "verification code", "account locked"])) {
      return "payments";
    }

    if (
      value.startsWith("how to ") ||
      value.startsWith("what to do after ") ||
      value.startsWith("how to recover after ") ||
      value.startsWith("how to secure ") ||
      value.startsWith("how to block ") ||
      value.startsWith("how to avoid ") ||
      value.startsWith("what happens after ") ||
      value.startsWith("what is ") ||
      value.startsWith("why ") ||
      value.startsWith("when ") ||
      value.startsWith("where ") ||
      value.startsWith("who ")
    ) {
      return "guidance";
    }

    return "general";
  }

  function riskForIntent(intent) {
    if (intent === "job") return "high";
    if (intent === "crypto") return "high";
    if (intent === "payments") return "high";
    if (intent === "delivery") return "medium";
    if (intent === "guidance") return "medium";
    return "medium";

    }

    if (intent === "payments") {
      return "Payment and account alert scams often use panic, fake logins, refund pressure, and code requests to steal access or money.";
    }

    if (intent === "guidance") {
      return "Suspicious messages usually become risky when they push you to act before verifying the sender, link, or requested step.";

    return "Messages like this become risky when urgency, impersonation, and a request for action appear together.";

(function () {

  function detectInputType(text) {

    if (lower.includes("@")) return "email";
    if (lower.includes("job") || lower.includes("hiring")) return "job";
    if (lower.includes("crypto") || lower.includes("wallet")) return "crypto";
    if (lower.includes("delivery") || lower.includes("usps") || lower.includes("fedex")) return "delivery";

(function () {

  function ensureSingleExecution() {
    if (window.__SCAM_CHECK_EXECUTED__) return false;
    window.__SCAM_CHECK_EXECUTED__ = true;
    return true;
  }

  function freezeCriticalGlobals() {
    try {
      Object.defineProperty(window, "API", { writable: false });
    } catch (e) {}
  }

  function cleanupDuplicateNodes() {
    const seen = new Set();

    document.querySelectorAll("[id]").forEach(el => {
      if (seen.has(el.id)) {
        el.remove();
      } else {
        seen.add(el.id);
      }
    });
  }

  function enforceButtonState() {
    const btn = document.querySelector(".check");
    if (!btn) return;

    btn.addEventListener("click", () => {

  function stabilizeLayout() {
    document.body.style.backfaceVisibility = "hidden";
    document.body.style.transform = "translateZ(0)";
  }

  function preventScrollJump() {
    let lastScroll = window.scrollY;

    window.addEventListener("scroll", () => {
      if (Math.abs(window.scrollY - lastScroll) > 300) {
        window.scrollTo({ top: lastScroll });
      }
      lastScroll = window.scrollY;
    });
  }

  function hardenLinks() {
    document.querySelectorAll("a").forEach(a => {
      if (!a.getAttribute("href")) {

<script>
/* =========================
   NETWORK RESILIENCE
   ========================= */

(function () {
  if (window.__SCAM_CHECK_NETWORK__) return;
  window.__SCAM_CHECK_NETWORK__ = true;

  function retryFetch(url, options, retries = 2) {
    return fetch(url, options).catch(err => {
      if (retries <= 0) throw err;
      return retryFetch(url, options, retries - 1);
    });
  }

  const originalFetch = window.fetch;

  window.fetch = function (url, options) {
    if (typeof url === "string" && url.includes("/analyze")) {
      return retryFetch(url, options);
    }
    return originalFetch(url, options);
  };
})();
</script>

/* =========================

   ========================= */

(function () {
  if (window.__SCAM_CHECK_DOM_WATCH__) return;
  window.__SCAM_CHECK_DOM_WATCH__ = true;

  function monitorCriticalNodes() {
    const target = document.body;

    const observer = new MutationObserver(mutations => {
      mutations.forEach(m => {
        if (m.type === "childList" && m.removedNodes.length > 0) {
          // prevent unexpected removals
          m.removedNodes.forEach(node => {
            if (node.id === "result" || node.id === "text") {
              location.reload();
            }
          });
        }
      });
    });

    observer.observe(target, {
      childList: true,
      subtree: true
    });
  }

  function initWatchdog() {
    monitorCriticalNodes();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initWatchdog);

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"FAQPage",
  "mainEntity":[
    {
      "@type":"Question",
      "name":"How can I tell if a token looks risky?",
      "acceptedAnswer":{
        "@type":"Answer",
        "text":"Look for red flags like weak liquidity, suspicious ownership structure, extreme volatility, fake hype, unclear utility, and unusual activity around the contract or trading pair. Always verify through trusted data sources."
      }
    },
    {
      "@type":"Question",
      "name":"What should I do before buying a token?",
      "acceptedAnswer":{
        "@type":"Answer",
        "text":"Check the token contract address, liquidity, volume, market activity, and project credibility before buying. Never rely only on hype, social posts, or a single screenshot."
      }
    },
    {
      "@type":"Question",
      "name":"Are risky tokens common?",
      "acceptedAnswer":{
        "@type":"Answer",
        "text":"Yes. Risky tokens are common across chains and can appear legitimate at first. Many rely on rushed launches, copied branding, thin liquidity, or hype-driven momentum to attract buyers."
      }
    }
  ]
}
</script>

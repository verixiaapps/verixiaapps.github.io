    const heading = document.getElementById("contentHeading");
    const bridge = document.getElementById("contentBridge");
    const keyword = safeText(getKeywordRaw());

    if (!heading || !bridge || !keyword || keyword.includes("{{")) return;

    const lower = getKeywordLower();

    if (lower.startsWith("is ") || lower.includes("legit") || lower.includes("safe")) {
      bridge.textContent = "Use the checker above to compare the token against real safety signals: contract address, liquidity, holder structure, trading behavior, wallet prompts, and pressure to buy.";
      return;
    }

    if (lower.includes("rug") || lower.includes("scam")) {
      bridge.textContent = "Use the checker above to look for rug-pull style signals before buying or connecting: weak exits, concentrated control, suspicious promotion, unclear ownership, and risky approval behavior.";
      return;
    }

    if (lower.includes("buy")) {
      bridge.textContent = "Use the checker above before buying. A token can look attractive on the surface while still carrying weak liquidity, holder concentration, or exit risk.";
    }
  }

  function removeWeakWordsFromCards() {
    const weakPairs = [
      ["might be", "can be"],
      ["may be", "can be"],
      ["possibly", ""],
      ["potentially", ""],
      ["various", "specific"],
      ["things", "signals"],
      ["stuff", "signals"],
      ["a lot of", "multiple"],
      ["very", ""]
    ];

    document.querySelectorAll(".story-card p, .recognition-copy, .hero-quick-copy, .quick-checklist-item").forEach(el => {
      let text = el.textContent;

      weakPairs.forEach(pair => {
        text = text.replace(new RegExp("\\b" + pair[0] + "\\b", "gi"), pair[1]);
      });

      text = text.replace(/\s+/g, " ").trim();
      el.textContent = text;
    });
  }

  function addKeywordMatchLine() {
    const hero = document.querySelector(".hero");
    if (!hero) return;
    if (document.getElementById("keywordMatchLine")) return;

    const keyword = safeText(getKeywordRaw());
    if (!keyword || keyword.includes("{{")) return;

    const family = classifyKeywordFamily();

    let copy = "This guide is matched to the token-risk pattern behind your search.";

    if (family === "wallet") {
      copy = "Matched to wallet connection, approval, airdrop, or claim-risk searches.";
    } else if (family === "hype") {
      copy = "Matched to hype-driven token, memecoin, pump, and fast-buy risk searches.";
    } else if (family === "contract") {
      copy = "Matched to contract-address, chain, and token verification searches.";
    } else if (family === "scam") {
      copy = "Matched to rug pull, scam, fake token, and warning-signal searches.";
    } else if (family === "validation") {
      copy = "Matched to safe, legit, trustworthy, and token verification searches.";
    } else if (family === "buy") {
      copy = "Matched to pre-buy token safety and investment-risk searches.";
    }

    const line = document.createElement("div");
    line.id = "keywordMatchLine";
    line.style.margin = "14px auto 0";
    line.style.maxWidth = "720px";
    line.style.fontSize = "13px";
    line.style.fontWeight = "900";
    line.style.color = "#9cecff";
    line.style.textAlign = "center";
    line.style.lineHeight = "1.45";
    line.textContent = copy;

    hero.appendChild(line);
  }

  function makeCardsMoreSkimmable() {
    document.querySelectorAll(".story-card p").forEach(p => {
      const text = p.textContent.trim();

      if (text.length < 180) return;

      const firstBreak = text.indexOf(". ");
      if (firstBreak === -1 || firstBreak > 160) return;

      const first = text.slice(0, firstBreak + 1);
      const rest = text.slice(firstBreak + 2);

      p.innerHTML = `
        <strong style="display:block;color:#fff;margin-bottom:7px;font-size:16px;line-height:1.45;">
          ${escapeLayerHtml(first)}
        </strong>
        <span>${escapeLayerHtml(rest)}</span>
      `;
    });
  }

  function ensureNoEmptyGeneratedBlocks() {
    document.querySelectorAll(".inline-info-card, .story-card, .recognition-chip").forEach(el => {
      if (!safeText(el.textContent)) {
        el.style.display = "none";
      }
    });
  }

  function strengthenRelatedHeadings() {
    const related = document.getElementById("relatedHeading");
    const more = document.getElementById("moreLinksHeading");
    const family = classifyKeywordFamily();

    if (related) {
      if (family === "wallet") related.textContent = "Check Similar Wallet & Approval Risks";
      else if (family === "hype") related.textContent = "Check Similar Hype-Driven Token Setups";
      else if (family === "contract") related.textContent = "Check Similar Contract & Address Risks";
      else if (family === "scam") related.textContent = "Check Similar Scam & Rug Pull Patterns";
      else related.textContent = "Check Similar Token Risk Setups";
    }

    if (more) {
      if (family === "wallet") more.textContent = "More Wallet Risk Checks";
      else if (family === "hype") more.textContent = "More Hype Token Checks";
      else if (family === "contract") more.textContent = "More Contract Risk Checks";
      else if (family === "scam") more.textContent = "More Scam Pattern Checks";
      else more.textContent = "More Token Risk Checks";
    }
  }

  function addBottomTrustNote() {
    const footer = document.querySelector(".footer");
    if (!footer) return;
    if (document.getElementById("tokenRiskBottomTrustNote")) return;

    const note = document.createElement("div");
    note.id = "tokenRiskBottomTrustNote";
    note.style.maxWidth = "760px";
    note.style.margin = "0 auto 22px";
    note.style.padding = "16px 18px";
    note.style.borderRadius = "18px";
    note.style.background = "rgba(255,255,255,.05)";
    note.style.border = "1px solid rgba(255,255,255,.08)";
    note.style.color = "#d7e4f8";
    note.style.fontSize = "14px";
    note.style.fontWeight = "800";
    note.style.lineHeight = "1.65";
    note.textContent = "Token Risk is a review tool, not financial advice. Use it to slow down risky decisions, compare warning signals, and avoid trusting token pages, wallet prompts, or hype without verification.";

    footer.parentNode.insertBefore(note, footer);
  }

  function runFinalSeoLayer() {
    insertTrustPanel();
    insertDecisionPanel();
    strengthenStoryTitles();
    strengthenContentClose();
    improveMetaLikeVisibleCopy();
    removeWeakWordsFromCards();
    addKeywordMatchLine();
    makeCardsMoreSkimmable();
    ensureNoEmptyGeneratedBlocks();
    strengthenRelatedHeadings();
    addBottomTrustNote();
  }

  window.addEventListener("load", function () {
    setTimeout(runFinalSeoLayer, 140);
  });

})();
</script>

<script>
(function () {
  if (window.__TOKEN_RISK_POLISH_LAYER__) return;
  window.__TOKEN_RISK_POLISH_LAYER__ = true;

  /*
  =========================================================
  SECTION 1: TITLE / META HUMANIZER (CTR BOOST)
  =========================================================
  */

  function polishTitle() {
    const titleEl = document.querySelector("title");
    if (!titleEl) return;

    let t = titleEl.textContent;

    t = t
      .replace(/Token Risk Check/gi, "Token Risk Check (Before You Buy)")
      .replace(/Warning Signs & What To Know/gi, "Warning Signs, Real Risk & What To Do")
      .replace(/\s+/g, " ")
      .trim();

    titleEl.textContent = t;
  }

  function polishMetaDescription() {
    const meta = document.querySelector('meta[name="description"]');
    if (!meta) return;

    let d = meta.getAttribute("content") || "";

    if (!d) return;

    if (!d.includes("before you buy")) {
      d += " Check the token before you buy, connect, or follow hype.";
    }

    d = d.replace(/\s+/g, " ").trim();
    meta.setAttribute("content", d);
  }

  /*
  =========================================================
  SECTION 2: HERO SHARPEN (FIRST 2 SECONDS UX)
  =========================================================
  */

  function sharpenHero() {
    const sub = document.getElementById("heroSubheading");
    if (!sub) return;

    let t = sub.textContent;

    t = t
      .replace(/Use the checker below/gi, "Paste the token below")
      .replace(/review token addresses/gi, "check the token instantly")
      .replace(/before you buy/gi, "before you risk money");

    sub.textContent = t;
  }

  /*
  =========================================================
  SECTION 3: ANTI-AI DETECTION PASS
  =========================================================
  */

  function removeAIPatterns() {
    document.querySelectorAll("p, .recognition-copy").forEach(el => {
      let t = el.textContent;

      t = t
        .replace(/in today's world/gi, "")
        .replace(/ever-evolving/gi, "")
        .replace(/it is crucial/gi, "")
        .replace(/it is essential/gi, "")
        .replace(/in order to/gi, "")
        .replace(/furthermore/gi, "")
        .replace(/moreover/gi, "")
        .replace(/\s+/g, " ")
        .trim();

      el.textContent = t;
    });
  }

  /*
  =========================================================
  SECTION 4: ADD REAL-WORLD LANGUAGE
  =========================================================
  */

  function addRealLanguage() {
    document.querySelectorAll(".story-card p").forEach(p => {
      let t = p.textContent;

      if (!t.includes("people")) {
        t += " This is where people usually get caught.";
      }

      p.textContent = t;
    });
  }

  /*
  =========================================================
  SECTION 5: MICRO TRUST INJECTION
  =========================================================
  */

  function injectMicroTrust() {
    const container = document.querySelector(".tool-shell");
    if (!container) return;

    if (document.getElementById("microTrust")) return;

    const el = document.createElement("div");
    el.id = "microTrust";
    el.style.marginTop = "12px";
    el.style.fontSize = "13px";
    el.style.fontWeight = "900";
    el.style.color = "#9cecff";
    el.style.textAlign = "center";

    el.textContent = "Used for fast token risk checks before buying or connecting";

    container.appendChild(el);
  }

  /*
  =========================================================
  SECTION 6: CTA PSYCHOLOGY BOOST
  =========================================================
  */

  function strengthenCTA() {
    const btn = document.querySelector(".check");
    if (!btn) return;

    if (!btn.textContent.includes("Now")) {
      btn.textContent += " Now";
    }
  }

  /*
  =========================================================
  SECTION 7: INTERNAL LINK CONTEXT BOOST
  =========================================================
  */

  function enhanceLinks() {
    document.querySelectorAll(".related-links a").forEach(a => {
      if (!a.textContent.toLowerCase().includes("token")) {
        a.textContent += " token risk check";
      }
    });
  }

  /*
  =========================================================
  SECTION 8: SCROLL HOOK (RETENTION BOOST)
  =========================================================
  */

  function injectScrollHook() {
    const firstCard = document.querySelector(".story-card.lead p");
    if (!firstCard) return;

    if (!firstCard.textContent.includes("Scroll")) {
      firstCard.textContent += " Scroll to see how this pattern usually ends.";
    }
  }

  /*
  =========================================================
  SECTION 9: FINAL LANGUAGE SHARPENER
  =========================================================
  */

  function sharpenLanguage() {
    document.querySelectorAll(".story-card p").forEach(p => {
      let t = p.textContent;

      t = t
        .replace(/can be/gi, "is often")
        .replace(/may be/gi, "is often")
        .replace(/might be/gi, "is often");

      p.textContent = t;
    });
  }

  /*
  =========================================================
  SECTION 10: INDEXING HELP (VISIBLE SIGNALS)
  =========================================================
  */

  function reinforceKeywordPresence() {
    const k = (window.RAW_KEYWORD || "").toLowerCase();
    if (!k) return;

    const body = document.querySelector(".content-body");
    if (!body) return;

    if (!body.textContent.toLowerCase().includes(k)) {
      body.innerHTML += `<p>${k} risk depends on structure, not appearance.</p>`;
    }
  }

  /*
  =========================================================
  SECTION 11: FINAL RUN
  =========================================================
  */

  function run() {
    polishTitle();
    polishMetaDescription();

    setTimeout(() => {
      sharpenHero();
      removeAIPatterns();
      addRealLanguage();
      injectMicroTrust();
      strengthenCTA();
      enhanceLinks();
      injectScrollHook();
      sharpenLanguage();
      reinforceKeywordPresence();
    }, 80);
  }

  window.addEventListener("load", run);

})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daily Hits</title>

<style>
body{
  font-family:system-ui,-apple-system,Arial,sans-serif;
  background:linear-gradient(180deg,#eef2ff,#f8fafc);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  text-align:center;
}

h1{
  margin:0;
  font-size:22px;
  color:#374151;
}

.count{
  margin-top:16px;
  font-size:48px;
  font-weight:800;
  color:#111827;
}
</style>
</head>

<body>

<div class="card">
  <h1>Hits Today</h1>
  <div class="count" id="count">...</div>
</div>

<script>
// Create a unique key per day (resets daily)
const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
const namespace = "verixiaapps";
const key = "check-" + today;

// Increment + get value
fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("count").innerText = data.value.toLocaleString();
  });
</script>

</body>
</html>

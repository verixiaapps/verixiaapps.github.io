<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Website Hits</title>

<style>
body{
  font-family:system-ui,-apple-system,Arial,sans-serif;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  text-align:center;
}

.title{
  font-size:18px;
  color:#6b7280;
}

.count{
  margin-top:12px;
  font-size:48px;
  font-weight:800;
  color:#111827;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Total Hits</div>
  <div class="count" id="count">...</div>
</div>

<script>
// READ ONLY (no increment)
fetch("https://api.countapi.xyz/get/verixiaapps/check")
  .then(res => res.json())
  .then(data => {
    document.getElementById("count").innerText =
      (data.value || 0).toLocaleString();
  });
</script>

</body>
</html>
